body:
  text: 跋古之名於醫者皆聖腎倜儻之士胸具過人之識故可以參化育濟生民著至教於天壤間而垂不朽之業洵非流俗所能希及也後人無前腎之實學奢望前腎之聞譽乃日趨於智巧便佞而適人情觀軒岐仲景之書高不足以得名卑不足以膽身編塵簡束而理諸廢籍之中吾大人傷之時有混類之悲以語倬曰自今以往醫術日以工而醫道日以晦矣然學道者博而寡約勞而鮮功何哉其患在於習之不精知之不明行而不得其道入而不得其門由是取仲景原文銓次作註採先哲格言補輯成章勒成纘緒二論皆別出手眼言必中累世之謬其遊辭以見奇支辭以觀美者無一語焉本欲藏之篋笥為一家之學詎意同人互引日費鈔謄因復稍加裁酌命倬整理付梓以流演聖腎之一脈而傷寒之道益研窮焉禮云藏焉修焉息焉遊焉大人有焉詩云好樂無荒良士瞿瞿余小子敢不勉焉男倬百拜謹述
