body:
  text: 傷寒緒論卷上長洲石頑張璐璐玉父纂述總論余嘗考晉王叔和集仲景傷寒書未嘗不廢書而三歎也嗟夫猶賴叔和為仲景之功臣使無叔和之集則傷寒書同於卒病論之不傳矣何能知有六經證治乎即條辨尚論亦無從而下手也究二子所編各有未當余竊不揣復取仲景原文重分其例取尚論及各家之注參以己見成纘論矣第殘逸已多證治不備擬搜諸家之論以補之雖其間互有發明然未免多歧之惑是不得不博採往哲之言以綴輯之惜歷代名賢遞相祖述未能一一乎標明姑從證類次第讀者毋以辭害義可也謹敘六經傳變合病併病標本治法及正傷寒兩感三陰中寒冬溫寒疫傷風溫病風溫時行大頭溫疫溫瘧溫毒陽毒陰毒熱病中暑濕溫中濕風濕濕熱痙病內傷虛煩腳氣霍亂內癰赤膈黃耳夾食夾痰夾水夾血夾氣夾陰冒雨溺水重身産後等四十證暨以審證死證逐一辨論如左如六經證人悉知為足經不知有手經證間出也傷寒初受病時頭項痛腰脊強惡寒足太陽也發熱面赤惡風手太陽也目疼鼻乾不得臥足陽明也蒸熱而渴手陽明也胸脅滿痛口苦足少陽也耳聾及痛寒熱往來手少陽也腹滿自利而吐足太陰也口乾津不到咽手太陰也脈沈細口燥渴少陰也舌乾不得臥手少陰也耳足聾囊縮不知人足厥陰也煩滿厥逆手厥陰也傷寒以冬月寒水主令故受病必先巨陽若夫非時暴寒亦必隨時傷犯與夫時行疫癘隨其歲氣而犯虛經異治疫雖以六氣為主總不離陽明濕土至於伏氣發溫必先少陽證見熱病多兼包絡三焦皆熱邪自內達外其治法可領悟矣按靈樞十二經脈轉注如環豈有六經傳變只傳足經不傳手經之理如太陽傳陽明謂循經傳太陽傳少陽謂越經傳太陽傳太陰謂誤下傳太陽傳少陰謂表裏傳太陽傳厥陰謂首尾傳因此經本虛邪即傳之本經定例也故傷寒有六經之傳變無藏府之傳次也所以在太陽經有犯本者有即入陽明之府者有傳至陽明之經而自經入府者有傳至少陽之經而入陽明之府者是以仲景有太陽陽明正陽陽明少陽陽明之別也入府則邪有定著不復傳次也非但入府不傳即太陽之犯本少陽之入府俱不復傳矣是知三陽有傳變有併合三陰有傳經直入而無併合也即有三陰經轉出三陽或傳入府皆是邪氣向衰正氣得復之候並無厥陰復傳太陽之理此昔人所未明言也而傳足不傳之手説尤屬非理王安道曰傷寒不傳手經此開卷之首疑而諸家紛紛竟無定論竊意只傳足經者蓋以邪氣在經未入藏府而言若入藏府則不可謂之獨在足經矣何以言之夫手太陽者小腸也手陽明者大腸也邪氣入胃致有燥屎大承氣湯下之小腸上接胃下接大腸燥屎由大腸而出二經得無與乎手少陽者三焦也邪在一身三焦獨能安乎手太陰者肺也肺為清肅之藏主氣升降假如咳嗽氣逆肺能保其清肅乎手少陰者心也手厥陰者心包也表裏熱極神狂志亂豈有君相二火反泰然清靜者哉東垣此事難知曰傷寒傳至五六日間漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思六脈細數而不洪大心下不痞腹中不滿大小便如常或傳至十日以來形貌如醉人狀虛見神昏不得已用承氣下之誤矣不知此熱邪傳手少陰心經也導赤瀉心湯主之與食則咽者邪不在胃也不與則不思以其神昏也既不在胃誤與承氣下之必死今傷寒溫熱傳變多有此證不可不察也至於合病併病亦須明辨昔趙嗣真極意洗發不過曰合病者二陽經或三陽經同受病病之不傳者也併病者一陽經先受病又過一經病之傳者也以病之不傳者概合病雖為定論但未明言合病多由冬時過溫少陰不藏溫氣乘虛先入於裏然後更感寒氣閉鬱於外寒熱錯雜遂至合病其邪內攻必自下利不下利即上嘔邪勢之充斥奔迫從可識矣其黃苓湯雖主太陽少陽合病白虎湯雖主三陽合病而實溫病熱病主方慎不可以此誤治傷寒合病設誤用之必難救藥也其傷寒合病仲景自有桂枝加葛根湯葛根加半夏湯葛根湯麻黃湯等治法觀仲景諸例自可見矣併病者先一陽經病未罷又加一經證見兩經聯貫為一也嗣真云太陽陽明併病若併而未盡是傳未過尚有表證若併之已盡是為傳過當下之按此雖曰併病而實傳經也或言本二經病一經證先盡歸併於一經者為併病此説似是而尤誤也按仲景二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽明一條此則太陽陽明併病也至於二陽併病太陽證罷但發潮熱一條雖曰二陽併病又云太陽證罷獨見陽明府證所以用大承氣湯專治府實而不復用併病例藥也考仲景書合病併病證或止言太陽或止言陽明少陽者甚多如太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之此非太陽陽明併病例藥乎又如標本治例全要活法所謂一病之標本者如太陽中風枝桂證先惡寒為本後發熱為標其陽明熱病白虎證口燥心煩為本背微惡寒為標此治本不治標也又兩病之標本如伏氣發溫復感客邪證伏氣為本客邪為標治以涼膈必加蔥豉其內傷發熱兼冒虛風證內傷為本虛風為標治宜補中略入羌防此治本兼標也又傳經之標本本太陽病初得病時發其汗汗先出不徹因轉屬陽明此太陽為本陽明為標治以葛根仍用麻黃此治標必從本也又一經之標本如太陽病頭痛發熱自汗桂枝證為本病後六七日不解而煩渴飲水邪入膀胱之本五苓證為標病此隨證治本治標也又一身之標本如病人身大熱反欲得近衣以其人陽氣素虛寒邪外鬱於表熱在皮膚為標寒在骨髓為本宜小建中加黃耆病人身大寒反不欲近衣以其人蓄熱素盛寒鬱熱邪於內寒在皮膚為標熱在骨髓為本宜桂枝湯加黃芩此寒熱互見標本合治不必如活人書先後治例也又寒熱之標本者如病人脈微而澀夏月盛熱欲著復衣冬月盛寒欲裸其身盛熱欲著復衣者陽微則惡寒也宜附子理中加黃連盛寒欲裸其身者陰弱則發熱也宜竹葉石膏加附子此不從標本從乎中治仲景所謂醫病是也又先後之標本者傷寒醫下之續得下利清穀不止身疼痛急當救裏後身疼痛清便自調急當救裏先受寒身疼痛為本病後誤下之續得下利清穀為標病先四逆救裏治標後桂枝救表治本也標本之法略舉數條為例詳仲景證治諸法餘可類推夫仲景治法不同非極力精研不能悟其間奧也原夫傷寒之邪其始也必先太陽寒水之經所以惡寒發熱此為表之外證故宜發汗開腠理而通其熱則愈或有汗之而不愈者必有所夾而致或夾痰或夾食或挾水氣或夾內傷須辨脈證用藥然必先撤外邪稍兼清理痰氣而後專理他證若內外併治邪必內入所謂汗之不得其宜而入三陽之本也古云發表未除不可攻裏上盛未除不可攻下真不易之定例也傷寒三陽證宜汗失汗必致傳經汗之不得其宜或入三陽之本或傳三陰之經若入三陽之本此為表之裏證當隨證分別和解若入陽明之府必大便燥結潮熱手足漐漐自汗腹滿煩渴當俟結定方可攻裏所謂下不厭遲也若裏實燥渴飲水過多或下傍流之水者急下之若傳三陰之經必自下利腹滿嗌乾燥渴厥逆舌卷囊縮詳緩急下之此雖曰三陰實陽證也大抵傷寒身熱者為熱在表引飲小便黃赤為熱在裏身熱引飲小便黃赤為表裏俱有熱身涼不渴小便清白為表裏俱無熱又曰身拘急表熱惡寒脈浮緊為邪熱在表引飲讝妄腹滿實痛發熱便祕脈沈緊為邪熱在裏胸脅痞滿或嘔吐往來寒熱脈在肌肉為邪熱在半表半裏自利脈沈細但熱而無頭痛或燥渴多喜溫飲自覺足寒為少陰本虛而挾陽邪雖是陽證而實夾陰與陽虛自中陰寒不同亦有陽證誤用寒藥而變為虛寒者又有汗下太過致陽虛而惡寒者皆始本陽邪未傳寒中之證並宜加溫經藥不可拘於傷寒皆為熱邪禁用溫補之説然究其根源從陽經來者溫經藥中又不得不兼制陽藥若峻用辛熱則真陰立稿也觀真武湯中用芍藥茯苓其義可見王安道云傷寒傳變不常或有循經而傳者或有越經而傳者或有傳二三經而止者或有只在一經者或有傳至三陽而止者或有傳盡六經不罷者有從陽經傳變而為熱證者有直中陰經而成寒證者有初入太陽不作鬱熱而成真陰證者有始寒終熱者有始熱終寒者全在脈與證別之詳三陽之邪則一於熱耳至三陰經證之或寒或熱者何也夫仲景書本非全文既遭叔和播亂之厄成無已止隨文注釋竟不明言何由為熱何由為寒之故此非不欲言也蓋止知傷寒皆是傳經故疑於六經所傳俱為熱證而熱無變寒之理遂不敢別白耳以寒為本藏之寒歟安得當熱邪傳裏之時反獨見寒而不見熱者且所用之藥能不助傳經之熱乎以寒為外寒歟則在三陽已成熱矣豈有傳至三陰而反為寒哉成氏能潛心乎此則必悟其所以然矣夫三陽之病其寒邪之在太陽也寒鬱其陽陽不暢而成熱陽雖人身之正氣既鬱則為邪矣用麻黃發表以逐其寒則腠理通而鬱熱泄故汗出而愈苟或不汗不解其熱不得外泄則必入裏故傳陽明傳少陽而或入府也夫三陰之病或寒或熱者何哉蓋寒邪之傷人也或有太陽經鬱熱然後以次而傳至陰經者或有太陽不傳陽明少陽而便傳三陰經者或有寒邪不從陽經而始直傷陰經者或有雖從太陽而始不作鬱熱即入少陰而獨見少陰證者或有始自太陽即入少陰而太陽不能無傷者或有直傷陰經而寒變為熱及始寒終熱者其鬱熱傳陰則為熱證其直傷陰經及從太陽即入少陰則為寒證其太陽不能無傷則為脈沈而發熱證其始寒而終熱者則陰邪傳出陽分為先寒後發熱證此三陰之病所以或寒或熱也邪氣暴卒本無定情而傳變不常耳若夫裏寒外熱之證乃是寒邪入客於內迫陽於外或是虛陽之氣假作外熱之狀耳非真熱邪所為也觀仲景裏寒外熱之證但以溫藥治裏而不治外熱則知所治之意矣所以仲景治太陽經虛汗之不愈即用四逆湯溫之如太陽病發熱頭痛脈反沈若不差身體疼痛當救其裏宜四逆湯是也更有少陰表證宜汗者如少陰病始得之反發熱脈沈者麻黃附子細辛湯主之少陰病得之二三日麻黃附子甘草湯微發汗以二三日無裏證故微發汗也趙嗣真云太陽證之溫經少陰證之發汗皆證類之變故長沙各言反者以太陽發熱頭痛脈當浮今反沈少陰脈沈法當無熱今反發熱也以其無頭痛故為少陰以其有頭痛故為太陽太陽脈當浮今不能浮者以裏虛久寒正氣衰微所致又身疼痛故宜救裏使正氣內強迫邪出外而乾薑生附亦能出汗也少陰脈沈無頭痛當不發熱今反發熱知寒邪在表鬱閉而為熱故用麻黃細辛以發表邪之熱附子以溫少陰之經熟附配麻黃發中有補生附配乾薑補中有發也至第二證言得之二三日病氣尚淺比之前證稍輕又無裏證變見故宜微發汗所以去細辛加甘草是汗劑之輕者也活人書卻去無證二字改作常見少陰熱陽證者如經云心中煩不得臥或咽瘡聲不出者或咳而嘔渴或口燥咽乾或腹脹不大便是也夫豈麻黃附甘草湯所可治耶復有三陰轉屬胃府宜下者如傷寒脈浮而緩手足自溫是為繫在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便鞭者為陽明也又少陰病六七日腹脹不大便者急下之宜大承氣湯厥陰下利讝語有燥屎者小承氣湯下之是也更有三陰轉出肌表宜汗者如太陰病脈浮者可發汗宜桂枝湯少陰中風陽微陰浮者為欲愈厥陰病下利後身疼痛清便自調者急當救表宜桂枝湯厥陰病嘔而發熱者小柴胡湯又有少陰變熱回陽者如少陰病惡寒而踡時時自煩欲去衣被者可治凡此皆盡復陽也至於汗下誤施變害不測東云太陽始病當以汗若當汗不汗解則濕熱者表而發黃發汗太過經虛風襲而成痙不當汗而汗迫血妄行而成衄大便不可妄動動早為犯禁當汗誤下則引邪入裏而為痞結懊憹協熱利當下誤汗則為亡陽厥竭讝語小便不可輕利利之為犯本若渴而自汗多雖小便不利為陽明經熱不可誤用五苓蓋五苓為太陽證下藥其功在於驅胃中濕熱而救津液故仲景又有小便數大便鞭不更衣十日無所苦渴者宜五苓散之例一以自汗多而渴為液耗散故禁利水傷津藥一以小便數而渴為濕熱內盛故宜驅熱利水藥此當利不當利之別也若當利不利必就陽明燥火而成畜血發黃不當而利必耗膀胱津液而成燥血發狂此皆誤治之失也又按活人書云傷寒陽明證宜下少陰證宜溫夫陽明之經證身熱目疼鼻乾頭痛可宜下乎少陰之傳經熱邪可宜溫乎況溫病熱病之少陰尤不可溫也自奉議此説行後世蒙害者不少矣又兩感證先救裏以四逆湯後救表以桂枝湯長沙本云先後發表攻裏未嘗言救裏也今以攻為救豈不相背若用四逆湯是以火濟火而腹滿讝語囊縮等證何由而除兩感雖為死證亦不當如是處治也至於直中三陰寒證仲景在太陰則曰藏寒以太陰居中邪不能入必因冷物受傷也在少陰不曰中寒即曰少陰病者以少陰本寒水藏若陰寒中藏必死今受病者少陰經耳故處方皆用經在厥陰乃曰中風以風喜傷肝也凡六經中俱有中風傷寒之辨如太陽脈浮有汗為中風浮緊無汗為傷寒陽明善飢為中風不能食為傷寒少陰耳聾脅滿為中風口苦咽乾為傷寒若三陰風寒無變異形證但以四肢煩疼為中風手足寒厥為中寒耳凡傳經少陰熱證在本經失治或治之未當則復傳厥陰熱深厥亦深而咽痛者為喉痹嘔者轉為吐癰膿下利者轉為便膿血甚者發熱厥逆躁不得臥仍是腎氣先絶而死矣凡虛寒壞證多少陰厥陰然少陰最忌發熱發熱則恐腎中真陽飛越厥陰最喜發熱發熱則陰盡復陽但少陰發熱必大發躁悶亂不安誠為危候若利止厥回脈見陽微陰浮又為欲愈之徵也厥陰發熱則厥逆止而漸溫腹脹少緩而囊縱吐利止而思食方為陰盡復陽若見煩熱消渴脈數又為真陰灼爍之象矣又有少陰中風證按盛起東云凡初起但覺畏寒飢不能食欲吐不吐腹濡滿大便祕小便頻數及多脈來弦細浮弱按之無根此為少陰本虛自中之風慎不可以腹滿不大便而誤下之下之必不可救也蓋寒則自利腹痛風則腹滿不大便而按之不堅寒則小便清利風則小便頻數寒則身冷厥逆風則自煩熱而手足煩疼寒則逆不食風則欲吐不吐飢不能食稍食則脹滿不禁寒則脈來沈細風則脈來浮弱以風本陽邪上逆與寒證陰邪下泄不同即如中風之合病則嘔傷寒之合病則利是也傷寒外編云病在三陰皆有下利腹痛厥逆躁渴但屬於陽者必先發熱頭痛漸至唇乾舌燥煩渴喜冷飲面色光彩語言清亮手足溫暖爪甲紅潤身輕易於轉側呼吸出於自然小便或赤或澀脈來浮洪數大此陽證也至四五日後傳進三陰血分變出四肢厥冷乍溫或燥結或下利躁渴潮熱自汗讝妄揚手擲足氣息喘急小腹痛不可按舌上胎厚而黃黑甚則芒刺燥裂脈沈而滑皆三陽傳變之熱證其或身寒逆冷神氣昏昏脈來沈實附骨乃火極似水緣陽邪失於汗下所致雖身冷而不欲近衣雖神昏而氣色光潤雖腹痛必脹滿而喘急不可按揉下利傍流清水小便黃赤大便或祕或黑厥逆亦不過肘膝厥過即發熱厥深熱亦深也此為陽極似陰不可誤認為寒而溫之若發於陰者始病不發熱無頭痛便自利厥逆腹痛口不渴身體沈重難以轉側嘔吐瀉利惡寒踡臥戰栗吐沫手足指冷厥逆爪甲青黑面如刀刮顏色黯慘而不光舌上雖黑而無胎脈來沈遲細小皆三陰自中之寒證其或面赤戴陽身有微熱咽乾煩躁脈來數疾無倫乃水極似火因虛冷內盛逼其浮陽發外也又如始本陽證誤服涼藥攻熱太速其人腎氣本虛胃氣素弱遂變陰寒雖發熱面赤欲引衣自覆而手足必寒或躁渴欲飲水而不能咽或嘔噦而咳逆或咽痛而鄭聲時噪悶亂欲坐臥泥水中稍祖露即畏寒莫禁腹痛可按可揉而不鞭滿下利清穀白沫及淡黃水小便清白厥逆過肘膝而不復熱舌上略有黑胎與灰色胎胎雖老必極薄無津而不燥裂無芒刺脈多沈細或浮大數疾按之必虛軟無力不鼓擊於指下者此為陰極似陽不可誤認熱證而下之此證急溫尚且十難救一下之百不一生矣喻嘉言云凡傷寒初起發熱煎熬津液鼻乾口渴便祕漸至發厥不問知其為熱也若證忽變陰厥從古至今無一也蓋陰厥得之一起便直中陰經唇青面白遍身冷汗便利不渴身踡多睡醒則人事了了與傷寒傳經之熱邪轉入轉深人事昏惑者萬萬不同如先犯房勞而後傷寒世醫無不為陰證往往投以四逆等湯促其暴亡而諉之於陰極莫救總由傳派不清耳蓋房勞而病外感者其勢不過比常較重以陰虛陽往來之非陰盛無陽之比汗下藥中不過稍加甘溫照顧元氣耳且仲景明言厥多熱少則病進熱多厥少則病退厥愈而熱過久者必便膿血發癰厥應下而反汗之必口傷爛赤先厥後熱利必自止見厥復利利止反汗出咽痛者其喉為痹厥而能食恐為除中厥止思食邪退欲愈凡此之類皆熱深厥深之旨原未論及於厥陰也至於陽分之病而妄汗吐下致汗多亡陽吐利煩躁四肢逆冷皆因用藥差誤所致非以四逆真武等湯挽之則陽不能回亦原不為陰證立方也蓋傷寒發熱發渴定然陰分先虧以其誤治陽分比陰分更虧不得已從權用辛熱先救其陽與純陰無陽陰盛隔陽之證相去天淵不知治陰證以救陽為主治傷寒以救陰為主傷寒縱有陽虛當治必看其人血肉充盛陰分可受陽藥者方可回陽若面色黧黑身如枯柴一團邪火內燔者則陰已先盡何陽可回而敢助陽劫陰乎證治方云若證未辨陰陽且與四順丸試之即理中倍甘草可見從前未透此關縱有深心無可奈何耳至於元氣大虧陰盛格陽之證庸醫往往反認陽證遽施下藥殺人多矣今粗工治傷寒漫不辨其名證一見發熱其初概用表藥不論虛實不分經絡雜用三陽經藥表之不愈五六日間稍見胸腹滿悶便以承氣下之汗下不效別無措手委之天命總由未得傷寒真訣耳傷寒者冬時嚴寒感冒殺厲之氣而病也交霜降節後春分節前病發熱頭痛者皆謂之正傷寒始風寒之在太陽經必惡寒發熱頭項痛腰脊強脈浮而緊無汗不能食為傷寒麻黃湯若尺中遲弱者為衛氣不充當用黃耆建中為主若陽虛不能作汗或面色戴陽足冷夾陰者再造散脈浮而緩自汗能食者為中風桂枝湯脈浮緊而數身疼不汗出發熱煩躁為風寒兩傷大青龍湯若脈浮緩自汗身不疼但重乍有輕時無少陰證或乾嘔或咳或渴或利或噎或小便利少腹滿或喘為心下有水氣小青龍湯太陽表邪不已或犯膀胱之本或入陽明之府或傳陽明之經所謂犯本者如太陽經發汗不解誤用利水藥熱結膀胱小便難煩渴引飲者五苓散若自汗多者屬陽明則又禁用五苓恐重竭其津液也如狂喜忘為畜血桃核承氣代抵當選用火迫劫汗亡陽驚狂起臥不安者此火逆犯本也救逆湯如脈浮數而嘔吐者必傳陽明經其證身熱目疼鼻乾不得臥頭痛自汗而脈長桂枝加葛根湯有食必作脹悶更加橘半枳朴若自利者葛根湯嘔加半夏稍遲必入陽明之府其證日晡潮熱手足漐漐自汗而脈滑此屬胃實俟其結定用承氣輩攻之如陽明不入府邪氣在經未罷必傳少陽其證頭疼目眩耳聾口苦脈弦脅痛寒熱往來小柴胡湯蓋少陽居表裏之半外有太陽之惡寒內有胃府之惡熱故往來寒熱少陽與厥陰為表裏少陽主邪欲入而寒熱交爭厥陰主邪欲出故厥逆反覆也少陽寒熱往來六七日至十餘日大便不行腋下汗出方可用大柴胡微利之緣膽無出入瀉土所以瀉木也如八九日腋下無汗為膽未實誤用承氣下之必犯少陽之本則胸滿驚煩小便不利讝語一身盡重不可轉側者柴胡龍骨牡蠣湯至傳三陰太陰則腹滿嗌乾下利而脈沈細者小建中和之因誤下陽邪內陷而腹痛者桂枝加芍藥痛甚加大黃此關乎平昔元氣盛衰及有無宿滯之分也熱傳少陰必口燥舌乾而渴脈沈下利邪熱奔迫故也若手足微逆者四逆散若下利清水心下鞭痛而讝語者大承氣湯又有元氣素虛或汗下過劇陽氣傷而成虛寒證者不可執認傳經而禁絶溫補也熱傳厥陰則有下奪外解之分若手足厥寒脈細欲絶或下利脈大而腸鳴者並用當歸四逆湯若誤下而脈沈厥逆自利煩滿囊縮小承氣湯若脈浮緩而囊不縮雖厥逆下利必自愈乃陰盡復陽風從木化也可與小劑桂枝湯助其作汗而解此六經證治大略耳其他誤治變證詳纘論六經諸篇及細證例中此不復贅傷寒汗後熱不退仍頭項強痛而勢稍減者更宜汗之若反劇煩擾者必有夾食夾痰或有宿病之故當推其源而治之大凡汗後熱不退作危證斷之若汗後熱愈甚脈躁疾名陰陽交者死傷寒五六日裏證具而下之下後熱不退胸中堅滿不消或腹中疼痛不止脈尚數實者此為下未盡或下後一二日更煩熱喘滿者並可用小承氣湯復下之若大下後身熱不退心中結痛懊憹頭汗梔子豉湯湧吐之凡傷寒六日傳六經為一候七日當解若不解再傳至十三日謂之過經不解二十餘日不解謂之再過經不解宜詳虛實輕重或和解或下奪之若脈尺寸陷者大危若過經不解脈虛數人弱發熱口乾舌燥者此為虛證不可下以參胡三白或小柴胡增損主之至於愈後熱不盡伏留藏府經脈之間致變他病不一如邪火伏於脾則變中滿不食伏於胃移熱於脾則變休息痢伏於心移熱於小腸則變淋血溺痛痛甚則小便不通多不可治伏於肝則變囊癰陰腫伏於肺則變肺癰吐腥伏於腎則變羸瘦怯弱伏於脾腎之間則變癱臥不起久而成痿伏於肝脾之分邪正交攻則變痎瘧至若太陽少陽失汗則毒結腮頰之間謂之發頤陽明少陽失下則邪結於藏府之內多成癰腫凡此皆傷寒大病後餘邪為患也若兩感於寒者一日太陽與少陰俱病則頭痛口乾煩滿而渴易老用大羌活湯主之此專在表也二日陽明與太陰俱病則腹滿身熱不欲食讝語黃連解毒湯主之此意在和也三日少陽與厥陰俱病則耳聾囊縮而厥雙解散主之此重在裏也至水漿不下不知人事者六日死若三陰三陽五藏六府皆受病則榮衛不行藏府不通而死矣則知一藏一府受病猶可治也按兩感皆是熱邪亢極之證朱氏妄言前三日真為病寒以四逆湯急溫裏後以桂枝湯急解表而書方又有用麻黃附子細辛湯之説殊不知傳經者皆屬陽證陰證本無熱邪安得有傳變之理即傷寒之病兩感者亦少惟溫病熱病居多以溫熱咸從少陰發出太陽即是兩感之證所以守真特立涼膈雙解白虎承氣等湯以兩解溫熱病表裏之熱毒也非特溫熱病之有兩感也凡下元虛人染患疫癘多有三日斃者蓋疫癘之勢較傷寒更劇所以死在三日也傷寒例所言六日死者是言傷寒之兩感素問所言三日死者是言熱病疫病之兩感也非特溫熱疫癘之有兩感也即如冬溫之發於太陽少陰故始咽痛而後自利豈非兩感之證乎若陽氣素虛之人始病無發熱頭痛便惡寒踡臥腹與少腹痛自利厥逆脈沈者為直中陰經寒證太陰但有內寒而無外寒病則胸膈滿手足寒臍上痛下利清穀而不渴必因內傷冷物所致宜理中湯甚則加附子下利不止宜四逆湯少陰有寒有風寒則四肢厥冷吐利而渴渴不能飲惡寒踡臥身體疼當臍下小腹痛此腎藏真陽不足所致宜四逆湯口中和背惡寒者附子湯發熱脈沈麻黃附子細辛湯風則但覺畏寒而不厥冷自言腹滿而按之則濡大便祕小便頻欲吐不吐臥而欲起恍惚多驚心懸若飢稍食則痞脹不寧舌上灰黑或淡紫帶青脈來弦細浮弱以風性上行故其證頗似太陰而實少陰中風之證最難辨別宜桂枝湯加乾薑下虛甚者面赤戴陽急用桂枝人參湯加蔥白生附陰結不大便脹滿不能食者四逆湯下金液丹誤用寬脹藥必轉劇若攻下必死厥陰但有中風而無中寒若其人胃氣素常虛寒者則乾嘔吐涎沫頭痛吳茱萸湯加桂枝若腎氣素虛者則厥冷自利少腹痛四逆湯加肉桂凡陰證多有陰極似陽煩躁面赤脈數疾無倫躁過必畏寒渴不能飲此不獨真陽下虛而陰氣亦虛不能內守致虛陽擾亂而上泛外亡也急宜通脈四逆白通加豬膽汁及益元湯治之蓋陰盛於裏則躁煩下虛則虛陽上泛故面戴陽而煩渴內無熱故渴不能飲陽虛陰亢故身熱脈大而疾但無力耳陰證惡寒厥逆為陰經受寒雖陽氣微不至於劇故止宜溫經若陰極似者為陽氣衰微不能制其浮火宜兼溫補冬則白通通脈四逆輩夏則大順漿水冷香等然總不離辛熱也若交一陽後天令大寒有卒然倒仆昏不知人手足逆冷或口吐白沫嘔逆清水唇青面黑口鼻氣息微冷者為中寒按丹溪曰中寒者倉卒受寒其病即發而暴蓋中寒之人乘其腠理疏豁一身受邪難分經絡無熱可散溫補自解此胃氣大虛不急治去生甚遠戴元禮曰中寒是身受肅殺之氣口食瓜果冰水冷物病者脈必沈細手足冷息微身踡雖身熱亦不渴倦言語此言夏月中寒大順冷香或附子理中浸冷服若脈數飲水煩躁動搖者皆是熱證寒熱之異若水火也不可得而同治誤則殺人若在冬月中寒法當溫散輕則附子理中其則白通通脈劇則霹靂火焰庶可挽回緩則不救中寒之色必青唇口青身冷脈脫為入藏即死身和汗自出為入府即愈經曰血氣并走於上則為大厥暴死中寒脈散者死尺脈遲滯沈細寒在下焦經云陰盛生內寒因厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留留則血凝血凝則脈不通其脈盛大以澀故中寒夫經既言陰盛生內寒矣又言故中寒者豈非內寒先生外寒後中之耶經既言血凝則脈不通矣又言其脈盛大以澀者豈非以外寒中故脈盛大血脈閉故脈澀耶此中併有大疑請先明之一者人身衛外之陽最固今不由三陽而直中少陰蓋厥氣上逆積於胸中則胃寒胃寒則口食寒物鼻吸寒氣皆得入胃腎者胃之關也外寒斬關直入少陰腎藏故曰中寒也此內經所隱而未言者也一者其脈盛大以澀雖曰中寒尚非卒病卒病中寒其脈必微在傷寒證惟少陰脈他經則無其太陽膀胱為少陰之府才見脈微惡寒仲景早少陰施治而用附子乾薑矣蓋脈微惡寒正陽微所致腎中既已陰盛陽微寒從內生復加外寒斬關直入或沒其陽於內或逼其陽於外其人頃刻云亡故仲景以為卒病也寒中少陰行其嚴令埋沒微陽肌膚凍裂無汗如喪神守急用白通湯為主治蓋薑附追復元陽加蔥白以散寒加膽汁引入陰分然恐藥力不勝更以蔥尉臍中并灸氣海關元數十壯取脈漸來手足溫為效必外內協攻乃足破其堅凝少緩須臾必無及矣若其人真陽素擾腠理素疏陰盛於內必逼其陽亡於外魄汗淋漓脊項強鞭用薑附豬膽汁即不可用蔥及尉灼恐助其散令氣隨汗脫而陽無由內返也用薑附以勝陰復陽使既散之陽急復不知此義者加增藥味反牽制其雄入之勢必致迂緩無功也其次前藥中即首加當歸肉桂兼理其榮以寒邪中入先傷榮血故也其次前藥中更加人參甘草兼調其氣不爾恐薑附之猛直將犯上等矣用前藥二三劑後覺其清陽在躬運動頗輕更加黃耆白朮五味白芍陰陽平補不可歇手用群隊之藥以培陰護陽其人即素有熱痰陽出早已從陰而變寒至此無形之陰寒雖散而有形之寒痰阻塞竅隧者無由遽轉為熱薑附固可勿施其牛黃竹瀝一切寒涼斷不可用若因其素有挾熱妄投寒劑則陰復用事陽即擾亂必墮前功也用平補後嗣後總有頑痰留積經絡但宜甘寒助氣開通不宜辛辣助熱壅塞蓋辛辣始先不得已用其毒陽既安堵即宜休養其陰切勿喜功生事轉生他患也至於冬時反有非節之暖此屬春時陽氣發於冬時未至而至即為冬時不正之氣人感之而病者名曰冬溫冬溫雖發於冬時治法與傷寒大異蓋溫則氣泄寒則氣收二氣本相反也其證必心煩嘔逆咽痛身熱頭疼或咳嗽自汗或頭重面腫但始先咽痛後必下利陽脈浮滑陰脈弱濡與風溫不異但時令不同治之不得不為少異也按羅謙甫云冬溫一證雖關不正之氣而實正氣虛故邪得以入於少陰其經上循喉下入腹故咽必痛或下利也治之宜用陽旦湯加桔梗萎蕤或問冬溫何以竟入少陰而前所治方亦非少陰之藥其故何也石頑曰大凡四時各有正令冬月當寒而反不寒則少陰之氣不藏而不正之氣得以入傷經原非腎藏受病故但以桂枝湯中加黃芩一味專主驅散風熱不須更用他藥此仲景陽旦湯所由立也若有寒食停結或誤用寒涼藥食則寒邪外鬱溫邪中結冷食內伏更加入乾薑一味以溫散其中兼黃芩以涼解其外此仲景之陰旦又所必需若咽痛甚者則合甘草湯咳者合桔梗湯下利合茯苓甘草湯或陽旦加葛根茯苓不應則溫熱之氣併於明陽而蘊熱也葛根黃芩黃連湯若先受冬溫更加嚴寒外遏則外證雖惡熱煩躁而仍畏寒欲近衣者陽旦湯加麻黃石膏以發之有冬溫誤認傷寒而與辛溫表藥熱邪熱甚而胸腹滿悶醫者不察見其脹悶而屢用下藥大下後仍發熱無休止時脈反數者此陰血傷故也朝用獨參湯暮進六味丸此陰陽俱虛氣血俱弱故熱不得止息所以用六味必兼獨參湯以資陽生陰長之功若服後熱勢漸解飲食漸進神氣漸清脈息漸和者方可收功今世遇冬溫之證鮮能辨識概以傷寒法混治致變斑黃喉痹唾利膿血等證者皆由誤治所致也若誤用辛溫發汗而發斑成溫毒者當用犀角升麻甘草等分煎服或升麻葛根湯加犀角黑參甚則犀角黑參湯之類選用然冬溫為病亦自不一當隨所見證治之凡冬溫溫毒大便泄瀉而讝語脈虛小手足冷者皆不治也若春夏秋三時感冒非時暴寒謂之寒疫亦曰感冒夾食則曰停食感冒雖非時行疫氣以非其時而有其氣故謂之寒疫而實非疫也其證發熱惡寒頭疼骨節痛無汗或嘔逆惡心其脈人迎多浮緊亦有弦數者夾食則氣口緊盛亦有滑數者若夾寒食則澀滯夾風痰則浮滑而疾也然又有人沈小絶不似外感者見停食感冒之脈有人迎極短小氣口極弦細其人自言傷食受寒服發散兼消導之藥一二劑脈反浮大則知未服藥時脈沈小皆為寒食鬱故也大抵治非時感冒止宜辛乎解散如參蘇飲芎蘇散香蘇散神朮湯皆可選用有食正氣散按證加減如見太陽羌活防風陽明葛根蔥白少陽柴胡半夏若天氣未熱病勢頗盛不妨從權稍加桂枝佐羌活輩汗之蓋冬溫之與寒疫俱是非時邪氣用藥亦不可拘於常候猶冬溫之用辛涼寒疫之用辛溫也宜矣即如溫病熱病而見脈緊暴寒黃芩白虎湯中未嘗不稍加桂枝五七分也此證不必拘傷寒六經例治大率春分已後則少陽風木主令況春時之寒必兼之以嶚峭之風風傷少陽少陽在內則太陽陽明在外病則三經俱受所以古人治寒疫之方咸不分三陽而治但見某經證多則加用某經之藥為權衡耳若治之不得其宜後變壞病則與傷寒無異也蓋非時暴寒雖從時令傷犯然寒則大都不越太陽以寒氣而犯寒水之經從其類也即如夏月暑寒之證多有頭痛骨節疼惡者此非太陽之證歟若夫天時寒暖偶因脫露謂之傷風其證必咳嗽自汗清涕甚者亦發熱頭痛但治有時月之殊春月風喜傷肝人迎脈多緩而帶弦必自汗惡風宜芎蘇加減夏月肌肉本疏多傷陽明病則肌肉因閉氣口多見弦長而反無汗宜葛根蔥白湯加減兼暑消暑十全散秋月微涼先鬱皮毛手太陰受邪人迎脈多平而氣口脈多細澀不可拘人迎以候外邪也宜金沸草散加減冬月則傷太陽必自汗脈浮緩宜桂枝湯咳甚而喘有水氣宜小青龍湯蓋陽邪多從背受由背俞而入於肺故必咳嗽生痰也然傷風與傷熱證類相似傷風則人迎浮大咳嗽自汗鼻流清涕痰必從喉中嗽出發散則愈傷熱則氣口軟大咳嗽自汗但鼻乾痰結咽腭腫痛痰從上腭咯出為異不可發散宜辛涼清肺為主萎蕤湯去麻黃川芎加前胡薄荷傷風而復傷熱必加躁煩宜萎蕤湯倍活石膏有酒客濕熱素盛痰飲結中外最易傷風素問謂之漏風其證身熱解惰汗出如浴惡風少氣治以澤朮麋銜湯以三指撮為後飯今治此證以澤瀉生朮各五錢黃耆三錢葛根防已羌活麻黃各錢熱服取汗最效又方以桂枝湯加黃耆麻黃根防風半夏厚朴每遇發時煎取一二劑後用黃耆白朮防風澤瀉茯苓之屬調理肥盛濕熱者導痰湯加羌防最當又有接內時偶感微風藏於腎經則內風與外風相召極易傷風素問謂之內風其證面胕龐然腫不能正偃正偃則咳宜小青龍去麻黃加杏仁甚則加附子先去客邪次用真武湯治本然後更以腎氣丸調理又有素虛勞人更感風寒裏急腹痛悸衄失精煩熱口燥者桂枝湯加龍骨牡蠣主之至春分節後天令溫暖有人壯熱為病者乃溫病也經云冬傷於寒發為溫病又云太陽病發熱而渴不惡寒者為溫病言冬時伏氣隨時溫熱發出但所發之因不同有感非時暴寒而發者有飢飽勞役而發者有房室作力而發者所感之客邪既殊發出之經絡亦異所謂溫病之脈行在諸經不知何經之動也當隨其經證而治之凡溫病之發必大渴煩擾脅滿口苦不惡寒反惡熱脈氣口反盛於人迎明係伏邪自內達表必先少陽經始若因客寒而發者宜小柴胡隨所見證加減無客邪者黃芩湯主之然溫病亦多傳變併合未有不及少陽者如太陽少陽合病黃芩湯少陽陽明合病承氣湯三陽合病大柴胡湯或雙解散加減凡三陽表證煩熱口渴俱宜黃芩湯之類據此合病證治則傳變併病可例推矣大抵治溫病熱病無正發汗之理蓋其邪自內達外無表證明矣若果證顯非時暴寒惡寒頭痛而脈浮緊者不可純用表藥宜梔子豉湯或益元散加薄荷蔥豉重則涼膈散去硝黃加蔥豉探吐取汗最妙蓋此怫鬱之熱乘春溫之氣而雖有非時暴寒止宜辛平之劑發散若頭痛如破者為暴感寒風勢盛先宜葛根蔥白湯撤其暴邪然後用治溫本藥若額與眉稜俱痛選奇湯脈弦而兩額角傍痛寒熱口苦小柴胡去參半加栝蔞根若表證不解邪入府者雙解散若汗下不解脈轉洪大數盛表裏皆實讝妄狂越此熱在三焦也三黃石膏湯凡溫病下後熱不退下證尚在再三下之以熱退為度若熱不止而脈澀咽痛胸滿多汗者此熱傷血分也葶藶苦酒湯探吐之雖熱退尚全愈者隨證調之凡下之前後或大汗將出或大汗已出或未下後餘熱不止而反大汗淋漓此實熱雖去而餘邪未盡再與小劑黃芩湯或解毒湯調之若下後渴雖減而飢欲得食者此伏邪初散陰火乘虛擾亂也凡溫熱下後多此慎勿便與粥飲得食必復若汗下後一切煩渴引飲須以水細細飲之渴未止者頻頻時與不可過多以成留飲不散也設若不與飲之則熱轉甚危而死矣世所謂交陽者非陰寒交熱以為陽熱也乃怫熱畜之於裏而鬱極乃發則交傳出於表之陽分是謂交陽而後作汗也或怫鬱過極而不能交出於表者是鬱極不發否極不泰即正氣衰殘陰氣先絶陽氣後竭而死矣大欲汗而脈忽沈伏者陽氣並入於裏故也交陽而躁亂昏冒者裏熱鬱極故氣亂則神昏而躁擾也凡欲作汗無問病之微甚或已經新下者或下證未全者咸以涼膈散調之甚者宜黃連解毒湯或下後二三日或未經下腹滿煩渴脈沈實而有下證者三一承氣湯下之勢劇者合黃連解毒湯或已戰不快或戰後汗出不快或微戰數次經大戰而汗不出者乃并之不甚戰而病不去也通宜三一承氣湯或更合黃連解毒湯下之以散怫熱而開鬱結也所以戰汗時頻與熱薑湯助其開發最佳免致戰不快而無汗之患大法曰脈浮不可下溫熱病已有裏證脈沈後二三日脈反漸浮汗不能出者三一承氣湯微下之凡此諸可下證或得利而汗便出者或服藥而怫鬱頓開先汗出而後利者或利性但隨汗泄則氣和而愈竟不利者亦有戰不快交不過而死者或不戰而汗出者或但戰無汗而愈者或不戰無汗而愈者世俗未知直以寒戰栗為陽虛陰勝因而誤治者多矣凡溫病發於三陰脈微足冷者多難治內經所謂病溫虛甚死是也凡溫病大熱脈反細小手足逆者死證也凡溫熱病初起大熱目昏讝語熱甚脈小足冷五六日而脈反躁急嘔吐昏沈舌本焦黑或失血躁熱脈大或痙搐昏亂或脈促結代沉小者皆死溫病熱病大熱不得汗者死得汗而反熱其脈躁盛者亦死也凡溫病熱病不當汗而誤汗之狂言不能食其脈躁盛者皆不可治也凡溫病之熱咸從內而發於表所以最忌辛溫發汗發汗多致不救也故仲景云太病發熱而渴者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必讝語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癎時瘛瘲若以火薰之一逆尚引日再逆促命期此溫病誤汗而為風溫也又傷寒例云陽脈浮滑陰脈濡弱更遇於風變為風溫此溫病更遇於風之風溫也以少陰伏邪方將發出太陽客邪又從外襲表邪新入裏邪初出故其脈輕則浮滑重則濡弱上文陰陽俱浮之互辭言伏於少陰之邪熱悉從風木之令而發出於肌表故其證一一盡顯太陽少陰二經又嘗見冬溫一證每多誤汗而成溫毒發斑者亦有誤施汗下而變咽喉不利唾膿血者蓋冬溫亦屬太少陰證緣誤治而併傷厥陰之經也按風溫一證仲景但言誤治之失並不論及治法者以既經誤治即欲挽回末由也已喻嘉言嘗謂風溫多死於三日者謂其即是兩感而更加變重耳不但溫病之不可以傷寒寒疫法治也即冬溫亦不可以傷寒例施也因其發在冬時故誤治尤多所以仲景厥陰例中有麻黃升麻湯一條正以治冬溫之誤治而變咽喉不利唾膿血者即此而推可用麻黃升麻湯去麻黃升麻乾薑白朮而借治溫病誤其汗之風溫也并可悟黃芩湯加桂枝石膏治溫病更遇於風之風溫也再按風溫一證仲景絶無方藥而活人書治法頗多參其所主之方皆是治先傷熱而復感風或已傷風而更受熱之證近世亦曰風溫較伏氣所發者雖死生輕重懸殊而究治之理則一似風痰結聚於肺故汗下兩難汗之則讝語煩熱不得臥善驚目亂無精汗身重下之則小便難大便利尤不可用溫針則耳聾難言針溫止宜辛涼解熱兼疏風利痰然雖禁發汗又不得不兼用表藥但禁溫覆迫汗耳若發熱頭眩咽喉乾痛舌強痞滿者用萎蕤湯無大熱而渴用栝蔞根湯熱不解用敗毒散寒熱而渴小柴胡加萎蕤桔梗惡寒發熱本方去參加栝蔞石膏渴者去半夏加栝蔞根舉世皆以風熱咽痛唾痰聲嗢者為風溫雖治法不遠殊失風溫本旨矣尚論以春月時令本溫且值風木用事風溫二字不得分之為兩凡溫病者悉為風溫是又矯揉太過矣夫春夏溫熱之邪能傳染者即時行疫癘也吳又可曰瘟疫之邪皆從口鼻而入不在經絡舍於伏脊之內去表不遠附近於胃乃表裏之分界是即內經瘧論所謂橫連募原是也凡人本氣充滿邪不易入適逄虧欠因而乘之感之淺者待有所觸而發感之深者中而即也始先陽氣鬱伏凜凜惡寒甚則四肢逆既而陽鬱發中外皆熱發即昏昏不爽壯熱自汗此邪伏於募原即使汗之熱不能解必俟伏邪外發表氣潛行於內精氣自內達表此時表裏相通大汗淋漓邪從外解此名戰汗當即脈靜身涼而愈若伏邪未靜必復發熱至伏邪已發方有變證其證或外解或從內陷更表裏先後不同有先表而後裏者有先裏而後表有但表而不裏者有但裏而不表者有表而再表者有裏而再裏者有表勝於裏者勝於表者有表裏分傳者此為九傳從外解者或發斑或戰汗狂汗自汗盜汗從內陷者胸膈痞悶腹痛燥結熱結傍流協熱下利或嘔吐惡心讝語舌胎當因證用治疫脈不浮不沈而數晝夜發熱日晡益甚頭疼身痛宜用達原飲以透達募原之邪氣若見少陽陽明太陽隨經加柴胡葛根羌為引以提其邪出陽分也然證有輕重不等藥之多寡隨宜務活法感之輕者舌上白胎亦薄熱亦不甚脈亦不數其不傳裏一二劑自解稍重者必從汗解如不能汗邪氣盤錯於募原也只以本方主之感之重者舌上胎如積粉服藥不從外解而從內陷舌根先黃漸至中央此邪漸入胃也前方加大黃下之若脈長而洪數大汗多渴此邪氣適離募原欲表未表白虎湯證也如舌上純色兼見裏證此邪已入胃乃承氣湯證也有二三日即離募原者有半月十日不傳者有初得之四五日而淹淹懾懾二六日後陡然勢張者元氣勝者毒易傳化元氣薄者邪不化即不傳如他病欠虧適逢時疫能感不能化安望其傳不傳則邪不去淹纏日久愈沈愈伏誤認虛證而進參耆愈壅愈固不死不休也疫邪為病有從汗解者有無汗竟傳入胃者有自汗淋漓熱渴反甚終得戰汗方解者有胃氣壅鬱必下乃得戰汗而解者有汗解裏未和越三五日復發者有發黃因下而斑出者有竟從發斑而愈者有裏證急雖有斑非下不愈者此雖傳變不常亦為常也又有局外之變男子適逢接內或向來下元虛空邪熱乘陷於下焦氣遂不舒致小便祕塞小腹脹滿至夜發熱與導赤五苓不效得大承氣一服小便如注而愈女子經水適來適斷失血崩帶及心痛疝氣痰火喘急凡此皆非常變蓋因疫而發舊病但治其疫而舊病自已然大勞大欲大病久病後此為四損以正氣先虧邪氣自陷多不可救也瘟疫發熱一二日舌上白胎如積粉早服達原飲一劑午後舌變黃色隨現胸膈滿痛大渴煩躁此邪毒傳裏也前方加大黃下之煩渴少減熱去六七午後復加煩躁發熱通舌變黑生刺鼻如煙煤此邪毒混合三焦復淤到胃急投大承氣傍晚大下至夜半熱退次早胎刺如失此一日之間而有三變數日之法一日行之因其毒盛傳變亦速用藥不得不緊設用緩劑必死無救嘗見瘟疫二三日即死者皆此類也瘟疫初起脈雖數未至共大其邪尚盤結於募原宜達原飲誤用白虎既無破結之能但求清熱是揚湯止沸耳若邪已入胃非承氣不愈誤用白虎既無逐邪之能徒伐胃氣反抑邪毒致脈不行因而細小又認陽證陰脈益不敢下湯藥雜進愈投愈危當此急投承氣庶可救也邪伏於募原表裏之間至其傳變或出表或入裏或表裏雙傳醫見有表復有裏乃引經論先解表乃攻其裏此大謬也嘗見大劑麻黃一毫無汗轉加煩躁者何耶蓋發汗之理自內以達表今裏氣結滯陽氣不得敷布於外即四肢未免厥逆又安能氣液蒸蒸以達表譬之水注閉其後竅則前竅不得涓滴與發汗之義同凡見表裏分傳之證宜承氣湯先通其裏裏氣一通不待發散多有自汗而解裏證下後脈浮而微數身微熱神思不爽此邪熱浮於肌表裏無壅滯也雖無汗宜白虎湯邪從汗解若大下後或數下後脈空浮而數按之豁然如無宜白虎加人參湯覆益即汗解下後脈數而浮原當汗解遷延五六日脈證不改仍不得汗者以反覆下數致周身血液枯涸故不得汗白虎加人參湯以助周身之血液鼓舞元氣開發腠理即得汗解也裏證脈沈而數當下之下後脈浮當得汗解今不得汗後二三日脈復沈者募原餘邪復淤到胃也更宜下之更下後而脈再浮者仍當汗解宜白虎湯裏證下後熱退身涼越四五日復發熱者此非關飲食勞復乃募原尚有餘邪隱匿因而發熱此必然之理不知者每每歸咎於病人誤也宜再下之則愈但當少與慎勿過劑以邪氣微也應下失下口燥舌乾而渴身反熱減四肢微厥欲得近火擁被此陽氣伏也既下厥回去火減被脈大而數舌上生津不思水飲此裏邪去而鬱陽暴伸也瘟疫下後二三日或一二日舌上復生胎刺邪未盡也再下之胎雖未去已無芒刺而軟然渴熱未除更下之熱渴減芒刺脫日後更復熱又生胎刺更宜下之凡下不以數計有是證即投是藥醫人見理不透經歷未到中道生疑往往遇此證反致擔閣但其中間有一日一下者有應連下二三日或三四日者有下二日間一日者甚緩急之間有應用小柴胡湯去參半加栝蔞根知母者有應用犀角地黃湯者至投承氣某日應多與某日應少與此非可以言傳也但數下之證百人中之一二人而已瘟疫愈後脈證俱平大便二三旬不行時時作嘔此為下格之證蓋下不通必返於上宜調胃承氣熱服宿垢頓下嘔吐立止慎勿驟補少與參耆下焦復閉嘔吐仍作也凡客邪貴乎早治勿拘於下不厭遲之説若應下之證見其無結糞以為下之早而引初鞭後溏為例此誤也不知承氣本為逐邪非專為結糞而設必俟結定血液為熱所搏變證迭起是猶養虎遺患也況有平素多濕熱人溏糞失下但蒸作極臭如敗醬藕泥臨死不結者假如經枯血燥之人或老人血液衰少多生燥結在經所謂不更衣十日無所苦有何妨害是知燥結不致損人毒邪之為殞命也假令滯下初起質實而頻數窘急者與大黃下之此豈謂結糞而然哉疫邪傳裏遺熱下焦小便不利邪無輸泄經氣鬱滯其傳為疸身目如金宜茵陳蒿湯若用茵陳五苓不惟不能退黃小便亦難得利此乃胃家移熱是以大黃為專功也瘟疫邪在胸膈滿悶心煩嘔喜腹不滿欲吐不吐欲飲不飲欲食不食此邪熱與痰飲結聚胸中也宜瓜蒂散吐之邪留血分裏氣壅閉非下之則斑不出斑出為毒邪外解下後斑漸發更不可大下設有下證宜少與承氣緩緩下之若大下則中氣不振斑毒內陷則危宜用白芍當歸以和血升麻柴胡白芷以託邪大劑穿山甲末以透毒名託裏舉斑湯如下後斑出復大下斑毒隱伏反見循衣撮空脈微者前方加人參一錢得補不出者死凡斑有汗出不徹而熱不退者宜白虎湯斑出不透而熱不者宜舉斑湯有斑汗並行而並不透者二湯合用凡時疫日久失下自利純臭水晝夜十數行口燥唇乾舌裂此熱結傍流也急與大承氣一服去其宿垢頓止凡失下以致循衣撮空肉惕振戰目不了了邪熱愈盛元神將脫補之則邪毒愈甚攻之幾微欲絶不得已用陶氏黃龍湯治之此證不下必死故用此法庶幾回生於萬一也得下後用生脈散加地黃當歸白芍知母陳皮甘草調之如方食肉而適病致停積在胃用大承氣湯連下惟是臭水稀糞其病不退必加人參一錢在內雖月餘所積之物一便下凡疫病有首尾能食者此邪不傳胃切勿絶其飲食但不宜過食耳有愈後十數日微渴微熱不思飲食此微邪在胃正氣衰竭若強與之即為食復凡舌胎自白而漸變黃邪在募原故白在胃則黃胎老變沈香色白者不可下黃者宜下黑者急下下後胎不脫舌刺舌裂舌短舌鞭舌卷皆當下白砂胎黑胎俱下惟白潤滑澤者邪尚在募原也如別有下證宜達原飲加大黃若大汗脈洪長而渴未可下宜白虎湯汗更出日赤咽乾氣噴如火小便赤黃涓涓作痛揚手擲足脈沈而數皆為裏熱之極下之無疑潮熱讝語善太息此胃實也心下滿心下高起如塊心下脹痛腹脹滿痛按之愈其皆下頭脹痛下之立止若初起未可下小便祕大便不通氣結不舒大便行小便立解有血液枯竭者無表裏證為虛燥宜導法凡陽證似陰者瘟疫與溫病熱病傷寒通有其陰證似陽者惟傷寒有之在瘟疫必無此證也陽證似陰為外寒內熱故小便赤澀陰證似陽為上熱下寒故小便清白但以小便赤白為據萬不一失夫疫病四時皆有但盛與不盛耳盛行之際沿門闔戶病皆一般者謂之時行大疫人皆知之不盛之時人偶感之不過發熱頭痛與尋常感冒相似即有傳染不過左右服役之人又烏能知疫也病人無處追求每每妄訴病原醫家不善審察未免隨情錯認誤引東垣勞倦傷脾為例壅邪轉熱多致危殆喻嘉言曰四時不正之氣感之因而致病初不為疫也因病致死病氣尸氣混合不正之氣以故雞瘟死雞豬瘟死豬牛馬瘟死死牛馬推之於人何獨不然所以飢饉兵凶之際疫病盛行大率春夏之交為甚蓋溫暑濕熱之氣交互結蒸人在其中無隙可避病者當之魄汗淋漓一人病氣足充一室況於連並榻沿門闔境共釀之氣蓋以出戶尸蟲載道腐墐燔柴掩席委巷投涯種種惡穢上溷蒼天清淨之氣下敗水土物産之氣人受之者親上親下各從其類有必然之勢如世俗所稱大頭瘟者頭面腮頤腫如瓜瓠者是也所稱稔頸瘟者喉痹失音頸大腹脹如蝦蟆者是也所稱瓜瓤瘟者胸脅起嘔汁如血者是也所稱楊梅瘟者遍身紫塊忽然發如黴瘡者是也所稱疙者發塊如瘤遍身流走旦發夕死者是也所稱絞腸瘟者腸鳴乾嘔水泄不通者是也所稱軟腳瘟者便清泄白足腫難移即濕溫遍行是也小兒痧痘尤多已上疫證不明證治咸委劫運良可傷悼然而盛夏濕溫之證即藏疫癘在內一人受之則為濕溫一方傳遍則為疫癘所以疫癘之發每每盛於春夏者以其熱暑濕三氣交蒸故也蓋春主厥陰肝木秋主陽明燥金冬主太陽寒水各行其政惟春分以後至秋分以前少陽相火少陰君火太陰濕土三氣合行其事天本熱也而益以日之暑日本烈也而載以地之濕三氣交動時分時合其也以風動於中勝濕解蒸不覺其苦其合也天之熱氣下地之濕氣上人在是氣之中無隙可避故病之繁而且苛者莫如夏月為最以無形之熱蒸動有形之濕即無病之人感之尚未免於為患況素有濕熱或下元虛人安得不患濕溫之證乎是以濕溫之證最忌發汗發汗則濕熱混合為一而中氣盡傷多成死證惟宜分解先扶中氣使中氣徐領其表其裏而上下盡消故多愈也至於疫證則邪正混合邪極勝正極衰轉眼立斃苦寒傷胃溫補助邪如人中黃丸之類不為合法也夫傷寒之邪先行身之背次行身之前後行身之側由外廓而入瘟疫之邪則直行中道流布三焦上焦為清陽故清邪從之上入下焦為濁陰故濁邪從之下入中焦為陰陽交界凡清濁之邪必有此區分甚者三焦相混上行極而下下行而上傷寒邪中外廓故一表即散邪行在中道故表之不散傷寒邪入胃府則腹滿便堅故可攻下疫邪布在中焦散漫不收下之復合此與治傷寒表裏諸法有何涉哉或問春夏蒸氣成疫豈冬溫獨非疫耶蓋冬月過溫腎氣不藏感而成病正與不藏精之春溫無異計此時有春無冬三氣即得交蒸成疫然遇朔風驟發則蒸氣化為烏有矣是以東南冬月患正傷寒者少患冬溫及痘瘡者最多西北則秋冬春皆患傷寒殊無瘟疫痘瘡之患此何以故西北土地高燥即春夏氣難上升何況秋冬之凝沍東南土地卑濕為霧露之區蛇龍之窟其濕熱之氣得風播之尚有可耐旦暮無風水中之魚衣中之虱且為飛揚況於人乎蒸氣中原雜諸穢益以病氣尸氣無分老少觸之即同一病狀矣此時朔風了不可得故其氣轉積轉暴雖有薰風但能送熱不能涼盛世所謂解慍阜財者在兵荒反有注邪布穢之事矣按吳又可所論皆是尋常所有疫癘喻嘉言所言乃天地不正之大疫不可彼此膠執也夫瘟疫證類端豈可一律而論若傷於氣則頭項腫脹傷於血則肢體疙傷於胃則嘔汁如血傷於腸則水泄不通至入藏則不知人不待救藥則斃矣大法以證為則無以脈疹其傷之輕者二三日尚能行動至四五日後忽然大熱慎勿誤認傷寒而與表藥發汗不惟不解其熱轉甚而危殆矣其初病惡寒發熱頭痛宜敗毒散躁熱不汗通解頭痛如破十神湯兼瘴癘腳膝疼軟獨活散此皆為表證多者立方也若一病便壯熱無寒多汗神昏嘔逆痞滿等證又當從涼膈雙解三黃石膏黃連解毒兩解表裏法治之古人以普濟消毒飲治大頭瘟荊防毒散治捻頸瘟生犀飲治瓜瓤瘟清熱解湯下人中黃丸併刺塊出血治楊梅瘟三稜針刺入委中三分出血及服人中黃散治疙瘟蒼朮白虎湯治軟腳瘟雙解散探吐治絞腸瘟此皆昔人已驗之方足補仲景之未逮也凡時疫流行之際小兒亦多傳染傷寒例所謂小兒女子益以滋甚以小兒筋骨柔脆一染時疫即驚搐發痙誤作驚治必死治稍遲延亦死其治與大人倣佛但幼科專於痘疹驚疳而傷甚略但知其不思飲食不知其疫邪傳胃但知其嘔渴瀉泄不知其協熱下利凡此何暇致思其為疫證乎疫癘中一種大頭天行病雖略見前然不細陳難於治療此證乃濕熱在高巔之上所以必多汗氣蒸初覺憎寒壯熱體重頭面腫甚目不能開上喘咽喉不利舌乾口燥宜普濟消毒飲不速治十死八九東垣云身牛已上天之氣也邪熱客於三陽之間上攻頭面為腫切不可用降藥陽明之邪首大腫少陽之邪出於耳前後甚至兩目不開面部赤腫以普濟消毒飲少少不住服治法不宜太速速則過其病所上熱未除中寒復生必傷人命宜用緩藥徐徐少與為妙額上面部焮赤而腫或壯熱氣喘口乾舌燥或咽喉腫痛不利其脈數大者此屬陽明本方加石膏若內實熱甚者加酒大黃下之若發於耳之上下前後併額角傍紅腫者此屬少陽也或寒熱往來口苦咽乾胸脅滿悶本方加柴胡栝蔞根脈實便祕者加酒大黃利之若發於頭腦項下併耳後赤腫者此屬太陽也荊防敗毒散熱甚去參加芩連若三陽經俱受邪併發於頭面耳鼻者亦宜普濟消毒飲大抵此證以辛涼輕清之濟散其上盛之濕熱則愈節庵以普濟消毒飲除去人參升麻白芷黑參馬勃殭蠶藍根而加入川芎羌活防風荊芥射干汁竹瀝名芩連消毒飲藥稍異而功效不殊其用大黃必須酒洗如鳥在高巔惟射以取之也又四時疫癘天行大頭並宜用人中黃散輕者只用芩連甘草煎成頻服不效加鼠黏子芒硝微利之不必大劑攻毒也蝦蟆瘟則兩頤頰下腫小柴胡去參半加羌防荊薄桔梗馬勃煎服荊防敗毒散亦可夏暑濕熱氣蒸亦多發此宜消暑十全散加荊馬勃一二劑可愈至於溫疫一證乃溫病將發之時或既發之後更感時行疫氣其證渾身壯熱昏昏不爽遞相傳染盛於春夏之間以春時天令不正則地之濁氣鬱蒸發動冬時伏氣其氣最毒人在是氣之中莫之知也正氣虛者感而受之以正氣本虛故陽脈濡弱而邪傷血脈則陰脈弦緊也以其伏邪內動相召外疫正被邪侵怫鬱煩擾行運失常壯熱作矣表證見焉及熱鬱腠理不得外泄侵入於裏裏證見焉設使正氣內充邪氣何由而入其感受之因異於傷寒異於溫熱異於非時感受寒疫其治大約以驅熱為主表藥間用下藥必用人中黃君藥昔人概用清熱解毒湯下人中黃丸統治諸疫皆效其所用人參者知其本氣不足防邪入裏所謂補瀉兼施也溫疫證多作渴宜用小柴胡去半夏加石膏知母若躁熱不識人輕則涼膈重則雙解如大便泄瀉者黃連解毒湯若表裏俱熱亦涼膈雙解嘔血者生犀飲便實加大黃便滑用黃土虛加鹽水炒參內外熱極毒盛三黃石膏外熱甚用麻黃內熱加大黃餘如時行治法大率溫疫脈來盛而有力者發於陽也尚可施治脈來沈細少力者陽病見陰脈也皆不可救若溫病七八日或十餘日前熱未除重感於寒忽然寒熱交作變為溫瘧後世方書以為壞證過經不解寒熱不除而變溫虐殊不知此本春時溫病之變證非冬月傷寒之變證也按傷寒例云脈陰陽俱盛重感於寒變為溫瘧其證胸脅滿煩渴而嘔微惡寒者治以小柴胡去參半加栝蔞根石膏無寒但熱其脈如平骨節煩疼時嘔者用白虎湯加桂枝慎不可用辛溫發散以助其虐也至於內經所言先熱後寒之溫瘧乃得之冬中於風寒氣藏於骨髓之中至春陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗共出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛郥熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧夫先熱後寒者以先前伏邪乘春時陽氣而發出於陽明故熱已後因本身之真陰內爍則邪復反於少陰故寒治宜人參白虎湯或有客邪則加桂枝更以金匱腎氣丸去附子倍桂枝作湯渴則飲之蓋從腎出外而大熱則其內先已如焚水中火發雖非陰火亦可畏也故先用白虎退熱俟其瘧勢外衰復返於腎而陰精與之相持乃為寒設不知壯水之主以急救其陰十數發後則陰精竭矣此則伏邪自發之溫瘧與溫病後重感於寒所變之溫瘧似異而實同然皆不越少陰併詳辨此以破二經異同之惑若冬時溫暖人感乖戾之氣至春始發更遇天道過於驟熱遂變溫毒傷寒例云陽脈洪數陰脈實大更感溫熱變為溫毒溫毒為病最重也伏毒與時熱交併表裏俱熱故其脈浮沈俱盛亦有冬溫誤用辛熱或熱毒不得外解而陷入於裏裏有是證也其證心下煩悶嘔逆咳嗽甚則面赤身體俱赤狂亂躁渴咽喉腫痛狂言下利而發斑最為危候治宜大解熱毒為主若斑如錦紋身熱煩躁而無燥結者黃連解毒湯若躁悶狂妄而無汗者三黃石膏湯自汗煩渴而發斑為胃熱人參化斑湯即人參白虎湯煩熱錯語不得眠白虎合黃連解毒湯斑不透犀角大青湯透熱不止本方去升麻黃芩加人參生地柴胡發斑熱毒勢甚咽痛心煩狂言悶亂犀角黑參湯雖大便不通勿用下藥惟宜犀角地黃湯凡斑色紫者為危候黃連解毒合犀角地黃若斑色紫黑而平下坑爛脈虛小自利者不治其失於汗下及溫熱時行夾食陰斑詳後發斑本例有陽熱亢極而成陽毒者金匱云陽毒之為病面赤斑如錦紋咽候痛唾膿血五日可治七日不可治升麻鱉甲湯主之虛熱勢盛毒不能化者活人陽毒升麻湯有一二日間便成陽毒者有誤用辛熱發汗或吐下未當邪熱內陷變成陽毒者其證壯熱頭項痛躁悶不安或狂言罵詈妄言妄見或口唾膿血面生錦紋或舌卷焦黑鼻如煙煤或咽喉腫痛下利黃赤六脈洪大而數人參白虎湯咽喉痛者犀角黑參升麻甘草等分煎服若熱毒大盛時狂時昏口噤咬牙藥不得下者先用水一盆用絹裏指蘸水漬牙關候牙關放寬狂亂稍定方與服藥三黃石膏湯加減脈洪大黃連解毒湯慎不可以其熱盛而誤下之蓋此證之熱散漫於外故以攻下為首禁也夏月熱甚狂躁悶亂不安脈洪數者用新汲水或黃連水漬青布四五尺作數摺略絞搭病人胸前熱即易之須臾得睡效睡即去之有陰熱亢極而成陰毒者金匱云陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之活人用原方加桂枝名陰毒甘草湯復有陰寒極甚而成陰毒者自是兩種不可混也夫陰寒極甚反大熱躁渴四肢厥逆脈沈細而疾或尺部短而寸口大額上手背冷汗不止或先因房事而後著寒或內傷生冷而犯房室內既伏陰復加外寒積寒伏於下微陽消於上遂成陰盛格陽陽氣上脫之候五六日後胸前手足發出淡紅小斑為陰毒雖盛夏禁用涼藥宜附子理中湯甚則身重眼睛疼額上冷汗嘔穢厄逆或爪甲青或腹絞痛或面赤足冷厥逆躁渴身發青黑斑口鼻灰色舌黑而卷莖與囊皆縮六脈沈細而遲或伏而不出或疾至七八至已上不可數者急用蔥餅於臍上尉之隨用附子散或人參三白湯合四逆湯主之尉之手足不和暖者不治劉守真云世俗所言陰毒皆陽熱亢極畜熱深於內身表有似陰寒此特指仲景升麻鱉甲湯去雄黃蜀椒陰熱亢極之證若後世所謂陰寒極甚之陰毒必用回陽退陰之藥內溫正氣逼邪出外庶或可愈若服涼藥則渴轉甚躁轉急必致虛陽暴脫而死也王安道曰陰陽二毒與陰陽二證迥異仲景書雖有陰毒之名然其所敘之證不過面目青身痛如被杖咽喉痛而已並不言陰寒極甚之證況其所台之方不過升麻甘草當歸鱉甲而已並不用大溫大熱之藥是仲景所謂陰毒非陰寒之病乃是感天地之惡毒異氣入於陰經故曰陰毒後人遂以陰寒極甚之證參入仲景證中卻用附子散等溫藥以治竊謂陰寒極甚之證或內傷冷物或暴中陰寒或過服寒藥所變內外俱冷固可名為陰毒然終非仲景所言惡毒異氣所中之謂也趙以德曰按古方書謂陽毒者陽氣獨盛陰氣暴衰內外皆陽故成陽毒謂陰毒者陰氣獨盛陽氣暴衰內外皆陰故成陰毒二者或傷寒初得便為是證或服藥後變而成之陽毒盡治以寒涼陰毒盡治以溫熱藥劑如冰炭之異何乃仲景以一方治之乎其曰陰毒去雄黃蜀椒則反去其溫熱者矣豈非熱皆熱毒傷於陰陽二經乎在陽經絡則面赤斑如錦紋唾膿血在陰經絡則面青身如被杖此皆陰陽水火動靜之本象也其曰七日不可治者陰陽之津氣血液皆消滅矣傷寒七日猶得再經而此加之以毒至七日不惟消滅其陰且火極亦自滅矣然春夏之交多有傷風寒疫時行與溫病風溫溫疫溫瘧溫毒陽毒陰毒交錯難辨蓋傷風則發熱頭痛鼻塞聲重咳嚏惡風自汗寒疫則憎寒壯熱頭痛骨節煩疼雖發熱不渴時行則里巷之中病俱相類溫病則煩熱口燥而渴氣口脈盛苦稍見人迎浮緊即有重感風寒矣病溫復感風邪而見自汗灼熱咳嚏聲嘶者風溫也先前溫熱未除復感時行瘟氣即昏昏壯熱遞相傳染者溫疫也溫病日久更感於寒寒熱如瘧者溫瘧也溫病更感溫熱熱毒熾盛而發斑者溫毒也發斑熱越狂走者陽毒也發斑而身如被杖厥冷者陰毒也已上數證多發於二三氣中一一按證定名庶無誤治之失若交夏至後炎暑司令相火用事人有發熱身疼不惡寒但惡熱而大渴者為熱病傷寒例云凡傷寒而成溫熱者先夏至日病為溫病後夏至日為熱病蓋久伏之邪隨時氣之暑熱而鬱發也以邪非外來故但惡熱而不惡寒熱自內發故口燥渴而引飲多其邪既鬱為熱不宜辛溫發汗不得復言為寒仲景仍以傷寒目之者謂其初受病時皆寒氣鬱伏所致耳世言仲景無溫熱治法詳太陽陽明篇中多治溫熱不然黃芩湯白虎湯方何由而立也惜乎殘缺未備且混入傷寒六經例中設若不審誤以白虎治傷寒立見其害白虎為金神夏熱見之而退非盛暑熱病內外熱極者不可用氣虛人用之往往成結胸甚至不救其性大寒傷寒傷肺非傷寒藥也故立夏以前處暑以後不可妄用白虎之戒夫傷寒之不可用黃芩白虎猶溫熱之不可用桂枝麻黃大小青龍也即治溫熱亦須無非時暴寒者方可但溫熱病亦有先見表證而後見裏證者蓋怫鬱自內達外熱鬱腠理之時若不用辛涼解散則邪不得外泄遂還裏而成可攻之證非如傷寒從表而始也或有不悟此理乃於春夏溫熱病而求浮緊之脈不亦疏乎夫溫病熱病之脈或見浮緊者乃重感不正之暴寒寒邪束於外熱邪結於內故其脈外則綳結內則洪盛也又或不識脈形但見弦脈便呼為緊而妄治之蓋脈之盛而有力者每每兼弦豈可錯認為緊而斷以為寒乎夫溫病熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由怫鬱在內故也其左手盛或浮者必有重感風寒否則非溫病熱病自是非時暴寒耳然溫病之發因暴寒者居多熱病之發兼暑暍者為甚以伏邪乘天暑汗泄從包絡三焦一齊發出三陽也經云三合病腹滿身重難以轉側口不仁而面垢讝語遺尿發汗則讝語下之則額上生汗手足厥冷若自汗出白虎湯主之此雖言三陽合病而實熱病兼見暍證如面垢遺尿非中暍乎以伏邪既乘暑熱發出在表汗下俱禁若始發之時背微惡寒者為肌表之真陽不能勝邪故加人參以固真氣也按長沙所主白虎及白虎加人參凡八證皆主熱病煩渴而裏大熱蓋伏氣之邪自內出外本非暴感風寒故不宜發汗又熱發於外內邪不實復不可下之故宜此湯及竹藥石膏黃連解毒選用若大渴煩躁背惡寒脈洪用白虎湯合黃連解毒衄血加生地丹皮喘加栝蔞根厚朴惡熱煩悶腹滿舌胎黃黑五六日不大便者涼膈雙解三承氣湯選用如或脈兼弦緊必有重感客邪表證宜於天水散中加葛根石膏蔥白香豉之類其性雖寒不礙發散也若邪在半表半裏古法用小柴胡今用雙解散去麻黃加柴胡其功尤捷脈弱者加人參遠勝小柴胡也每見世人治溫熱病誤下之未為大害誤汗之變不可言足徵其熱之自內達外矣其間有誤用攻裏而致變者乃春夏暴寒所感之寒疫邪純在表未入於裏故也凡治伏氣發溫復感客邪輕者只宜小柴胡去參半加橘皮栝蔞根蔥白香豉熱病更加石膏知母一法溫病熱病凡有客邪不問兼風兼寒脈浮脈緊惡風惡寒可汗不可下者通用雙解散去硝黃加蔥豉最妙凡表證依法汗下不解別無異證者通用涼膈散以退其熱無使熱盛危劇也汗後餘熱未盡用天水散或小柴胡加減汗不解下證未全者白虎湯汗後躁不得眠微熱而渴者五苓散去桂合天水汗後不解中外有熱口乾煩渴解毒涼膈天水能調順陰陽洗滌臟府若純是裏證脈盛而實不惡寒但惡熱煩渴引飲自汗讝語不大便咽乾腹滿可下不可汗者三一承氣湯下之一法不問風寒濕暑或表裏證俱見或內外諸邪所傷有汗無汗心腹滿痛讝語煩躁咽乾口燥畜熱內盛俱用調胃承氣合解毒下之能瀉內外大熱或熱結極深而數下不利不救成死證矣急用大承氣湯加甘遂末一錢匙下之凡裏證依法下之而不解或大下後或二三下後熱勢尚盛而不退者寒涼諸藥不能退其熱脈弱氣虛不可更下或諸濕熱內盛小便赤澀大便溏泄頻迸少腹急痛者欲作利也黃連解毒湯主之下之太過其熱不退再三下之熱愈甚脈微氣虛法無可生之理至此下之亦死不下亦死但用涼膈合解毒調之庶幾陽熱退除陰脈漸生亦有得生者若表裏證俱見欲汗之而裏證已形欲下之而表未解祇宜小柴胡湯和之一法不問風寒暑濕用涼膈散天水散合煎解之或表熱裏熱少天水一涼膈半或裏熱多表熱少膈一天水半表熱極盛裏有微熱身疼頭痛或眩或嘔不可汗下者天水涼膈合煎甚者用大柴胡合大承氣湯主之若更不解不可復用苦寒峻攻但宜和平之藥宣散其表和解其裏用小柴胡涼膈散天水散和解之或小柴胡合解毒湯如服後熱未退者大柴胡合解毒湯微下之諸小柴胡證日久不解表裏熱勢更甚而心下急鬱鬱微煩者或發熱汗出不解心下痞鞭嘔吐不利或陽明病多汗或少陰病下利清水心下痛咽乾燥渴或太陰病腹滿而痛俱宜調胃承氣合黃連解毒下之外熱勢盛者雙解散為當守真製雙解散以攻熱病內外之熱邪使表裏齊解甚為得法然間有不解者猶未盡善也子和演為吐法即用前藥煎一大碗令飲其半以探引出風痰次一半使衣被覆蓋必汗大出而解世人只知桂枝麻黃發汗不知涼藥亦能汗也熱病用熱藥汗不出者反益病涼樂發之百無一損益元散加薄荷便能發汗更加蔥豉尤捷承氣用薑棗煎借辛甘發散之意守真雙解和演為吐法豈非涼藥亦能汗乎若誤用傷寒藥致發斑黃者當從下後斑黃例治之夏月誤用辛溫及重發汗變證百出往往發斑讝語衄血喘滿昏迷悶亂諸證並見皆熱所極致則用藥不離黃連解毒湯加減如汗下太過脈微惡寒者壞證也又當從芍藥甘草湯調補其陰中間稍加薑棗和之慎不可輕用溫補也倘不經汗下而脈虛小手足厥者必死也大抵溫病熱病皆是熱鬱之氣故多發於三陽若發於三陰者必難治其脈若沈細或微弱或虛大無力為脈不應病必死然發於三陰者必有所因或因冷食傷脾或因欲事傷腎皆正氣先傷熱毒乘虛而發設用甘溫調補寧不助邪轉熾若行苦寒峻攻真元立致消亡雖長沙河間復起恐難為力矣凡溫病熱病榮未交者可治陰陽交者必死夫所謂榮未交者言榮分熱毒之色未交遍於衛分也而類經誤釋為邪猶在衛未交於榮其氣不深意謂熱病之邪亦如傷寒自表傳裏也按內經刺熱篇云太陽之脈色榮顴骨榮未交曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死舊釋殊悖今特明之夫太陽之脈浮脈也色赤色也其證初起如以采飾止顴骨一處不交他處為榮未交熱勢尚淺脈色相符是猶可治太凡溫病熱自內出經氣先虛雖發汗多未得汗故云今且得汗待時而已雖有餘證未退少需聽自解此真訣也至於與厥陰脈爭見者死期不過三日言熱病大熱煩渴反見陰脈陰色色脈皆陰故為爭見爭見赤紫滯晦傳經勢重已為主死爭見青黑尅賊十死不救矣三日死者以其熱毒復入於裏三日傳盡三陰陰精內竭故惡毒之色發見於外也太陽厥陰爭見者死少陽少陰爭見亦死牽連腎水在內以少陰為厥陰母水勢垂危源流並竭故也所謂陰陽交者言陰陽交互邪勝正負毒邪亢盛反逼正氣為汗也按評熱病論云黃帝問曰有病溫者汗出徹復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰交交者死也帝曰願聞其説岐伯曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出徹復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱病曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也此假論溫獨創穀氣之旨穀氣為棈精勝氣乃為汗身中之至寶也故藏於精者春不病溫病溫皆冬不藏精之故所以熱毒亢極腎水傷竭乃至狂言失志精脫而死以此故也有云二陽者搏其病溫死不治不過十日死二陽者手足陽明也雖未入陰病溫至極必至不治稍延不過十日死較三日死陰之屬少饒其期耳再按靈樞熱病云熱病七日八日脈微小病者溲血口中乾一日半而死脈代者一日死熱病已得汗出而脈尚躁喘且復熱喘甚者死熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不可治熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病脈尚盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生汗不出大顴發赤噦者死泄而腹滿甚者死目不明熱不已者死老人嬰兒熱而腹滿者死汗不出嘔下血者死舌本爛熱不已者死咳而衄不出出不至足者死髓熱者死熱而痙者死腰折瘈瘲齒噤齘也夏月暑濕交蒸人多中暑證與熱病相似首宜以脈法辨之夫熱之脈必病盛中暑之脈必虛蓋寒傷形而不傷氣所以脈盛暑傷氣而不傷形所以脈虛然又有弦細芤遲之脈者何也夫人暑月必多汗多汗則脈虛此其常也守真曰熱為陽中之至陽以熱傷氣則汗自出病雖為熱脈不能實而反虛或弱也若汗出當風閉其汗孔即風與汗濕留泊肌腠脈故弦細或虛風不作鬱熱表虛仍自汗出者脈必芤遲也統而言之曰虛分而言之曰弦細芤遲其不以浮大之脈混入虛脈之中稱為暑病之脈也潔古以靜而得之為中暑為陽中之陰為暑傷陰證動而得之為中熱即謂之中暍為熱傷陽證仲景云太陽中熱者暍是也然亦多陽明證其大汗出微惡寒發熱小便淋瀝黃赤者為太陽其面赤大汗煩渴喘急氣粗前板齒燥或嘔或泄者為陽明乃當炎暑之令而受烈日之蒸即無病之人恆得之脈必洪大發熱煩渴重者昏憒不省人事有似熱病但忽輕忽重為異耳傷在太陽五苓散減桂加香薷陽明消暑丸凡平人偶然中暍身熱背惡寒面垢自汗大渴引飲煩躁悶亂痰逆惡心胸膈不快或吐瀉轉筋小便祕澀者此內外皆熱即有昏憒困倦指頭微寒並宜五苓合益元若手足搐搦者暑風也香薷飲加羌防嘔吐加藿香陳皮小便不利加茯苓豬苓澤瀉滑石有痰加半夏生薑口渴不用半夏加栝蔞根瀉利不止加白朮轉筋加木瓜若腹滿身重難以轉側口不仁而面垢讝語遺尿者此熱病兼暍也白虎湯若農夫田野及慣力役之人過受燔灼頭角額痛發熱大渴引飲脈洪汗大泄者急作地漿水煎蒼朮白虎湯即白虎湯加蒼朮老人不宜用寒者竹葉石膏湯稍加熟附溫順之又老年平昔陰虛多火不可用溫者白虎加人參竹葉為當凡中暍雖勢甚但一解即愈不似中暑之必需補益也內經云因於暑汗煩則喘喝靜則多言此心包證也然亦多兼入脾及他藏者入脾則昏憒入肝則眩暈入肺則喘滿入腎則消渴乃鬱蒸之氣傷人元氣惟精神虧乏之人始中之也脈來虛細重者伏匿若喘促逆冷卒然昏暈脈雖虛細慎不可用溫補此熱傷陰氣故禁溫劑凡溫熱藥皆助陽耗陰也如避暑深堂起居不時而汗出煩躁面垢背微惡寒手足微厥甚則灑然毛聳以腠理開則灑然寒若腠理閉則熱而悶矣乃包絡之火不能勝時火故反微惡寒也或於陰涼處坐臥表虛不任風寒往往自認外感求醫解表若誤與表藥重絶元氣禍如反掌惟宜清暑益氣湯若果脈緊畏寒有表邪者消暑十全散脾氣虛弱汗出多而惡寒者十味香薷飲若暑熱之時過傷飲食泄瀉嘔吐霍亂者六和湯伏暑霍亂腹痛泄瀉身熱手足冷者五苓散下來復丹脾胃虛損之人上焦之氣不足暑濕之氣鬱蒸則四肢困倦精神短少兩腳痿軟懶於動作言語昏昏嗜臥頭痛而重心胸痞悶骨節無力氣促似喘非喘其形濛濛如煙霧中早晚之際則發寒厥日高之後復發熱如火乃陰陽氣血俱不足也若四肢灼熱為陰虛發熱或四肢冰冷為陽虛寒厥以脾主四肢故也清暑益氣湯清燥湯選用若自汗過多風犯汗孔則身體重痛肢節淋瞀煩疼或渴或不渴或小便黃澀此風鬱汗濕與暑相搏也宜六一散加蔥豉兼驚加神砂末小便數合五苓或去桂並煎服探吐令汗出則愈若遠行勞役大熱而渴則陽氣內伐熱舍於腎為水不勝火發為骨痿若黽勉觸熱勞形發熱煩渴口鼻氣促而喘至日晡之際必少減若認作中暘陽明誤用白虎旬日必死此脾胃大虛元氣不足也總之脾胃一虛病證百出惟補中益氣去升麻加麥冬五味茯苓澤瀉黃連黃柏之類補益中兼清解而漸愈不似中暍之即能平復也按暑暍二者名雖不同其為天熱外傷則一在素虛者自難禦之即平人受傷者亦必因勞役飢餒而勞役飢餒則虛虛則邪入而病不虛則天令雖熱亦無由以傷之則知中暑中暍固有陰陽虛實之殊彼以動靜所得分之何哉即其所謂靜而得之者避暑深堂患頭疼惡寒肢體拘急等證是感寒之類耳蓋冬月脈浮緊為傷寒浮緩為中風夏月脈弦緊為傷風弦緩為中暑以表疏自汗則脈緩表緻亦無汗則脈緊耳然中暑亦有無汗而脈弦細此雖中暑必緣微涼所遏而然其所以煩心肌膚火熱無汗非暑邪也身中陽氣受陰寒所遏而作也其有涼亭水閣過受涼快為寒所襲而病脈必弦緊宜消暑十全散不可全用表藥蓋暑月腠理易開即香薷熱飲使能出汗倘人迎脈弦氣口脈大而咳嗽鼻流清涕目疼額與眉稜骨痛選奇湯最效有天暑用冷水淋浴而病者金匱云太陽中暍身熱疼重而脈微弱者此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之以瓜蒂二七枚水煎頓服頃於無風處大吐汗出而愈虛人五苓散加蔥豉探吐之若冒暑伏熱引飲過多及恣噉瓜果生冷致脾胃受濕而腹痛嘔瀉水穀不分脈來沈緊者為內傷寒而病宜大順散若陽氣虛人膏梁與冰果雜進兼恣意房幃致周身陽氣不得仲越而脈沈細或弦遲面垢如塵無汗惡寒四肢厥逆拘急或霍亂嘔吐者冷香飲子若多汗喘促吐利兼作脈見微細欲絶或虛浮欲散此為緊病非漿水散不救若汗出浴臥當風或冷水浸澡或坐臥濕地而病雖當暑月非暑傷人皆因暑而自致之病當用溫散藥治之若暑熱為病不過清心利小便解暑毒補真氣而已即脈虛昏憒手足厥冷不得用熱藥也世俗往往不明概曰夏月陰氣在內大順散為必用之藥夫陰氣非寒氣也蓋夏月陽氣發散在外而陰氣在內耳豈可視陰氣為寒而用溫熱藥乎陰果為寒何以夏日則飲水乎丹溪云伏陰於內陰字有虛之義若作陰冷看誤矣火令之時爍石流金有何陰冷孫真人令人夏月常服生脈散非氣虛而何古人大順散非謂伏陰而用之本治嚼冰飲冷所傷若庸工概用溫藥治避暑深堂寒鬱其陽之證恐不能解表反增內煩也其蒼朮白虎湯黃連香薷飲雖宜暑病亦豈可視為通行之藥乎又酷暑道途中卒然暈仆為暑風卒倒此熱毒湧痰壅塞心包也切不可用冷得冷則死急以熱土尉臍中仍使更溺於臍腹并搗薑蒜絞汁灌之立蘇若熱病因暑而發治從熱病例蓋伏邪必從少陰發出心包而入陽明與陽明中暍不殊總屬白虎證治不其必辨是熱是暍也若其人素有痹濕復傷於暑暑濕相搏深入太陰則發濕溫以太陰主濕召暑而入其中也證若兩脛逆冷腹滿濕得暑而彰其寒也支胸頭目痛苦妄言壯熱多汗暑得濕而彰其熱也其脈陽濡而弱陰小而急蓋濕傷於血則必小急暑傷於氣則必濡弱也羅謙甫云濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也病在太陰陽明不可發汗汗之則不能言耳聾不知痛處身青面色變名曰重暍死宜白虎湯加蒼朮分解兩混合之邪如有寒熱加桂枝若濕氣勝一身盡痛發熱身黃小便不利大便反快五苓散加茵陳此乃熱入陰分故見足冷脈弱不可因其足冷脈弱而誤用溫藥也若內夾冷食五苓散去苓澤瀉加甘草乾薑即茯苓白朮湯或五苓合甘草乾薑亦得然夏月亦有中寒厥冷宜溫者必小便清白知裏無熱方可用溫若是濕溫小便必赤澀而少即如厥陰熱厥亦有唇青脈伏當用竹葉石膏湯者此與不異此正內經亢則害乃制火極反兼勝己之化也王肯堂云昔人治濕溫遍身皆潤而足冷至膝下腹滿不省人事六脈皆小弱而急問其所服之藥皆陰病藥也此非受病重藥能重病耳遂以五苓散合白虎湯十餘劑少蘇更與清燥湯調理而愈凡陰病厥冷兩臂皆冷今脛冷臂不冷則非下厥上行故知非陽微寒厥而令用祛濕藥也春夏濕令大行人感其氣則一身盡重而痛脈來沈緩小便不利大便反快此名中濕以其人素有蘊濕因復感濕令故有是證宜五苓散加減淡滲為主治濕之法不利小便非其治也凡夏月之濕皆為熱濕非如冬月之濕為寒濕也濕家身煩疼可與麻黃加朮湯微汗之即麻黃湯加白朮四兩慎不可以火攻之攻之必喘滿煩驚小便不利也濕熱內遏則頭汗身黃宜茵陳蒿湯合五苓散然濕家非內實熱極發黃不可議用下藥即茵陳蒿湯中用大黃不過藉以導熱利濕非用下也濕家但頭汗出項背強欲得被覆向火胸滿小便不利舌上如胎者此丹田有熱胸中有寒也宜黃連湯和解之若誤下寒濕則噦額上汗出微喘小便利者死陰陽上下俱脫也又下之額上汗出而喘小便反祕者亦死經云關格不通不得尿頭無汗者可治有汗者死若額汗而小便如常手足自溫者陽氣雖逆陰氣猶不至於暴脫白朮附子湯救之若下之利不止雖無額汗喘逆此陰氣下脫亦死也濕家雖身疼痛不可發汗汗之則痙此為陽虛脈沈細者而言也前云濕家身煩疼可與麻黃加朮湯是治暴感寒濕陽氣未傷脈見浮緊故宜微汗以開泄之若夫陽虛之人衛氣先虧不能固密肌腠復加汗劑傷榮勢必內擾肝木而生虛風所以垂戒不可發汗也又有濕家身疼發熱面黃脈大自能飲食者內藥鼻中則愈以濁濕干犯清道而見頭痛鼻塞是不當以湯藥治其腸胃也更有上盛之濕下先受之之濕濡瀉之濕大筋軟短小筋弛長之濕因氣為腫之濕五痹諸濕種種不同詳述醫通若先傷濕身疼而後傷風者謂之風濕經言風濕相搏一身盡痛發熱而腫不能轉側惡風不欲去衣額上微汗大便難小便利日晡熱劇者名風濕此病傷於汗出當風或久傷取冷所致可與麻黃杏仁薏苡甘草湯溫服法當微汗而解不可大發汗大汗則風去濕不去也自汗去麻黃加桂枝羌活脈浮身重汗出惡風防已黃耆湯其脈浮虛而澀不嘔不渴者桂枝附子湯若內不渴外不熱小便自利者為津液不足白朮附子湯一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣不得除故耳若小便不利惡風不欲去衣而身微腫者甘草附子湯風濕相搏一身盡痛而脈浮自汗或頭重鼻塞者羌活勝濕湯小便不利而微熱者五苓散或黃耆建中五苓散各半貼和服又中水濕之蒸氣及汗出當風或中霧露或中山嵐瘴濕與風寒合者皆中於濕而合異氣也宜除風濕羌活湯微汗之太陽病失汗或汗後不解身黃發熱者先服麻黃軺赤小豆湯後與梔子柏皮湯或問中濕風濕何以別之曰山澤陰雨薰蒸之氣冒襲之者名為中濕此脾與腎受濕也其證一身盡痛如熏黃脈來沈緩治之以燥勝濕兼利小便若夫汗出當風濕氣鬱閉於腠理此膀胱與胃受濕也其證惡風不欲去衣肢節疼痛脈來浮澀治之以風勝濕兼取微似汗此大法也羅謙甫云春夏之交人病如傷寒汗出體重肢節痛難以轉側小便不利此名風濕但多服五苓散小便通利即愈喻嘉言曰風濕雖同傷太陽而有親上親下不同內經謂風者百病之長其變無常者是也其中人也風則上先受之濕則下先受之俱從太陽膀胱經而入風傷其衛濕流關節風邪從陽而親上濕邪從陰而親下風邪無形而居外濕邪有形而居內上下內外之間邪相搏擊故顯汗出惡風短氣發熱頭痛骨節煩疼身重微腫等證此固宜從汗解第汗法與常法不同用麻黃湯必加白朮或薏苡以去其濕用桂枝湯必去芍藥加白朮甚者加附子以溫其經其取汗又貴徐不貴驟驟則風去濕存徐則風濕俱去也其有不可發汗者緣風濕相搏多夾陽虛陽虛即不可汗但可用辛熱氣壯之藥扶陽逐濕而已凡見短氣雖為邪阻其正當慮胸中陽虛凡見汗出微喘雖為肺氣感邪當慮真陽欲脫明眼辨之必早也其濕流關節之痛脈見沈細者則非有外風與之相搏祇名濕痹濕痹者濕邪痹其身中之陽氣也利其小便則陽氣通行無礙而關節之痹并解矣設小便利已而關節之痹不解必其人陽氣為濕所持而不得外泄或但頭間有汗而身中無汗反欲得被蓋向火者又當微汗以通其陽也經曰傷於濕者下先受之曰濕流關節言地之濕中人流入四肢百節也又曰濕上甚為熱此則下受之濕襲入三陽胸背頭面之間從上焦之陽而變為濕熱也濕上甚為熱其小便必不利以既上之濕難於下趨故云治濕不利小便非其治也然治上甚之濕熱不能發汗而利小便即為第二義矣若陽虛者小便色白不時淋滴而多汗正泉竭而陽欲出亡之象一切利水之藥不可誤施以犯虛虛之戒復有一種燥證反似濕痹以其證遍身煩疼手足痿弱無力脈來細澀而微此陰血為火熱所傷不能榮養百脈所致慎勿誤認濕痹而與風藥則火益熾而燥熱轉甚矣宜甘寒滋潤之劑補養陰血兼連柏以堅之然須視其人形瘦色赤方為燥熱若肥盛者則為濕熱無疑也傷寒之兼濕熱者甚多惜乎古所未詳近亦罕講丹溪雖大闡濕熱法門然其所論皆外淫之濕而未及本身之濕熱也嘗讀仲景書有論寒濕者有論風濕者以其兼外感之邪故列之太陽例中其但言濕者則與痙暍同列當知痙暍亦不離乎濕熱也及觀痞論中則治本身中之方濕熱具在祇恨無人道破以致蒙昧千秋也蓋傷寒誤下則有痞滿之變然亦有不經攻下而痞者皆由其人素多痰濕因外邪觸動所以逆上而滿故仲景特立瀉心湯諸法正以祛逆上之濕熱也羅謙甫云瀉心湯諸方取治濕熱最當惟乾薑宜加斟酌以熱則生火於中恐反助濕熱為患炮時須預熬黃連汁乘火淬之此標本兼得之製也又有脾濕肺燥之人則陰中之火易於上升上升則咽喉作痛而乾咳須用貝母之潤以代半夏之燥煨薑之柔以易乾薑之僣更加薑汁竹瀝以行其滯此在臨證之權宜耳又有胸中寒丹田熱者黃連湯或小陷胸合理中其在感邪之初未見痞滿之時可用辛涼解表然必兼理痰氣為要至若停食感冒更兼痰濕內盛則當胸逆滿氣道阻礙津液固結三四日間便見舌胎芒刺喘脹悶亂者不急治脹閟而死速與涼膈散加葶藶甘遂白芥子薑汁竹瀝下奪之庶可十全二三但須明諭用藥不可輕投反招其謗也在傷寒則下不厭遲獨此證切勿延緩遲則胸腹堅如鐵石下無及矣況濕熱內盛之人即延至十日半月內終不結但蒸作極粘膩臭穢之物縱使得下百不一生也蓋此證外因感冒內有痰食故爾不得不下以圖徼幸設無外內合邪萬不可下也下後熱退氣平脈減小者為易治下後痞滿稍減而熱山不止者頻與小胸加竹瀝薑汁下後熱勢彌盛氣愈上逆脈仍實強反加躁亂者實熱內潰終難尅效所以此證之脈最忌滑實堅強堅強則胃氣已竭滑實則邪氣方張在老人尤為不宜若得軟大柔和差堪調理然雖合劑為效甚艱矧復粗工不察每以寬膈理氣消尅之劑治之則正氣愈耗濕邪愈逆有如陰霾四塞六合皆昏矣消尅不已繼以硝黃下之蓋濕熱痰飲隨氣升降或時腸胃胸脅或時經絡肌腠豈攻下所能除去者乎與外感傳經熱結內傷飲食之邪絶然不同也嘗見屢服硝黃脹滿愈甚喘急不通而死者有攻之驟脫熱去寒起遂至厄噦而死者更有見其肢體重痛不能轉側而用羌防星半風藥者蓋純是外感六淫之邪可以汗解此兼濕熱痰飲其根本在胃不惟汗之無益且風藥性升濕邪得之則乘風上湧平地尚為波瀾況元氣素有坎陷者乎所以愈增逆滿在所必至也大抵蒼黑肥盛之氣及酒客輩素與濕熱相依為命其在氣血強盛之年非惟不能為患反能輔助作為逮至中年以後正氣向衰漸難駕馭其濕有時搏聚於腸胃之間則胸中嘗覺痞滿不快或不知飢餓或滿腸鳴或行動喘促有時溢出乎軀殼之外則遍身脹痛或胸脅腿脛煩疼或手足重著攣痹當此之時雖無客邪尚難調理稍加外感引動其泛濫之勢則胸高喘滿腹脹身疼惡熱煩悶嘔逆自利無所不至矣此非外邪勢重而然也乃本身中素與元氣渾合之邪一旦乘機竊發同舟皆敵國矣復有素稟濕熱而挾陰虛者在梁輩少壯時每多患此較之中年已後觸發者更劇又與尋常濕熱迥異當推河間東垣類中風例治庶或近之其方藥詳醫通濕熱本門茲不瑣述蓋濕熱已是固疾難除兼之下虛攻擊將何所恃若更加外感即倉扁復生難於圖治矣夏月多有感冒非時寒氣傷風中濕風濕濕熱濕溫與暍暑熱病最要辨晰其傷風感寒已辨如上但熱病則脈盛身熱不惡寒但惡熱而煩渴中暍則脈洪大汗出喘渴引飲中暑則脈虛背微惡寒身拘急濕溫則脈濡小急汗多足冷濕熱則形盛喘脹中濕則一身疼重而或發黃風濕則關節腫痛自汗惡風不欲去衣為異耳濕家大發其汗則致痙中風頭痛常自汗出而嘔者汗之必發痙新産血虛汗出傷風亦作痙故仲景有瘡家雖身疼痛不可發汗之戒皆發汗太過經虛生風所致其證頸項強急頭熱面赤目脈赤足冷脛寒頭搖背反張口噤咬牙手足攣搐通用小續命湯剛痙為陽去附子柔痙為陰去麻黃凡太陽病發熱惡寒無汗小便反少氣上衝胸口噤不語其脈浮緊目開者名剛痙此為中風重感於寒葛根湯主之太陽證備發熱不惡寒身體強八八然脈反沈遲有汗目閉者名柔痙此為中風重感於濕桂枝湯加栝蔞根二兩節菴通用如聖飲加減主治若汗多亡陽下多亡陰致筋脈失養不柔和而成痙無外邪可解者惟宜補養氣血十全大補人參養榮大建中湯選用至於新産血虛金瘡出血過多皆能成痙惟脈虛小可治若實大者難愈也仲景言剛柔二痙並屬太陽以太陽經行身之後故頭項強急而反張也痙病胸滿口噤臥不著席腳攣急必齘齒若不大便者可與大承氣湯此論屬陽明矣若往來寒熱或左右一目牽斜或左右一手搐搦脈弦數者少陽痙也宜小柴胡加防風其曰頭低視下手足牽引肘膝相構海藏指為陽明此實三陰痙也陰邪固宜攻下然欲行大承氣亦須察其內實脈沈有力乃可下之又有結胸證如柔痙狀者此熱在胸中心下必痛宜大陷胸圓大下之仲景如字最妙如痙而非痙不可以風藥誤治也凡陰證脈沈細者附子散白朮附子湯選用服藥後汗出身和者吉若脈來沈遲或緊細而大便自利者皆死證也熱病發痙腰折瘛瘲齒噤齘者死按痙為發汗太過血不榮筋之候故亡血新産瘡家虛家易犯此證無論陰陽剛柔脈類總之正衰邪盛卒難救療大率痙證之屬三陰者及陽證陰脈者皆不可救其證目正圓及戴眼者不治所以仲景但論三陽治法而不及三陰也春深長夏之時多有勞力感寒內傷之證與外感證類相似內傷亦發熱頭痛畏寒惟門隙中賊風最惡之若在大風處反不惡也畏寒得暖則解雖寒熱間作而不齊出言懶怯口淡無味腹中不和手心大熱而手背不熱兩脅俱熱蓋內傷自內達表先少陽也若外感風寒之證頭疼發熱無休止時寒熱齊作而驟發不止寒雖近火不除出言重濁鼻中氣粗一身盡熱蓋外感自表入裏先太陽也然溫熱亦自內達表先見少陽證腋下熱而脅滿驟然發熱如火大渴煩躁引飲頭面目舌俱赤喘粗氣盛絶不似內傷面目萎黃唇舌淡白短氣力怯等證也內傷氣口脈虛大外感人迎脈緊盛溫熱則氣口脈洪盛為異耳若內傷夾外感則人迎緊盛而氣口虛大其證發熱惡寒頭痛自汗五心煩熱遍身骨節俱疼宜補中益氣加桂枝無汗加羌活若陽氣不得下通而足冷者去升麻易葛根少加熟附子羌活外感多於內傷者黃耆建中湯加羌防若顱脹目疼眉稜骨痛加蔥豉微汗之若兼停滯飲食則人迎氣口俱緊盛而滑實嘔逆膈上痛治宜先撤外感兼溫氣豁痰然後消導慎不可便用峻利之劑有等負重作勞之人內傷飲食外感風寒且素多畜血者其證渾身壯熱頭疼骨節痛胸脅痞滿或痛六脈洪盛重按卻無力或弦緊急強嘔逆不食或泄利或便祕以外感藥解表則正氣愈衰以溫補藥理脾則助邪轉盛並宜五積散加減但此輩多有食積瘀傷胃脘結滯者慎不可用白朮宜加桃仁當歸等藥六七日大便不行者大柴胡微利之若少腹痛而小便利者為血畜下焦桃核承氣代抵當丸選用下盡黑物然後調理江應宿云大江以南溫暖之方正傷寒病者十無一二所以傷寒屬內傷者十居八九故丹溪主乎溫散有卒中天地之寒氣有口傷生冷之寒物皆以溫養兼發散之法實本內經成敗倚伏生於動動而不息則變作及風雨寒暑不得虛邪不能獨傷人之旨也蓋凡外感寒者必先因動作煩勞不已內傷於氣然後外邪得入故傷寒為病兼內傷者十常八九也今人外感兼內傷者甚多用藥全要分別如外感重內傷輕則治外感藥宜用緩劑小劑及薑棗和中頻頻與服庶無大動正氣如外感輕內傷重則用藥全以內傷為主加入透表藥一二味而熱服以助藥勢則外感自散蓋內傷之人才有些微外感即時發病非若壯盛之人必所感重而病乃發也設以頭暈發熱認為太陽證誤表其汗則內傷必轉增而危殆在所必至矣又或誤認傷寒而絶其食已虛益虛往往至於不救然外感之邪與正氣交爭必然神志昏亂內傷因正氣本虛必然神識清明至死不亂也又諸虛煩熱與傷寒相似一虛一實不可不察其虛煩發熱亦惡風自汗心中溫溫欲吐憤憤無奈但脈不浮緊頭不疼身不痛為異耳然虛火上炎亦微微頭痛時時閧熱但時發時止與外感不同蓋虛煩脈雖數大而按之必虛微無力當以甘溫補其中補中益氣少加炒黑黃柏以滋腎水兼進地黃丸可也大抵陰虛必生煩躁故叔和有云虛煩有熱不可攻恐令熱去則寒起此誠格言也發汗吐下後虛煩不得臥若劇者必反覆顛倒心中懊憹者梔子豉湯湧吐之又心中悸而煩者小建中湯先煩而悸者為熱先悸而煩者為虛也傷寒病後虛煩竹葉石膏湯為聖藥但不可施於嚴冬若大寒之時可用十味溫膽湯代之誤用涼藥虛煩愈甚而躁渴脈愈大而虛者切不可與水急用五苓散加人參名春澤湯若上盛下虛煩躁自利手足冷者竹葉石膏湯去石膏加熟附名既濟湯過經後熱不解或屢下熱不解脈虛數而煩者參胡三白湯或小柴胡加減虛煩不得眠或發熱痞悶脈虛而嘔者參胡溫膽湯汗吐下後表解無熱但虛煩不得眠者酸棗湯凡內傷虛煩腳氣痰飲食積等證雖有身熱頭痛俱不可發汗也至於腳氣為病亦令人頭痛發熱肢節疼痛甚則嘔逆便祕有似傷寒但初起於腳膝熱腫或屈弱不能動移為異耳然有寒濕濕熱之不同其兩脛焮赤而腫熱者為濕熱也黃白而腫冷者為寒濕也又有風寒濕熱之辨如脈浮為風緊為寒濡為濕數為熱總之風寒為標濕熱為本靈樞云身半已上者風中之也身半以下者濕中之也蓋由腎水虛憊風濕之氣乘虛而襲因有斯疾然婦人亦有病腳氣者必因胞絡血海虛邪乘七情所致以胞絡屬腎故與男子腎虛同類治法雖略有氣血之分而大意不殊但兼用開鬱藥無不效也昔人概以小續命加減主治左關脈浮起於風去麻黃附子人參加羌獨活沈遲或緊起於寒去麻黃人參加薑汁脈數有力起於熱去麻黃附子人參加黃芩黃柏羌獨活脈沈濡弱起於濕去麻黃人參加草龍膽木瓜腳腫加木瓜檳榔大便實加大黃或東垣羌活導滯湯最妙然其證始則受濕復挾風寒暑熱而成初起不覺因他病乃發不專主在一氣亦不專主一經然此等必屬腎虛若用小續命須隨證加減慎勿以麻黃輕試即使風能勝濕亦須以羌防輩代之斷不可以中風傷寒法混治此證最忌溫補尤不可用藥湯薰洗俟病熱稍去然後改用滋補腎肝之藥更參醫通腳氣門治之至霍亂證仲景與傷寒並類觀其所言傷寒四五日至陰經上轉入陰必利本嘔下利者不治則知霍亂不可輕治也蓋傷寒吐利與霍亂不同傷寒吐利為邪氣所傷雖吐利而不撩亂霍亂吐利是飲食所傷必暴煩躁擾而撩亂也又有內外不和加之頭痛發熱吐利是霍亂兼傷寒也此證雖屬脾胃亦主腎肝有陰陽寒熱之不同凡冬月外感寒氣內傷冷物鬱遏停滯不化嘔逆泄瀉霍亂脈沈細或伏者屬太陰理中湯臍上有築築動氣者去朮加桂苓厥逆惡寒加熟附子脈雖沈而轉筋煩躁發熱者當作熱治不可以其脈沈而誤認為寒也大抵霍亂有一毫口渴轉筋者即係熱證惟四肢逆冷下利清穀惡寒不渴者方為寒證也熱多而渴者五苓散寒多不渴者理中湯渴不能飲小便不利者二湯合用若吐逆下利心腹卒痛者為寒食內結金匱大建中湯嘔逆腹痛下利而頭痛發熱者為風氣內薄小建中湯轉筋反戾為風木行痹宜平胃散加木瓜憎寒壯熱頭痛眩暈為風痰夾攻藿香正氣散嘔逆頭疼發熱背惡寒煩躁面垢而齒燥者為風暑內薄消暑十全散嘔逆腹痛泄瀉或寒熱如瘧為暑食相兼宜十味香薷飲加減或六和湯之類吐逆下利煩渴引飲為鬱熱留滯五苓合益元散夏秋之間因伏暑而致霍亂吐利煩躁或腹痛自汗六脈雖沈手足雖冷不可用熱藥如果脈弱陽虛腹痛喜得溫按泄瀉不臭穢者來復丹又有吐瀉後熱伏於內外則冰冷六脈細欲沈絶湯藥不下或發厄逆此火氣奔上而然也醫不能察認作陰證投以溫藥愈服愈吐當驗其口渴以涼水與之則不吐矣後用香薷飲加黃連麥冬通草等藥服之其脈漸出者生凡冒暑之霍亂吐瀉以治暑利水為主避暑之霍亂吐瀉以和中溫胃主不可不辨也又如欲吐不吐欲利不利上下不通腹滿痛而頭疼發熱汗者桂枝大黃湯此乾霍亂多死因邪氣壅塞上下痞隔也宜用法先探吐之蓋邪在上焦則吐下焦則利中焦既吐且利邪氣得以泄去也若乾嘔霍亂兼大小便利即是關格證也至於舌券陽縮入腹者不治然霍亂為胃氣反逆誤犯穀氣必死非傷寒溫熱之比也傷寒邪熱不散遊溢經絡出入藏府熱氣所過則為癰膿又厥逆脈數其熱不罷者此為熱氣有餘必發癰膿若邪熱遊於經絡則發外毒出入藏府則為內癰急當消為主稍遲則膿成難愈矣經曰火尅西方金法當癰膿其證咳而喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為凝滯畜結癰膿吐如米粥始萌可救膿成則死又咳逆上氣時時唾濁坐不得眠皂莢丸主之咳而胸滿振寒脈數咽不渴時時濁唾腥臭久久吐膿如米粥者桔梗湯主之肺癰不得臥葶藶大棗瀉肺湯主之又肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆遺尿喘鳴迫塞先服小青龍湯一劑乃進葶藶大棗瀉肺湯三日一服可服至三四劑大抵初起慎不可用保肺藥得補則助邪成膿也所以宋人十六味桔梗湯葶藶薏苡瀉肺湯皆為合劑潰後膿盡方可用異功生脈加歸耆斂之排膿用金鯉湯妊婦尤宜以活鯉魚一尾重四五兩者去腸入貝母末一錢在腹白色童便一碗隔水頓熟去鱗骨作二三次井汁食之七日當效又肺癰初起陳芥虀汁吐之屢效其脈初起不宜大數潰後最忌短澀脈來緩滑面白者生急疾面赤者死又脈忽大忽小者死痿軟如平人者死忽然屈伸者死真氣敗也面白或黑或赤者死聲啞啞者死性急躁求速愈者不治若胃脘隱痛而手不可近右關沈細人迎逆而盛者胃脘癰也馬仲化云胃為水穀之海其經多氣多血脈見右關本宜洪盛而反沈細則是胃氣已逆故沈細如此人迎者胃經穴名在結兩傍動脈應手其脈見於左寸右關沈細人迎甚盛則是熱聚胃口而不行耳經曰熱聚於胃口而不行胃脘為癰胃脘屬陽明經陽明氣逆則嘔故膿不自咳出而從嘔出嘔是膿之淤濁薰蒸穀氣故嘔若膿出則嘔自愈夫癰之在胃脘上口者則然若過乎中在膈之下者膿則不從嘔出而從大便出矣所以今世概用涼膈散治之若膿血自上而吐當用射干湯深得其旨也孫真人云腸癰為病小腹重強按之則痛小便如淋時時汗出惡寒身皮甲錯腹皮急腫脹大轉側有水聲此膿已成或繞臍生瘡或膿從臍出或從大便而下皆因飲食不節所致無論已成未成俱用大黃牡丹湯加犀角急服之小腹痛而腫滿不食小便不利膿壅滯也用薏苡牡皮桃仁蔞仁煎服以排之若膿從大便出者為真腸癰易治若從臍出者為盤腸癰難治經云腸癰為病不可驚驚則腸斷而死故患是證者其坐臥轉側理宜徐緩時少飲薄粥及保元湯固其元氣為主準繩云凡腸癰初起發熱惡寒腹中容㽱痛人鮮能辨因循不識誤作脹治致毒攻內藏煩口乾時時驚悸陰器腐爛臭敗無膿每流污水不可治也昔有患腸癰發熱者庸醫作傷寒治之絶其飲食旬餘而斃垂斃之日下膿血數升方知是癰欲救之已無及矣赤膈者胸膈赤而疼痛發熱頭疼體痛或脅胸赤腫發疱者屬少風陽熱非正傷寒也宜荊防敗毒去參加芩連犀角紫荊皮主之若表證已退大便燥結涼膈散若半表半裏合小柴胡去參加枳桔又宜稜針刺腫處出血以瀉其熱毒則易愈矣黃耳者耳中策策痛兩耳輪黃風入於腎也卒然變惡寒發熱脊強直如痙狀此屬太陽類傷寒也宜荊防敗毒去參甚則小續命去附子加白附蔓荊殭蠶天麻更以苦參或骨碎補磨水滴中良凡傷寒寒疫溫病熱病多有夾食夾痰等證若宿食傷脾則氣口澀滯不調傷胃則滑實流利亦有遲滑及止促者若宿食在上脘并入迎亦滑盛若宿滯已歸大府則氣口雖浮大而按之必澀也若脈來滑盛胸滿痞悶嘔逆氣粗者冬宜五積散調中湯選用餘時芎蘇正氣為主中有二陳使痰食無留滯之患喘滿加厚朴杏仁若解表藥中混用消導裏藥必引邪內入而成結胸下利等證也然又不可純用升散表藥若專一升散則宿食上逆而成䐜脹不通矣故於解表藥中兼理氣豁痰使之流動俟表邪解散然後專力治內庶無引賊破家之虞所以芎蘇正氣為停食感冒之的方若四五日脈來滑數胸前甚熱者宿食發熱也調中飲加減若脈來沈滑雖寒食內結其人胃氣不虛尚可溫中消散若夾食而氣口反澀滯伏結或始雖浮大而按之漸虛小其證身熱足冷或腹痛或頭痛但胸膈滿悶時或躁煩者必其人元氣素虛堅韌之物固結中宮胃中陽氣不得下通故但足冷而手不冷也可用五積散去取頭痛者陽邪上鬱也甘草乾薑湯加蔥豉以通其陽腹痛者陰氣下結也枳實理中湯加熟附以通其陰若曾服過峻利藥消導太過致自利厥逆痞滿不除者桂枝人參湯若曾誤下而熱邪內陷愈加脹滿壯熱不止者小陷胸合枳實理中若過汗傷血小便祕澀枳實理中加歸芍或真武湯中加當歸祕旨云陰虛之人傷寒與傷食皆難用藥若陰虛傷寒更兼傷食者為不治之候所以昔人從無治法余嘗以小建中湯用肉桂酒製生芍藥內以溫其中厚朴汁製甘草內以散其滯更加枳桔砂仁以行其氣熱除後以八味丸除去桂附減地黃加沈香砂仁調理自安復有中氣虛者更兼感冒停食則以補中益氣用桂枝酒製黃耆內以調其榮砂仁汁製甘草內以行其滯枳實汁製生白朮內以消其滿熱服微汗為效惟氣口脈大而按之澀滯或浮取小澀而久按愈覺有力大便五六日不行臍下按之痛者此為大腸氣鬱而脈澀當用大承下氣之凡傷寒夾食既久痰飲固結有屢用承氣湯不效者黃龍湯主之內有人參助胃以祛宿垢也溫病熱病時疫夾食無論表裏證見日數多少並宜涼膈散加消導藥最當傷寒夾食十常四五或先傷食而後感寒或先受寒而後傷食或病勢少間而強與飲食重復發熱甚至讝語躁狂舌短目瞪變證而出況復醫者不察病之表裏先後標本虛實或當先解表而反兼治其裏或當急治本而反先治其標橫行逆施往往多致不救可不慎歟至於食積不化證類傷寒外證亦發熱惡寒但頭不疼痛為異且氣口脈必不和而惡食吞酸噯氣腹滿欲吐不吐嘔逆痞悶見此證者即當以調中飲治之外感勢盛者調中湯主之又夾痰積與夾食證類相似更宜審諦蓋痰者津液所化由風傷於肺濕傷於脾肺氣不清脾氣凝濁而成無論風寒溫熱內傷等證必增嘔逆眩暈風寒夾痰則令人咳嗽氣逆溫熱夾痰則令人昏眩痞悶內傷夾痰則令人吐逆妨食但外感風痰則寸口浮滑發熱頭痛咳嗽自汗宜金沸草散及芎蘇散溫病熱病夾痰則關脈滑盛痞悶聲鼾宜涼膈雙解內傷虛夾痰則氣口脈滑而濡咳吐涎飲宜二陳湯加生朮於潛者良虛人六君子加香砂蓋白朮熟則補脾膩膈生則豁痰散血燥濕利水人多不知也凡人中腕有停痰留飲亦令憎寒發熱惡風自汗喘咳胸膈滿悶氣上衝咽喉不得息有似傷寒但身不疼項不強為異若涎多者亦隱隱頭痛清痰亦隱隱腹痛然止發不以其時目睛微定眼胞上下如煤炭色是也其脈左手和平右關濡滑或寸口伏匿俱宜小柴胡去參加茯苓橘皮或二陳湯隨證上下加引經藥要以分尋出路為主至於痰迷心竅如崇者與傷寒陽明發狂相似但口中時吐涎沫胸腹按之不痛辨之宜加味導痰湯加減氣上衝胸脈滑而遲者為痰伏膈上宜瓜蒂散虛人只用稀涎散探吐之嘗見外感夾痰證脈不甚浮不宜大發其汗激動其痰則嘔不能食宜於理氣藥中合解散之劑如香蘇散正氣散之類氣順則痰化矣痰飲證類實繁姑就夾證數條與傷寒有關涉者辦論餘不贅及夫夾食夾痰長沙既無治法前人亦未辨論無怪後世治之不得其當至如夾水長沙方論具備何今世無一人能用之者蓋此水即肺之液也風寒傷人皮毛肺先受之肺為金主生水肺既受傷不能行其水液至腎遂停留心下為咳為喘及乾嘔發熱等證故以小青龍發散風寒并滌肺經停留之液必令作汗以泄之故方中用麻黃細辛以開發皮腠也始失其治乘所不勝則傳少陽之分而變心下痞鞭引脅下痛乾嘔短氣等證又處十棗湯以攻逐之若更失治木復傳土則漬入胃而成協熱利也若水在少陽部分不傳入胃遊溢經絡則藏府不受其邪大熱得以差可惟腰以下重足脛浮腫小便不利者重則牡蠣澤瀉散輕則五苓散加防已主之又少陰病腹痛小便不利四肢沈重疼痛自下利者此為有水氣或咳或嘔者真武湯主之此又腎虛不能制邪水也則知治水之法不獨今世無人在昔知者亦鮮矣傷寒之夾水既多而夾血證復不少然夾血與蓄血不同其人素有內傷跌撲停經血瘕及暴怒傷肝皆有瘀積因傷寒溫疫等證發動痼疾謂之夾血必有痛處定而不移治宜察其部分消息微甚用藥又有跌撲打傷一時不覺過數日寒熱乃作有似傷寒脈當堅強最忌細澀脅痛少腹痛手不可按甚至昏迷不省少頃復蘇乃瘀血上衝所致也其人大便或祕或黑輕則香殼散重則代抵當丸或桃核承氣湯加炮川山甲一錢最破瘀積寒熱更加柴胡當歸在經絡當歸活血湯在胃口犀角地黃湯加酒大黃若更兼寒食停滯中脘或腹中作痛者枳實理中湯重則加乾漆灰二三分輕則加薑汁炒黑山查肉又或脫衣鬬毆兼感風寒有表證者必先解表邪然後治血如欲發汗宜桂枝湯芎蘇散等並加歸附桂心甚則加延胡索蓬朮亦不得行麻黃青龍等湯不得用寒涼止血之劑蓋血得熱則行得寒則凝瘀結不散必發熱如狂咳喘嘔逆若發汗太過誤觸瘀血則或嘔或泄或發厄逆但活血則嘔泄厄逆自止然既發熱則攻血藥中必加乾漆炒黃連非此化熱則血不得散也若嘔泄之血其色紅紫而散者可治色如敗衃而凝結成塊多兼血水此正氣已脫邪不能留也又或如污泥而粘膩不斷臭穢異常者此津氣已敗與濁腐同下也至於當汗不汗太陽之邪內結則為畜血與夫邪氣在經而為衄血熱邪在胃而為吐血及諸失血家淋家與婦人經水適來適斷俱不可發汗發汗則動血又三陰無熱不可強責其汗經曰少陰病但厥無汗而強發之必動其血名下厥上竭為難治言血脫則陽氣竭於上陰氣厥於下也即用當歸四逆湯多不可救又有奮力鬬毆之人脫衣露體觸犯風寒謂之夾氣傷寒今人但知用理氣藥不知兼有夾血夾食者其證惡寒發熱肌骨疼痛胸膈脹閉氣逆喘呼若其脈浮緊則宜輕劑發散兼理氣寬胸如香蘇局方最宜有食則加枳殼厚朴痰加半夏茯苓感寒嗽則加羌桔梗傷熱咳則加萎蕤薄荷頭痛加川芎白芷四時不正之氣加藿香甚則芎蘇散主之若脈弦緊或有伏結為積血在內當用破血利氣藥如香殼散之類有食不妨用溫中消導如調中散正氣散皆可若但恚怒傷氣只用小柴胡去參苓加橘皮枳殼若脅下痛為鬱怒傷肝當歸活血湯少腹急痛為有瘀血結聚桃核承氣或代抵當湯又有暴怒鬱抑不發泄形厥如尸不語如瘖者宜用沈香降氣散若但鬱悶不得發泄之人偶感風寒或發伏氣或傷暑熱或兼內傷俱隨證用藥但略兼開鬱理氣不可行破血消導也復有房室不謹之後感冒風寒及恣意乘涼觸犯風露勞役傷精而病者謂之夾陰其證亦發熱頭痛胸膈痞悶若陰火上乘則面赤而足脛逆冷蓋陽病必頭痛陰病必足冷內經所謂陽病者上行極而下陰病者下行極而上也以其虛陽發外故發熱煩渴而躁亂不寧真陽不能下通於陰分故足不能熱而陽道痿縮也按盛起東云治熱須辨真假夫真熱則發熱惡寒脈數有力按之更實躁煩口渴大便燥小便赤澀或利臭積發言壯厲不欲近衣者是也親乎表者宜發散親乎裏者宜通泄假熱亦發熱惡寒而足必不熱脈大而虛按之微弱身雖熾熱而不躁不渴或見虛狂而頃之即止終不及聲高詈罵也經曰寒熱有真假治法有逆從此之謂也外編云夾陰傷寒乃太陽少陰二經同時受病較之純陰證倍危在傷寒寒疫猶或可治若溫病熱病時行疫癘百不一生諺云傷寒偏死下虛人以其外極亢熱內極虛寒溫經之藥萬不可施以故必死即傷寒夾陰治之不得其宜終亦必亡而已每見庸工治夾陰傷寒用小柴胡和之多致厥嘔噦厄而死者以不勝黃芩之陰寒也亦有見其足冷陽縮用四逆湯溫之多致煩躁血溢而死者以不勝附子之雄悍也宜小建中黃耆建中加減祕旨云若脈來尺中遲弱無力而足冷陽縮者於黃耆建中湯內用生附汁製入黃耆以溫衛氣肉桂酒製入芍藥以調榮血不應改用參製黃耆麻附細辛汁製甘草以汗之若尺中弦數而多虛火面赤戴陽者於小建中湯內用人參汁製入甘草以助胃氣丹皮酒製入芍藥以降陰火不應加連附汁製黃耆及蔥白香豉以攝之若春夏感冒夾陰通用黃耆建中湯加減蓋陰虛之人雖患表邪發熱其中必夾陰象所以尺脈必不能實足脛必不能溫用藥最為扼腕較陽虛之可用溫補迥乎不侔也至於溫病熱病之夾陰雖長沙生難於措指惟暴感風寒夾陰可用上法治之內經云脈實滿手足寒頭熱春秋則生冬夏則死可見夾陰傷寒病於嚴冬熱病失陰發於盛夏者恉真陽憊極邪氣亢甚多死也若夫感冒夾陰其人陽氣雖虛春秋本無大寒傷犯邪氣原輕猶可治之非熱病大熱手足寒之比也其中暑夾陰治法詳本例中至如遠行遇雨則寒濕之氣先從汗孔襲入背俞況雨氣通於腎雖有發熱頭痛咳逆等證解表藥中必先通少陰之經而兼開發肺氣故細辛羌活在所必用所以首推神朮湯為主又須隨時令寒暄元氣盛衰加減始為合劑若冒雨而更加之以風則風濕相搏一身盡痛當除風濕羌活湯或小建中去芍藥加耆朮羌防濕襲陽與明而發熱者茯苓桂枝白朮甘草湯大抵此證雖當盛暑亦忌寒涼若遇嚴冬稍加麻附飢後則加白朮飽後則加橘半勞役傷氣冒雨涉水發熱喘咳則宜補中益氣加細辛炮薑若水寒之氣傷肺而喘咳不止者又以小青龍加減陽虛者去麻黃加附子白朮為主治也若夫遭風溺水最忌熱酒火烘惟宜溫暖覆蓋原其溺水之時必多驚恐心腎受傷雖有發熱頭痛骨節疼痛等證解表藥中必兼通心腎在冬月麻黃附子細辛湯或小青龍加生附子三五分蓋麻黃發汗通心附子溫經通腎細辛通徹表裏之邪更宜稍加苓半以開豁驚痰若在夏月則麻附皆所禁用當以五苓散君硃砂熱服一半探吐取汗更服一半蓋驚則氣亂故宜去濕利水藥中加硃砂或脈浮而見表證多者五苓散合小柴胡各半貼和解之或五苓散合羌活勝濕湯各半貼微汗之至於暴怒悲號投河躍井雖有表證當解須香蘇散加撫芎木香烏藥理氣為要跌傷加當歸桃仁桂枝安有溺水而不驚不氣不受傷者但當取其所勝治之其有天時寒冷兼挾冷食傷脾與夫曾犯房室而遭風覆溺及冒雨涉水傷腎而病身熱足冷者皆當參夾陰例治夫傷寒證類多端且多挾見諸證非刻意精別用藥必致差誤即如婦人傷寒多兼經候胎産調治更難經行之時雖有外感風寒必和解中兼調血為主如小柴胡合芎歸丹皮之類否則邪傷衝任而熱入血室矣又辨脈法云寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精此條傷寒論中不出方而金匱半産漏下主以旋覆花湯方用旋覆蔥白新絳三味則知其意多從表邪起見與男子虛勞失精之用小建中黃耆建中桂枝加龍骨牡蠣等方同義大抵虛勞失血而見弦大之脈皆是外感誤治而成此云脈弦而大按之減小者謂之芤明是表邪不解裏血受傷之候若更指下堅強如按鼓皮則謂之革又為邪勝正衰胃氣革除之候而仲景毫不以虛為慮仍用旋覆之解結蔥白之散邪新染絳帛之入膀胱而和血即如後世用一味防風丸治風入胞門之崩與此方藥雖異而理不殊也妊娠傷首宜固胎順氣雖見脈緊無汗切不可用麻黃青龍及一切解表猛劑以風藥性升皆犯胎氣也其脈以緩滑流利為順虛澀及躁急不調為逆其解肌藥惟桂枝湯無礙金匱云婦人得平脈陰脈小弱其人瀉不能食無寒熱名妊娠桂枝湯主之則知妊娠雖無表證亦宜用此以和榮衛也鄭虛庵曰妊娠傷風無論時月及月分少俱宜嚴氏紫蘇飲多加蔥白安胎為要咳嗽多者金沸草散加減妊娠傷寒輕者淅淅惡寒翕翕發熱重則頭痛身疼久而傷胎亦宜紫蘇飲或香蘇散並加蔥白香豉倘至半産胎傷多致不救也妊娠而犯冬溫溫熱疫癘多致傷胎若冬溫則陽旦湯春溫則黃芩湯熱病則白虎湯時行疫癘則達原飲不惟善解熱毒兼能護持胎氣更無藉於井泥塗臍之法也若實熱便閟急宜涼膈散承氣湯下之庶免邪熱傷胎之患惟大小便如常知裏無熱慎不可下之妄下引邪內入必致傷胎無疑若下後熱不退白虎與承氣並用或前後而用若誤用參耆壅遏毒邪則胎愈不安也倘見腰腹痛必墮無疑須預言之藥無及矣若其脈數疾無倫喘脹嘔道腹中重墜不能轉側當臍久按覺冷或有瘀垢下行但看舌色及爪甲青黑其胎已死也急宜平胃散煎成調芒硝半兩許下之虛極不勝藥力者加人參兩許駕馭之若併唇面青黑而嘔噦不止口中有穢氣者子母俱死切勿用藥新産感冒發熱大為危候然有産時傷力或去血過多或惡露不行或早起勞動或飲食停滯及蒸乳一切發熱不可誤認外感妄施汗劑以其氣血大虧百病乘虛而入即使更受風寒亦宜調理氣血為主其脈以小弱滑利為吉緊實堅大為逆數大散漫亦危更須問惡露行與不行小腹痛與不痛若痛者以行氣導血為先新産小腹結痛炒黑山查肉三五錢炒黑砂糖兩許煎服瘀血即行其痛立止虛人加人參炙甘草炮薑茯苓澤蘭之類風寒則加桂桂二三服自效若小腹不疼頭痛身熱惡寒無汗或喘或咳宜香蘇散有食小劑芎蘇參蘇隨氣血取用有瘀血兼行血藥值時行不正之氣遍身疼痛無汗敗毒散或香蘇散加蔥白香豉金匱云産後中風數日不解頭痛寒惡有熱心下悶乾嘔汗出雖久陽旦證續在者可與陽旦湯又曰産後中風發熱而面正赤喘而頭痛竹葉湯主之又云婦人在草蓐中自發露得風四肢苦煩熱頭痛者與小柴胡湯鄭虛庵云凡産後傷寒切不可遽用小柴胡以有黃芩在內易停惡血傷人也産後雖犯時疫宜柴胡四物湯加減即小柴胡合四物湯素問云乳子而病熱脈懸小手足溫則生寒則死此言傷寒也乳子中風熱喘鳴肩息者脈實大而緩則生急則死此言傷風也通宜小建中加蔥豉乳子者言産後以乳哺子也張介賓類入小兒門大繆産後傷風寒熱如瘧兼腹內拘急不能食宜小柴胡去黃芩加當歸紅花丹皮甚則加炮薑茯苓去瘀為主雖有大熱不得用苦寒産虛羸寒熱有似外感食少腹脹方書俱用增損柴胡湯然不若柴胡桂枝湯去黃芩加川芎和其榮衛庶免褥勞之患婦人血風因大脫血而虛熱燥結熱甚則風生其證煩躁身熱循衣摸床撮空閉目不省人事揚擲足搖動不安錯語神昏脈浮而虛或弦革者難治宜生地黃黃連湯脈實稍加酒大黃産後傷寒切不可過用表藥多汗經虛每致發痙也凡胎前發熱理中合四物去白朮地黃加柴胡茯苓産發熱四君子入桂枝芎歸臨産發熱逍遙散加減産婦血虛最易發熱不可一概認為外感也今之醫者治病一見發熱便認外感不論風寒榮衛及裏實便鞭概用發散鮮不誤人如裏發熱認作表發熱者其脈浮緊無汗為傷寒浮緩有汗為中風皆風寒外襲表熱發也其脈實而蒸蒸發熱六七日不大便者為裏實發熱邪氣內傳而熱也有裏惡寒認作表惡寒者初起不熱但惡寒而體倦息微脈沈遲力此寒中三陰裏惡寒也若初起惡寒而體重氣促脈陰陽俱緊為表惡寒始雖惡寒後必發熱也有冬溫認作傷寒者冬溫因腎氣不藏不正之氣入傷太陽少陰二經始病多不惡寒便心煩大發熱而渴必咽痛或下利脈來左手弦軟傷寒則風寒外來始病必先惡寒而後發熱始先不渴至三四日後熱耗津液方渴脈必人迎緊盛也有伏氣發溫認作感冒者伏氣乃冬時伏藏之邪自內達表必不惡寒而發熱一熱即口燥咽乾而渴氣口脈洪大倍於人迎感冒是暴感非時寒氣始病雖發熱一二日內必不作煩渴人迎之脈必弦盛倍於氣口也有勞力感寒認作傷寒者辛苦勞役之人頭疼惡寒身體倦怠而痛微渴自汗此因內傷血氣兼外感風寒人迎脈必弦緊氣口脈必虛弱兩尺必弦數所謂形作傷寒其脈不弦緊而弱是也有夾陰認作陰證者夾陰則有頭疼發熱但足不熱或陽縮入腹陰證則無頭痛發熱也有感冒非時暴寒認作正傷寒者冬月寒水主令故正傷寒中風必先太陽若感非時風寒春多兼足少陽而寒熱秋多兼手太陰而咳嗽若暴寒勢甚亦必傷足太陽為多蓋腎本寒水之經同氣相感也有動陰血認作鼻衄者少陰無汗而強發之血隨藥動或從口鼻耳目而出名下厥上竭言陽隨血而上竭陰在下而發厥也若衄則太陽表邪失於汗下或汗下不解邪鬱中而致也有直中陰經真寒證認作傳經證者陰證則先不發熱四五日或六七日後反發熱者陰極生熱也傳經陰證則先發熱五六日後而變四逆厥冷熱極反兼寒化也亦有始本陽證汗下太過而變虛寒反發熱煩躁者陰陽俱虛竭也有獨語認作鄭聲者傷寒邪熱未解睡中自語名獨語精神昏慣也若汗下太過聲出咽中無力接續名鄭聲正氣虛奪也有少陰發熱認作太陽發熱者少陰則脈沉無頭痛太陽則脈浮緊而頭痛也有太陽無脈便認死證傷寒六七日或十餘日脈伏而不起者此欲作戰汗而解也如大下後厥冷下利無脈是驟虛脈隨氣脫也與三陰厥冷無脈灸之不溫及服薑附脈不出皆死證也有血證發黃認作濕熱發黃者血證則小便自利傷血而不傷氣也濕熱則小便不利氣病而血不病也有痞滿認作結胸者痞為虛邪必居胸脅不在中也雖滿而不痛結胸實邪正在胸中痛不可近者為大結胸若按之方痛者為小結胸有心下鞭痛下利清水而認為漏底者因熱邪傳裏燥屎內結小腹鞭痛讝語惡熱渴飲水漿而利乃下傍流純清臭水為熱結利若下利清穀腹痛善按者為內寒又夾食寒因本虛不化不結而自利或因誤用消導及攻下遂利不止者俗名漏底也有如狂認作發狂者傷寒初起無熱狂言煩躁不安精采不與人相當此因熱結膀胱也又有當汗不汗五六日後小便利大便黑此畜血如狂也若陽明內實發狂必妄言讝語欲登高棄衣此為燥結失下而致也有讝語作狂言者讝語有虛有實熱入胃府水涸燥結者陽邪內實也可下之若火劫取汗讝語者神明擾亂也宜清之多汗亡陽讝語者陽神躁擾也宜和之下利純清水而讝語者陽邪暴虐有似陰寒也急下之若狂言不能食者是失志失志為腎絶必死勿治有女勞復認作陰陽易者差後御女為女勞復此虛邪為患復犯虛虛之戒必死若不病人與病新差者交而得病者為陰陽易此熱毒雖乘虛入犯少陰猶可用祛熱藥治之有合病認作併病者合病則一得病便見兩經之證併病則先見一經證一兩日又加一經證見前證不罷兩經俱病也若先見一經證更變他經者又為傳經矣有暑證認作感寒者暑證則熱傷心包微涼外鬱表之陽虛必背微惡寒而脈虛或細弦芤遲暑傷氣而不傷形也若暑證而脈反弦緊惡寒者此更感非時寒氣也若陽明中暍則煩燥口乾多汗前板齒燥而脈洪大當晝熱甚則脈大證劇至夜稍涼則脈與證俱減可此熱傷陽而不傷陰也若壯熱煩渴引飲脈來洪盛氣口倍於人迎晝夜診之無異此冬時伏藏之邪至夏發為熱病也有噦而認作乾嘔者噦為胃虛誤攻其熱或飲冷水所致其聲濁惡而長乾嘔則似吐而無物出胃中熱與穀氣相併及水逆痰氣所致非惡侯也有短氣認作發喘者呼吸短促而反者為短氣此失於汗下所致宜分表裏汗下之若氣息虛微不續為少氣此汗下太過所致宜生津兼和榮衛若裏氣逆上張口抬肩者為發喘此因水飲傷肺所所致宜疏表邪散水飲為首務若夫真陽不歸而衝氣逆上者又當從事桂附然多不能救也有蚊迹認作斑者發斑多見於胸腹先紅後赤蚊迹多見於手足先紅後黃也有正陽陽明府證認作明經病者府病是胃府受病則六七日不大便讝語發渴而脈實經病是經絡受病則身熱目疼鼻乾不得臥而脈長溫熱發於陽明則自府達經煩渴自汗壯熱目脈赤而脈洪大有溫瘧認作風瘧者溫瘧則溫病熱邪未盡重感於寒而成發於春夏之交其證多熱少寒風瘧則多發於夏秋也有疫痢認作漏底者蓋疫痢是冬時伏氣因春夏多雨火邪為濕伏延至秋時真陽內入其邪內不能容外不得泄變為下痢其證大熱而下痢煩渴其脈必氣口洪盛古人以敗毒散加陳倉米治之誤與攻積利水必死若漏底則因腎氣素虧或夾冷食而見外熱裏寒之證其脈必尺中微弱當夾陰例治亦有熱邪傳裏而下利穢積者又當從傳經熱證治之有中濕認作風濕者中濕則一身盡痛而重脈來沉緩或面黃頭痛鼻塞風濕則一身盡痛而腫關節不利不能轉側惡風不欲去衣其脈浮虛而澀有燥證認作濕證者燥證則肌膚枯稿血少不能榮養百脈而痿弱無力濕痹則肢體浮腫經隧中為濕所襲而痹著不舉也有標本全不曉者即如厥逆若先發熱至五六日傳進陰經血分而厥則為陽厥若始先不發熱即惡寒踡臥而厥則為陰厥及諸病有皆假寒假熱要以邪實壯熱為本病本虛假熱為標熱也有雜證類傷寒者諸凡雜證發熱皆發於裏夜甚於晝惟傷寒為表邪鬱發於外而晝夜俱熱也已上諸證必須詳審明確方得用藥無誤如未病素脾約才病忽便利未病先有固疾已病重添新病之類右不審諦寧無誤滔之失耶至於不治諸證亦須胸次了然臨證始能決斷如傷寒病熱不退脈反沈細者死咳逆上氣脈散者死三部緊盛汗出不解者死陰陽尺寸俱虛熱不止者死身熱喘粗脈躁疾者死汗後餘熱不解未可言死脈如轉索者其日死讝語微熱脈浮大手足溫者生厥逆沈細者死陽病見陰脈者死發少陰汗連厥陰血者厥竭而死發左右動氣汗者死大發風濕汗者死發陰陽毒過六七日死誤汗言亂目眩者死濕家額上汗出微喘小便利而下利不止者死關格不得尿頭汗者死不尿腹滿加噦者死大發濕家汗成痙者死發少陽汗讝語者死亡陽讝語脈短者死直視讝語喘滿者死下利者亦死吐下不解循衣摸床微喘直視脈澀者死內傷瘀積畜血如狂下如污泥者死少陽證誤下身黃胸脅石鞭者死陽明病心下鞭滿攻之利遂不止者死發濕溫汗重暍者死兩感寒者死汗出熱不解而脈躁疾為陰陽交者死陰陽易熱極躁亂脈急疾無倫者死夾陰傷寒身熱足冷下虛邪盛不可溫者死溫熱時行大發熱手足下體寒陽縮脈沈小虛散者死溫病遍身紫赤者死結胸證悉具煩躁者死結胸脈浮大者下之死狂言不能食者死發厥肌冷而躁無時得安者死如結胸狀舌上胎滑為藏結者脅下素有痞連在臍傍痛引少腹入陰筋者死黑斑如果實黶者死舌卷囊縮者死少陰病下利脈弦長名曰負者死目亂無神氣者死少陰病吐利煩躁四逆者死惡寒身踡而利手足厥冷者死脈不至不煩而躁者死下利止而頭眩時時自冒者死下利厥逆無脈服湯脈暴出者死脈不出者亦死發熱下利厥逆躁不得臥厥不止者死汗不出止者亦死下利厥冷煩躁無脈灸之不溫反微喘厥不還者死下利脈反實者死厥利本不能食今反能食為除中者死傷寒七八日大發熱汗出如貫珠為氣衰者死爪甲青為陽衰者死循衣摸床為神亂者死四肢振動唇吻反青為肝絶者死體如煙薰直視搖頭為心絶者死環口黧黑冷汗黃為脾者死汗出如油聲如鼻鼾為肺絶者死卵縮遺尿狂言目瞑為腎絶者死喘而不休為邪勝者死水漿不下為胃絶者死形體不仁為榮衛不行者死乍靜乍亂為命絶者死已上死證不可輕投湯劑若邪熱甚者靜候氣衰或有可生之理正氣衰者惟與漿飲庶幾元神將復經曰漿粥入胃泄注止則虛者活身汗得利後則實者活此其候也要知傷寒證百出貴在治法先後不誤長沙起不過如是余於暇日集諸家之要參以所歷辨論頗晰臨證庶無岐謬非敢云補長未逮聊以抒芻蕘之一得耳脈法世言寒脈類莫不宗節庵浮中沉三法而長沙一脈寢置久矣夫浮中沈之説固為捷訣然不能偏廢經論之綱領也傷寒脈法首言大浮數動滑為陽沈澀弱弦微為陰六經例又言尺寸俱弦者少陽受病也夫弦脈既曰屬陰而又為少陽者何也仲景意以弦脈為陰者兼見衆脈而言也沈澀者陰也兼以弱弦微之類安得不為陰乎六經例以尺寸俱弦者指單見一脈而言豈得不為陽乎以弦脈分陰陽二用之理其義微矣按脈訣以弦脈為陽動脈為陰仲景乃以動為陽脈蓋浮大者陽也兼之以動數滑之類安得不為陽乎又曰陽動則汗出陰動則發熱言浮而動者為陽沈而動者為陰故仲景之脈不可與雜證同語也且夫沈者陰也而又有屬陽者若沈而澀沈而遲沈而細小之類皆為陰也如沈而滑沈而數沈而實大之類皆為陽也浮者陽也而又有虛寒者若浮而滑浮而數浮而緊盛之類皆為陽也若浮而遲浮而虛浮而微弱之類皆虛寒陰證也夫浮而陽者宜發汗浮而虛者宜溫補沈而實者宜攻下沈而陰者宜溫經惟弦脈則隨浮沈以定陰陽以少陽半表半裏故宜和解是以節庵主浮中沈三法即是此意蓋傷寒之邪自表達裏始雖太陽必先皮膚肌肉次入筋骨腸胃若溫病熱病之邪久伏少陰經中從少陰出肌表在表之時不以涼解則邪復入裏而歸腸胃為實熱也此傷寒溫熱脈法之迥異説總論中不暇更述姑以浮中沉三法論之如尺寸俱浮為太陽浮緊而澀為寒邪在表浮緊不澀為表邪方盛浮緊而數為熱欲傳裏若浮而長為傳併陽明或合病浮而弦為傳併少陽要以脈中有力為有神可用汗解浮而緩者為中風宜解肌浮而無力為陽虛便當溫補不可發汗若浮而尺中弱澀遲細足脛逆冷皆內虛夾陰豈可汗乎若三陰證始先脈沈後變微浮者為陰盡復陽欲愈之兆若春夏病發熱頭痛而見浮緊浮緩之脈不大作渴者謂之寒疫若脈雖浮緊而始病見大渴腹中脹滿不和者此即伏氣內發而加客邪外襲也亦有時氣不正邪傷氣分脈浮者此即時行之類也中脈者陽明少陽二經脈也尺寸俱長為陽明長而有力為實熱當解肌長而浮者尚兼太陽宜發汗長而數者為熱盛雖係表證不可用辛溫發汗止宜辛涼輕劑以解肌若長而實大有力大便祕結為胃實可下之溫病熱病及時行疫癘始發多有此脈切不可發汗乃黃芩白虎之證也尺寸俱弦者少陽也弦數為熱邪傳裏之候弦而有力為邪實如大便祕結不行宜大柴胡微利之弦而浮兼太陽證尚宜發汗若弦而遲弦而小弦而微弱皆內虛有寒宜溫之溫病熱病及時行脈弦脅痛俱宜小柴胡去參半加枳橘弦盛有力加石膏知母弦小無力仍用人參有嘔方可用半夏即生薑亦當慎用也然弦脈近乎緊脈冬得之為傷寒夏得之為傷風以夏月風閉汗孔當汗出而反無汗是以脈弦有似乎緊也又傷寒寸口緊盛而尺脈弦細浮數此為腎氣素虛慎不可用麻黃發汗宜小建中和之大抵弦脈雖居表裏之半然表多於裏只宜和解不可攻下利小便也凡沈脈俱屬三陰而有陰陽寒熱之別尺寸俱沈細者為太陰俱沈為少陰俱沈弦為厥陰若沈而滑沈而疾沉而實皆以有力為實熱為傳經熱邪為陽證分緩急攻下之若沈而微沈而細沈而弱但以無力虛寒為直中陰經或為壞證詳微甚溫理之或始本太陽病發熱頭痛而脈反沉者此雖曰太陽而實見少之脈故用四逆湯溫之若夫春夏溫病熱病而見脈沈小微弱短澀者此伏熱之毒滯於少陰不能發出陽分所以身大熱而足不熱者皆不救也惟脈沈實而見陽明府實證者急用承氣下之不可拘於陽病陰脈例也若時行疫癘而見沉脈為毒邪內伏設無下證必無生理大抵沉脈最為關要以決陰陽寒熱用藥生死在於纖毫得不仔細謹察乎夫脈沈細微緩初起無頭痛不發熱便四肢厥冷腹痛嘔吐泄瀉踡臥沈默不渴人皆識為陰證矣至於脈浮而大但按之無力發熱而戴陽渴欲漱水而不能咽煩躁時欲坐臥泥水中此為陰盛格陽虛陽上膈之候人皆不識認作陽證誤投寒藥即死殊不知陰證不分發熱不發熱脈之浮沈大小但指下無力重按全無者便是伏陰急與薑附溫經回陽之藥雖發熱頭痛表證雜出只宜五積散一服通解表裏之寒切忌發泄誤與發汗則脈必緊數而發熱誤用涼藥則脈轉緊盛而躁渴愈急也又有內外有熱其脈沈伏不數不洪但指下沉澀而小急此為伏熱不可誤認虛寒以溫熱治之是益其熱也大法遲澀微弱可溫浮盛洪緊可汗沉細滑實可下虛細勿吐遲弱勿下滑實勿汗沉實勿溫貴在辨脈施治謂上工矣至於結促代伏皆為傷寒死生關捩并為詳識夫脈來緩時一止復來謂之結此陰盛脈必有寒伏於中故傷寒脈結足冷腹中痛宜大建中湯又脈來數時一止復來謂之促此陽盛脈必有熱結於裏傷寒溫熱發斑發喘皆有是脈大抵皆宜內奪清理之後其促漸退則生轉加則死又脈來無力動而中止不能自還曰代雜見病之必死傷寒有寒邪水飲停畜而正氣內虛邪伏不解故有脈結代心動悸者主以炙甘草湯至於伏脈則有汗下溫解之殊但初起頭痛發熱或一手無脈或兩手俱伏者庸工便謂陽證見陰脈之死候殊不知此因寒邪不得發越急用麻黃湯汗之若初起發熱頭痛方除已後厥逆無脈者陽厥也小承氣湯主之若初起不發熱無頭痛便厥冷吐利無脈者直中陰寒也四逆湯溫之若初起陽證至六七日或十餘日但服表汗藥而未曾攻下別無刑尅證候昏冒不知人事六脈俱伏此欲作戰汗而解也當與熱薑湯助其作汗慎勿用藥若誤與湯劑反致變害也察色望而知之謂之神見其色而知其病也故傷寒家尤以察色為首務察其色澤問其困苦辨其聲音更合之以脈類無遁情矣夫肝青象木脾土色黃赤屬心火肺白腎黑皆見於面青主肝藏風寒青而黑者多寒痛青而白者多虛風也陰寒極甚面與唇口青黑甚則舌卷縮及夾陰傷寒少腹痛而面青俱宜急溫者也若夫厥陰熱厥亦有唇面爪甲青紫而脈伏者然細察之脈必附骨有力也面赤多熱而有表裏虛實之殊然亦有陰極似陽者太陽證頭痛發熱喘而面赤者為表證若面色緣緣正赤為陽氣怫鬱在表汗出不徹故也又熱病煩渴面赤脈洪大表裏俱熱也陽明府實潮熱汗多面赤不大便者裏證也少陰病下利清穀裏寒外熱為陰盛格陽夾陰傷寒發熱頭痛面赤足冷脈沈細或浮數無力按之欲散為虛陽上浮壞病汗下過多元氣耗散微陽失守皆面赤戴陽並宜溫補下元不可誤用寒藥若午後面赤為陰火不可作傷寒治兩顴赤色如妝為陰火亢極雖愈必死也面黃主濕黃而明者為濕熱黃而暗者為寒濕黃而帶赤白者為欲愈黃白不榮而多蟹爪紋者為蟲積黃而澤者為內傷畜血黃黑而稿者為食積黃而青黑者脾胃衰極為木勝土而水無制也白主氣虛白而無神者傷寒大病後發汗過多或畜血所致黑主腎衰傷寒顏帶黑青為陰寒之色若久病焦黑者又為腎熱也凡耳目口鼻黑氣枯夭者難愈神庭黑氣如指者陰晦之色見於陽之正位卒死兆也面慘不光傷寒也面光不慘傷風也面如錦紋陽毒也面垢如油喘促多汗足陽明中暍也面垢生塵灑然毛聳手少陰中暑也大率面帶黃者為脾土正色病雖劇可治若青黑赤白異常而無黃色相參者皆非吉兆也凡察病者目以開目欲向明者為陽閉目不欲向明者為陰目疼屬陽明表證目赤為經絡熱盛目瞑漱水鼻燥為陽邪上盛欲解必衄目黃而頭汗將欲發黃目不了了為陽明府實若睛不和者少陰熱也目眩為痰因火運眼胞微腫有水目下灰色為寒飲目白睛黃欲發疸也目宜視不能眴或白睛黃此誤發汗將欲衄也目無精光者為腎氣素虛目正圓者痙不治凡目暗目瞪目陷目反直視戴眼反折皆不治下後目閉為陰血受傷目反上瞪為陰氣上逆凡察病者鼻若鼻頭色青腹中冷痛者死蓋厥陰肝木之青色挾腎水之寒威上徵於鼻下徵於腹是為暴病頃之亡陽而瘁死也其謂鼻頭色微黑者有水氣見黑雖為腎陰之色微黑且無腹痛但主水氣而非暴病也若黃黑光亮而少腹脅痛或善忘如狂又為畜血也謂色黃者胸上有寒穀氣不化而有痰積也謂色白者亡血設微赤非時者死白者肺之色肺主上焦以行榮衛榮不充鼻色白故知亡血也微赤為火色若非火令之時加於白色之上是火來尅金故死黑為勞為房勞以火發於腎水之中故不赤而反黑其黑必枯燥不似水氣之黑而光澤瘀血之黑黃光亮也赤為風者由熱生風風為陽邪故也黃者便難以中焦熱燥腸胃不潤是以便難然必枯而不澤若黃而鮮明者有留飲留飲以津液不行滯其穀氣化熱而致黃也又鼻孔乾燥而脈浮數者將欲衄鼻鼾語言難出者為風溫鼻鳴乾嘔者為傷風鼻痛為肺脾二經有風火鼻柱散闊為肺氣虛而有濕鼻瘦枯黑為脾勞火旺無津鼻上汗出如珠為心脾痛極鼻孔搧張為肺風鼻如煙煤為陽毒凡察病者唇以焦赤為脾燥熱赤腫為胃濕熱青黑為陰寒唇寒面青頭痛發熱為少陽陽明之邪熱傳太陰厥陰唇口上下有瘡為狐惑唇上燥裂為熱在肌肉鮮紅為陰虛火旺淡白為氣虛淡而四繞起白暈為驟亡血唇齒焦黑為燥屎衝膈雖急下之多不可救若唇吻反青環口黧黑張口如魚出氣不復唇口動顫不止及人中反者皆死證也凡察病者口以口苦為少陽膽熱木從火化也口甘為脾土濕熱而津液上乘稼穡作甘也口淡為胃中虛熱胃為一身之主淡為五味之本也口作酸為肝熱乘脾曲直作酸也口作鹹為腎衰虛熱上乘口中常覺血腥為肺氣傷口不和者不知味為內傷津液口不仁者不和澤為外感客邪口燥咽乾為熱傳少陰證煩渴欲飲水小便不利為太陽犯本水入即吐為水逆渴欲飲水壯熱自汗為陽明府熱漱水不欲咽而目瞑鼻燥為畜血漱水不欲咽而目赤厥寒為陰躁口傷爛赤為陽厥口難言為血少口噤咬牙瘈瘲為發痙也凡察病者耳以耳聾胸脅痛寒熱口苦為足少陽證耳鳴及痛手少陽厥陰火也若耳輪乾枯而黑者為腎敗也若耳中策策痛而耳輪黃者為黃耳類傷寒也又重發汗又手冒心而耳聾者陽虛也與少陽經之耳聾迥別凡察舌上胎色另具辨舌論中其有舌本強鞭為痰舌短囊不縮為宿食舌脹大滿口為龍火燔灼此最為急候即宜砭之舌深赤帶紫者為裏熱舌色淡白為裏寒舌栝萎者為心氣耗絶也凡察病者身以輕易轉側而熱者為陽若肢體骨節疼痛為表證以沉重難移動而寒者為陰若腹痛自利厥逆宜溫經然中濕亦主身重痛濕痹則身痛關節不利風濕則身痛而腫骨節煩疼掣痛不得屈伸汗出惡風而不欲去衣若少腹鞭痛小便不利為溺澀小便利者為畜血腹痛自下衝上者火也從上轉下趨少腹者寒也氣從少腹上衝者陰火也從左脅上衝者肝火也大抵足寒厥者陽虛也厥而發熱者熱厥也臂多青脈者脫血也背熱手背熱者外感也腹熱手心熱者內傷也背微惡寒者陽微不能勝陰也渾身惡寒傷寒也自汗身重鼻鼾多睡風溫也內潤筋惕汗下虛也手足瘈瘲虛而有風也額上及手足冷汗陰毒也身目俱疸病也身如蟲行表虛也若頭傾視深循衣撮空冷汗黃形體不仁乍靜乍亂皆不治也凡察病者足以初起手足俱冷者為陰寒宜四逆薑附溫之初起但足冷而手不冷身體發熱頭或痛或不痛便是夾陰須用五積再造選用不可用發汗攻下之劑亦不可用小柴胡以中有黃芩苦寒故也若是內傷陽氣虛人須從東垣補中益氣去升麻柴胡加炮薑半夏桂枝溫中為務又夏暑病濕溫人必足冷手溫多汗妄言宜蒼朮白虎合五苓散不可誤認夾陰而用五積四逆反助熱益病也亦有病手逆冷而兩足熱厥如火者此陰氣衰於下陽氣衰於上陰陽否隔之兆也若初起於腳膝軟弱或足脛赤熱腫痛當從腳氣治之凡察病者以清朗如平日者吉聲重鼻塞者傷風也聲如甕中出者中濕也言遲者風也言驟者火也聲瘖不出而咳者水寒傷肺也聲啞如破而咳者客寒裏熱也驟然聲瘖而咽痛如剌不腫不赤不發熱二便利者陰寒也驟然聲瘖而赤腫脹閉或發熱便祕者龍火也喘逆煩亂讝語者邪氣實也鄭聲者精氣奪也少氣不足以息者氣虛也言遲緩而懶怯者內傷也病人語聲寂然喜驚呼者骨節間病此病在厥陰陰主靜故也語言喑喑然不徹者心膈間病此病在太陰肺主氣故也其聲啾啾然細而長者頭中此病病在巨陽巨陽與少為表裏腎在聲為呻其聲起自下焦故也已上諸證雖非盡屬外感然傷寒家悉宜辨晰庶無謬治之失診病首宜識之辨舌舌胎之名始於長沙以其邪氣結裏若有懷故謂之胎寒之邪表則胎不生邪熱傳裏則胎漸生自白而黃黃而黑黑甚則燥裂矣要以滑潤而白者為表邪灰黑濕潤無胎為陰寒灰黑薄滑為夾冷食皆不可用寒涼攻下之劑然中暑夾血多有中心黑潤者又不可拘於上説也若黃黑灰色而乾燥紋裂者為熱極萬無虛寒夾血之理惟屢汗下舌雖乾而有微薄胎卻無燥裂芒刺此為津耗亡不可誤認實去攻之攻之必致不救也金鏡三十六治法舉世宗之又觀舌心法一百三十七圖條分縷析辨證最詳間論紅為瘟熱紫為酒毒黴醬色為夾食藍為肝藏純色迥出前人未備所嫌舍本逐末未免繁紊使人無提綱挈領處故余括其捷要分條辨論於左如白胎者邪傷氣分肺主氣而色白又主皮毛故凡白胎猶帶表證仲景以為胸中有寒止宜和解用攻下攻下必致結痞變證不測若溫病熱病一發便壯熱昏憤躁渴舌正赤而有白滑胎即當用白虎湯汗之疫初起舌上白胎如積粉者達原飲解之若傷寒邪入胃府則白胎中黃邪傳少陰則白中變黑若純色為一經證邊與中間兩色俱傳經證若從根至尖直分兩路者是合病與夾陰舌也合病則白中兼兩路黃夾陰則白兼兩路中黑潤及灰色也從根至尖橫分兩三截胎色者是併病舌也故尖白根黃尖白根黑及半邊胎滑者雖證不同皆屬半表半裏白胎多而滑黃黑胎少者表證多也尚宜和解黃黑胎多而白胎少或生芒刺黑點乾燥者裏證多也必下無疑雖中心黃黑而滑潤邊白者此為表證未盡傷寒則大柴胡兩解之溫熱時疫則涼膈散或白虎合承氣攻下之又傷寒壞病雖白而厚甚燥裂者此為邪耗津液宜小柴胡稍加芒硝微利之純白滑胎為胃虛寒飲結聚膈上之候每於十三四日過經致變不可泛視也一種白厚胎如煮熟色到底不變者必裏挾寒物留滯不散致脈伏不出乃心脾氣絶肺氣受傷也慎不可下宜枳實理中湯熱甚合小陷胸主之至於能食自利而白胎滑者為藏結難治也黃連湯連理湯備急丸選用間有得生者黃胎者陽明府實也黃濕而滑者為熱未盛結尚未定不可便攻攻之必初鞭後溏也冬時宜確守此例俟結定乃攻不得已大柴胡微利之若在夏月一見黃胎便宜攻下以夏月伏陰在內多有下證最急胎不燥者不可泥也若黃而燥者熱已盛峻下無疑黃而生芒刺黑點者為熱勢極黃而瓣裂者為胃液乾下證尤急也諸黃胎昏屬胃熱分緩急輕重下之有種根黃而鞭尖白而中不甚又乾亦不滑短縮不能伸出讝妄煩亂者此痰挾宿食占據中宮也大承氣加生薑半夏主之有舌色青紫而胎卻黃厚甚則紋裂但覺口燥舌仍不乾者此陰證夾食也脈或沈細而伏或虛大而澀按其心下或臍旁鞭痛而時失氣者急宜大承氣另煎生附子佐大黃下之若脈虛大者黃龍湯下之熱極煩躁者更加生地麥冬夏月尤宜若冬時陰證夾食而舌上胎黃不燥者宜用附子理中合小承氣下之大抵舌有積胎雖見陰象亦虛中有實急攻下無疑但下法與尋不同耳又中宮有痰飲水血者多不燥不可因其不燥而延緩時日致誤也凡溫病熱病稍見黃白胎無論燥潤即宜涼膈雙解時行疫癘稍見白胎即宜白虎達原若見黑黃無論乾濕大承調胃急奪無疑黑胎者少陰腎色也若五六日後熱傳少陰水乘火位亢極之火不為水衰反兼水化如火過炭黑是也始因表證失汗致邪入裏而傳少陰下之則愈然有屢下熱不減胎不退者此必宿食留滯於中宮也宜黃龍湯加炮薑川連有誤用汗下太過津液枯竭而胎燥黑者此為壞病須量人虛實為治虛者其胎必薄而潤生脈散合附子理中實者其胎必厚而乾生脈散合黃連解毒一則陰虛陽亢一則陽虛陰亢不可不審熱勢盛劇則黑胎上生芒刺及燥裂分隔瓣者須用青布蘸薄荷湯拭潤更以薑片刮去芒刺撅起隔瓣看刺下瓣底色紅者可治急下之若俱黑者不治又黑胎腐爛者為心腎俱絶舌黑而卷縮者肝絶皆不可治舌黑及灰或黃而發疱生蟲腐爛雖為濕熱亦屬肝傷俱為危候又中間一路潤黑燥胎兩邊或黃或白者兩感舌也邊黃則調胃承氣邊白則大柴胡下之若中間一路黑滑薄胎兩邊白滑此表裏俱虛胃中雖有留結急宜附子湯溫之凡黑胎多凶黑而乾燥或芒刺瓣裂皆為實熱急宜下奪黑薄濕潤或兼白滑者皆為陰寒急當溫經也一種中黑而枯或略有微刺色雖黑而無積胎舌形枯瘦而不甚赤其證煩渴耳聾身熱不止大便五六日或十餘日不行腹不鞭滿按之不痛神識不昏晝夜不得睡稍睡或呢喃一二句或帶笑或歎息此為津枯血燥之侵急宜炙甘草湯或生料六味丸換生地合生脈散加桂滋其化源庶可或生誤與承氣必死誤與四逆亦死凡舌胎或半黃半黑或半黃半白或中燥邊滑或尖乾根潤皆傳併之邪寒熱不和之候大抵尖黑稍輕根黑至重黃黑宜大承兼白者宜涼膈散分緩急下之若全黑為死現溫覆多致中黑邊極紅潤脈必虛大急用白虎湯清之虛者加人參竹葉如更誤認陰寒而與熱藥必致煩燥不救也夏月中暑多有黑舌黑而中乾者白虎湯無疑黑而滑或邊白者必夾寒食古法用大順散然不若理中合小陷胸最當若直中少陰真寒始病不發熱舌心便黑色非由白黃變化其舌雖黑而滑舌亦瘦小此真藏寒必厥冷自利嘔吐脈沈遲四逆附子輩急溫之稍緩則不可救灰黑舌者足三陰互痛如以青和入黑中則為灰色也然有傳經直中之殊蓋傳經熱邪始自白胎而黃黃而灰黑或生芒刺黑點紋裂乾燥不拘在根在尖俱宜攻下泄熱有淡灰色中起深黑重暈者乃溫病熱毒急用涼膈雙解治之熱毒內傳一次見暈一重傳二三次見二三重也若見三重者不治若直中三陰始病無躁熱便見灰色舌潤無胎更不變別色者此必內夾寒食及冷痰水飲或畜水如狂等證當隨證治之又有感冒夾食屢汗下消導二便已通而古上灰黑未退或濕潤或雖不濕亦不乾燥者不可因其濕而誤認寒妄投薑附亦不可因其不潤而誤與硝黃此因汗下過傷津液虛火上炎所致其脈必虛微少力治宜救陰為急雖無心悸脈代當用炙甘草湯主之有生地阿膠麻仁麥冬之甘潤可以滋陰潤燥蓋陽邪亢盛則用硝黃以救陰陰血枯涸則宜生地以滋陰可不辦乎紅色者心之正色也若紅極為溫熱之毒蘊於心胃及瘟疫熱毒內盛也右濕者不可便下解毒湯或白虎湯紅中有白胎者更感非時之寒也桂枝白虎湯紅中夾兩路灰色胎者溫熱而夾寒食也涼膈加消導藥一二味紅中有黑胎者熱毒入少心陰也大承氣合白虎湯紅極有黃黑芒刺者熱毒府也調胃承氣湯紅極有紫黑斑及遍身發斑者陽毒入心也人參白虎湯加犀角黃連紅極而紋裂者燥熱入肝也大承氣加柴胡白芍甚則加芩連坑爛者濕熱入脾也小承氣加芩連半夏白疱者火氣燔灼也三黃石膏去麻黃紫瘡者水氣鬱伏也解毒湯紅星者心包火炎也涼膈散一種柔嫩如新生望之似潤而燥涸殆甚者為妄行汗下津液竭也多不治急宜生脈散合人參三白湯主之舌痿不能動者肝絶舌忽瘦而長心絶不治紫色者酒後傷寒也世俗庸愚往受寒不服湯藥用薑蔥酒發汗未當而酒毒藏於心包多有此證若純紫或中間略帶白胎而潤者宜葛根湯加石膏若紫中有紅斑或紫而乾黃紫而短縮俱宜涼膈散下之若全紫而乾如煮熟肝者死肝色也其證必飲冷脈必沈滑此陽極似也急用當歸四逆湯加酒大黃下之然多不救大抵深紫而赤者是陽熱酒毒宜用苦寒解毒若淡紫而帶青滑者是直中腎肝陰證急宜吳茱萸湯四逆湯溫之然亦有中心生薄青紫胎或略帶灰黑不燥不濕下證復急者此熱邪傷於血分也犀角地黃湯加酒大黃微利之黴醬色胎舌者乃夾食傷寒也食填太陰鬱遏不得發越久之而成醬色也其證腹滿時痛者桂枝湯加枳朴橘半痛甚加大黃因冷食不消加炮薑厚朴甚則調胃承氣加炮薑下之如胃氣絶脈結代唇吊齒燥下利者死藍胎舌者肝藏純色也傷寒日久屢經汗下失於調理致胃氣極心火無氣脾土無依則肺金不生肝木無制侮於脾土故胎色如靛或兼身藍斑乃心脾肺三藏氣絶於內也必死如微藍色不甚深或略見藍紋者為木受金傷藏氣未絶脈不沉不澀而微弦者可治小柴胡湯加炮薑肉桂主之舌之證類雖繁不外八種胎色撮其大要亦辨證之一助也宜禁傷寒表證宜汗裏證宜下半宜和膈熱宜湧陰寒宜溫此大法也然其人真氣素虛或有宿食者更宜斟酌陶尚文云陽病宜汗宜下真氣衰汗之亡陽下之多脫陰病宜溫宜補真氣衰則客熱便生苟非宿諳不無妄治之失因彙宜禁法如左宜汗太陽脈浮緊盛人迎盛於氣口諸脈浮緊而數頭疼體痛腰背痛強項背強骨節痛身體拘急嗇嗇惡寒翕翕惡熱煩熱不止煩躁喘嗽傷寒無汗中風自汗服發汗藥解半日許復煩衄血點滴不成流熱不解並宜發汗又有脈沉可汗者為身有熱也設身不熱豈敢汗乎禁汗脈虛無陽尺中脈遲諸脈沉細微弱吐血下血及衄血如流口燥舌乾口苦咽乾閉塞及痛風濕風溫濕溫中暑及暍當臍上下左右動氣心下悸動瘡家淋家小便淋瀝大便瀉利溫毒發斑內傷勞倦亡陽漏風少陽寒熱往來經水斷續崩漏熱入血室新産血虛房勞陰虛陽事痿縮夾陰陰虛足脛逆冷太陽犯本渴而小便不利膀胱虛寒咳而小便利俱在禁汗例諸禁汗者非直禁絶表藥也但禁麻黃青龍等峻劑耳如小建中黃耆建中在所必用以意加減可也汗後熱不止必有所因或因冷食不化或因汗後強飲粥湯或汗後更冒虛風或動起不寧或勞心惱怒皆足以致熱也凡服麻黃重劑不得汗後必嘔血或衄亦有下如豚肝而死者以榮血受傷故也宜吐病在膈上胸中懊憹痞悶喉中有痰聲三四日邪在胸中脈大胸滿多痰氣上衝咽喉手足厥冷脈乍結痰氣在胸中心煩滿而欲食不能食胸中鬱鬱微煩而痛欲使人按之反有痰涎下利日十餘行脈反遲而微滑或乍緊或乍結或寸口沉伏或浮滑為宿痰並宜瓜蒂散傷寒頭痛久不愈令人喪明胸膈有宿痰也瓜蒂散吐之寒實結胸宜白散類中風痰涎壅盛宜稀涎散食厥脈滑或上部有脈下部無脈而厥逆胸中兀兀欲吐而按之痛及乾霍亂心腹刺痛欲死並宜薑鹽湯探吐之發汗吐下後虛煩不得眠並宜梔子豉湯病在膈上為裏之表證故用吐法取汗寒月宜置火於暖室不透風處吐之禁吐脈微無陽寸口細弱舊有微溏病在少陽耳聾目赤胸脅痛少陰厥陰病乾嘔元氣虛羸氣血兩虛房勞陰虛勞倦內傷吐血衄血胎産崩漏經水斷續俱在禁吐例南人不可輕用湧吐一吐尚可勝之二吐便致昏困而厥北方質實之人三吐不昏也吐後有頓快者有徐快者或反閟悶者吐未盡也或反熱者不可下也大抵三日後無不快矣宜和寒熱往來脈弦數未下胸中脹滿心煩喜嘔耳聾脅痛舌白胎滑頭兩角痛口苦咽乾頭目眩暈頭汗盜汗默默不欲飲食熱入血室少陽半表半裏諸證並宜和之禁和太陽表證未除陽明裏證已具熱傳三陰腹滿寒中三陰自利夾食夾陰面戴陽足脛冷過汗經虛耳聾尺中虛遲緊細俱在禁和例宜下傷寒五六日發熱頭痛方除蒸蒸發熱脈沉實滑數有力大便不通六七日熱蒸陽明頭痛發熱不大便口噤咬牙日晡潮熱腹痛喘急鞭滿能食不大便潮熱讝語發狂煩躁時悶亂服小承氣轉失氣燥屎逆攻胸下鞭痛下利脈數或遲滑有宿食下利三部脈皆平心下鞭痛潮熱自汗讝語燥渴不大便潮熱手足腋下汗出汗下後微煩小便數大便難大府燥結則氣口脈洪大按之反澀小腹鞭滿而痛不可按小便自利大便黑有瘀血小便不利大便乍難乍易微喘滿而不得臥揚手擲足揭去被衣內實燥滿而發黃少陰病口燥舌乾而渴邪熱內消腎水者急下之自利純清水心下鞭滿不大便者急下之腹脹鞭滿繞臍鞭痛不大便者急下之陽明病汗多熱甚恐胃汁乾急下之腹滿鞭痛為土實急下之大抵一切下證要以舌乾口燥大便不通再以手按臍腹胸脅鞭滿而痛手不可近者急下之然又有脈浮可下者大便難也設大便不難豈敢下乎禁下脈浮表證未解尺中遲弱而足冷六脈大而無力或虛細或乍大乍小發熱頭痛未除惡寒惡風頭背項強腰痛拘急手足腋下無汗嘔吐未除咽中閉塞腹中時滿時減腹脹可按可揉當臍上下左右動氣少陽寒熱嘔吐陽明面合赤色不轉失氣失氣不臭內傷勞力陰虛勞倦經水斷續胎前崩漏大便鞭而小便清小便頻數而少夾陰面赤戴陽夾食胸中煩滿屢服消尅而脈沈手足微厥心下痞滿虛煩欲吐不吐畏寒不能食俱在禁下例凡禁下者慎不可用承氣等藥即下證惟宜導法選用若陰結宜四逆湯入人乳膽汁下金液丹下後不解一日半日復熱或下盡或下後熱邪不除或下後復結或因飲食起居或更冒虛風當詳審以治服下藥不行者藥力不當病勢也更宜大劑下之若誤用承氣不得下後必愈脹以裏無熱結徒傷胃氣濕熱痰飲愈逆也以濕熱例治之有屢用承氣不行改用溫理脾胃藥即行者有下出稀糞色淡不黃不臭者急溫之下出純清水者死下出溏糞者防變溫熱時疫不在此例下如污泥者死下出衃血及血水者死下山鮮血者危下瘀血如膠黏漆黑臭惡難近者死下之不盡驟用補截復發熱讝語妄亂脈躁不寧或忽大忽小者皆不治宜溫初起不發熱無頭痛便惡寒脈沈嗜臥少陰病膈上有寒飲乾嘔不吐嘔吐不止乾嘔吐涎沫腹痛泄瀉嘔逆戰栗踡臥面如刀刮四肢逆冷夾陰中寒唇面爪甲青胃虛咳逆下利清穀不止陽縮入腹囊縮舌潤厥冷過肘膝小便清利自利不渴口中和背惡寒畏寒身疼骨節痛皆直中陰經寒證又裏寒外熱身反不惡寒而面戴陽脈虛大無力或數疾無倫為陰盛格陽煩躁欲坐臥泥水中自利咽乾欲飲水而不能咽皆假熱之證也又初起本陽證汗下太過亡陽脫泄或誤服寒藥後變惡寒厥逆虛汗泄瀉脈或沈細或伏絶或虛大為壞病小便或利或不利而色不黃赤筋惕肉瞤亡陽汗不止而惡寒並宜從溫補例治禁溫本傷寒陽證六七日傳變入裏後變脈沉數煩躁不得臥寐自利腹痛而時痛時止按之結鞭咽痛心煩小便短數赤澀大便實泄利下重下利讝語厥逆不過肘膝厥過即復熱喜冷飲面深赤煩躁便祕讝語欲揭衣被揚手擲足皆屬傳經熱證俱在禁溫例凡服溫經回陽藥其人微煩而渴脈來微數而不實堅身體安和靜臥者少與生脈散或清粥飲其渴後自止慎勿誤與涼藥復助陰寒也若假寒證誤投薑附而大煩躁熱渴不寧者急與苦寒瀉熱無疑足太陽膀胱經禁下若下之太早則變證百出足陽明胃府禁發汗禁利小便犯之重損津液脈必代結足少陽膽經禁汗禁下禁利小便汗則犯太陽下則犯陽明利小便則使生發之氣陷入陰中太陽一禁陽明二禁少陽三禁此定禁也至三陰經則無定禁但非胃實乃禁下耳藥禁者津液內亡作渴禁用五苓淡滲汗多禁利小便小便多禁發汗咽痛禁發汗利小便大便反利禁梔子大便祕澀禁用燥藥吐多不得復吐吐而上氣壅滯大便不通只可宣散上氣禁利大便脈弦禁服平胃而虛虛脈緩禁服建中而實實劫法凡看傷寒先觀兩目赤為陽毒黃為疸次看口舌有無胎狀再以三指平按心胸脅下小腹蓋心胸以候結胸痞滿宿食胃傷先曾誤下致痛而鞭滿正中者為結胸濡大稍偏者為痞未經下滿痛為宿食攻後深按隱痛為胃傷脅下以候熱邪寒水畜血熱而痛者為少陽之邪寒而多嗽為水飲停蓄按之痛而不鞭其人善忘者為畜血小腹以候燥結瘀血按之繞臍鞭痛為燥結雖痛而軟小便利者為畜血也凡始病微惡寒發熱坐臥不安胸煩欲嘔善飢脈弱陰陽未明者慎勿輕用表藥先與甘草乾薑湯加蔥豉一劑後顯陽證用表藥顯陰證用溫藥若陰證或夾陰誤用升散解表必致陽縮入腹而死凡結胸痞滿及心脅鞭滿用生薑搗爛去汁炒微乾乘熱包尉患處凡結胸手不可按大小便祕屢下不通急用灸法以巴豆仁十粒研爛入黃連末白麵研勻作餅填實臍中用艾炷灸七壯覺腹中鳴轉大便利利為效凡結胸手足厥逆者用蔥白十莖生薑一兩同搗作餅烘熱置臍中帛掩尉之待氣入覺響即與枳實理中湯加附子凡結胸證不拘早晚用黃毛雛雞一隻同生薑四兩搗爛帛包烘熱尉結鞭處半日許覺胸中熱乃止更以熱手向下揉之凡痞滿不拘寒熱虛實遲早便用尉法以橘葉生薑蔥頭共搗爛加麩皮半升用紗絹包烘熱尉痞滿處至半日許覺胸膈躁熱即止更以熱手順下揉之凡傷寒發狂難制以醋沃火炭令氣衝其鼻中即定不定者此神亂無主雖下必死若狂定然後察其陽狂陰躁用藥凡傷寒衄血不止用生藕汁或茅根汁盞許服之童便亦可服後微覺寒顫即止慎勿用冷水裛額及濕紙搭天庭鼻柱使瘀積經絡不散致成痼疾也凡直中陰寒無脈或吐瀉脫元無脈先將薑汁酒釀半盞熱服其脈漸來者可治服後一時許仍無脈或暴出數疾無倫者不治若痛甚脈伏者不在此例凡陰寒陰毒四肢厥冷爪甲唇青六脈欲絶不知人事藥不得入者將蔥白搗餅用麝香半夏皂莢末一字填入臍中尉之或用生薑切片貼上艾火灸之併灸關元氣海數十壯脈漸出微汗可治否則死凡中寒卒倒不得以火烘之中暑卒倒不得冷水灌漬若痰厥昏迷卒倒者用牙皂末撚紙燒煙衝鼻中有嚏可治併用稀涎散水調探吐俟醒用藥凡溫熱病燥渴不得汗欲飲冷水者下咽即得大汗而解若傷寒感冒強與之水必變咳嘔噦悸自利等證也凡乾霍亂不得吐者用鹽兩許置刀頭炭火燒紅淬水一升攪服探吐之若誤與粥飲即死凡腹痛未辨陰陽痰食臭毒先用薑鹽湯生香附末三錢溫服候勢稍定然後憑脈證用藥慎勿誤與調鹽水椒水致變嘔噦下利水腫等證甚至不救凡傷寒服藥轉吐出不納者先將生薑汁少許徐徐呷下然後緩緩進藥即不吐也凡胸腹攪痛嘔吐涎沫而時緩時甚面乍赤乍白脈忽大忽小甚則厥逆脈亂此食滯中宮蛔上入膈也急用椒紅烏梅肉為散以安其蛔後隨蛔厥治之凡破傷風及傷濕傷火皆發熱頭痛證類傷寒甚則牙關緊急不開藥不得入者用蜈蚣一條焙乾為末擦牙吐涎立蘇然後驗證用藥凡大便不通尺脈無力胃弱津枯者宜用導法詳辨纘論陽明下篇導法下老人枯燥閟結不在此例凡小便不通先以麝香半夏填臍中以蔥白田螺合搗成餅封臍上布縛良久即通又法食鹽用一字入臍加蔥餅於上尉之即通凡虛人津枯及胞疸小便不通者禁用上法誤用之後必愈閟也凡厄逆不解用硫黃乳香酒煎嗅法及搗生薑查拌艾炒尉期門及灸期門左穴皆取溫散肝氣也若二便不通者禁用此法凡妊娠溫熱病及時疫用青黛伏龍肝為末和井底泥調塗臍至關元乾再易之然不若用大承氣急下奪其裏熱庶免傷胎之患凡傷寒服承氣等下藥以熱薑湯催令速行外用鹽炒麩皮升許乘熱包尉則大便易通若服之下咽即行而不結者為元氣衰弱防有下脫之虞服之經日不行為濕熱痰飲固結急用薑湯催之若服久不行則胃中津液敗壞下之不止必發厄逆而死不下則脹滿而死也若陰證腹痛自利用吳茱萸炒尉良凡傷寒下後熱退不可用參耆驟補以餘邪得補必復熾盛即使虛人亦復俟正糞再行然後補之凡內傷誤服外感藥脈轉緊盛者補中益氣調之誤服寒涼藥脈緊疾者理中湯溫之凡用附子熱藥必須冷服蓋陰極於下陽浮於上以冷折其上之虛陽以熱治其下之沉寒也凡中附子毒一身面目俱赤狂熱失血者犀角黃連甘草煎湯入生萊蔔汁服之則解服麻黃汗出不止者溫粉撲之方用龍骨牡蠣煆過同防風藁本為末和炒糯米粉絹包撲之其汗即止溫熱病誤汗不止將病人髮披水盆中用熟石膏黃連末生粳米粉撲之服瓜蒂吐不止者一味麝香湯解之服大黃利不止者虛人用人參乾薑陳皮甘草烏梅陳倉米煎服或但用陳米烏梅黃土亦效若過服承氣吐利不止如結胸狀諸藥投下未安者按法加益智仁末一錢匙用前湯半劑調服則吐利同效服桃核承氣代抵當湯瘀血未盡腹痛不止炒黑山查炒焦黑糖同伏龍肝煎服久畜之瘀一時不能即盡桃核承氣加桂附溫以散之虛人以桃核承氣加人參補而逐之外用芒硝炒熱尉之若所下血如凝衃多兼血水或如污泥神昏語亂者不治色紅紫者屬熱色晦黯者屬寒色鮮淡屬虛當隨證治之傷寒緒論卷上終
