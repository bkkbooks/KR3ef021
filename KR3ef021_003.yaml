body:
  text: 傷寒緒論卷下長洲石頑張璐路玉父纂述發熱發熱多屬表證傷寒寒鬱肌表則腠理閉密故翕翕熱捫之烙手當以脈之浮緊浮緩證之無汗有汗分風寒營衛施治若汗不得出而煩躁者營衛俱傷陽邪內擾也大青龍湯若尺中無力者此為本虛小建中湯加減凡服表藥三劑汗不出熱不止者死然有陽微不能作汗者可用再造散或黃耆建中加附子血虛加芎歸始能作汗此皆冬月發表藥也若汗下後惡寒脈弱大便不結者屬虛宜溫補助陽為主寒邪傳裏而變熱則蒸蒸發熱此即本身中元氣為寒所鬱不得泄而化為火也若裏證具而表證未已者大柴胡湯表證既罷而裏證已急者三承氣湯通用三陰經寒證太陰厥陰俱不發熱惟少陰病有反發熱脈沉者此非傳經乃直中少陰而仍兼太陽故能發熱也春分以後雖感寒邪皆為非時暴寒不必拘於傷寒例治古人治感冒諸方如芎蘇神木等皆不分三陽經藥以時屬少陽風木不獨太陽寒水也夏月汗府疏豁偶感微寒發熱必心包先受消暑十全證也秋涼發熱咳嗽宜金沸草散甚則小青龍湯若交霜降節後即屬正傷寒矣其或冬時遇暖而病發熱心煩咽痛或自利者為冬溫陽旦湯證也凡春時發熱頭疼煩渴飲水為伏氣發溫春夏發熱而脈大無力為夾內傷發熱而脈細小或虛足脛逆冷而陽縮入腹者為夾陰發熱脈沉小或短澀而足冷陽縮兼腹滿或痛為食鬱雖夏月不妨用薑桂使溫暖之氣助其陽和并食亦得消散雖有表證慎不可純用表劑升其虛陽亦不可過用消導引邪內犯有食積發熱則胸脅煩熱熱則脹復有瘀血發熱則脅下或少腹痛不可拊又有陰虛發熱必夜熱晨涼若瘡瘍初起發熱必有痛處並不可誤施汗劑其脈陰陽俱虛熱不止大汗後身愈熱下利煩躁熱不止汗下後大熱脈躁亂者皆不可治也孫兆治一道士發熱汗出驚眩身戰掉欲劈地有欲發汗者有欲作中風治者有欲以涼藥解之者孫曰此太陽經欲解腎氣虛不能作汗所以心悸目眩身戰與真武湯三服微汗而解頭痛昔人以頭痛專主太陽殊不知三陽經各有部分如太陽頭痛自腦後上至巔頂下有項強腰脊痛之異以太陽經脈行身之後也當辦中風傷寒汗之汗後頭痛如破此轉屬陽明也風火相煽頭痛如破諸藥不效愈表愈痛痛連眉稜者選奇湯證也陽明頭痛上連目珠痛在額前兼鼻孔乾下有身熱不眠之分以陽明脈行身之前也少陽頭痛上至兩角下有耳聾脅痛之殊以少陽經脈行身之側也三時感冒皆有頭痛當從芎蘇香蘇輩選用三陰經至頸而還惟厥陰之脈上巔與督脈會故頭痛上則巔頂收引頭痛下有脈沉弦細手足厥冷此為在經當歸四逆湯若在裏則乾嘔吐涎沫頭痛吳茱萸湯太陽中濕則上有鼻塞吐痰下有腹滿自利少陰中寒上則入連腦齒下煩躁爪甲青此真頭痛不治陽明熱蒸頭痛必小便黃赤而短數調胃承氣湯太陽脈沉身熱頭痛為夾陰黃耆建中湯若誤汗不差者四逆湯溫之太陽證下之頭痛未除脣寒面青指頭微厥復發熱者為表邪內陷於陰分雖頭痛發熱不可用表藥宜竹葉石膏湯冬溫發熱頭痛心煩咽痛自利陽旦湯溫病熱病時行疫癘初起頭痛皆不可用表藥宜黃芩白虎加蔥豉或葛根蔥白湯以治外涼膈雙解達原承氣加蔥豉薑棗合內外而治之裏氣一通頭痛自愈內傷火炎新産血虛皆頭痛但時痛時止而無腦後痛者益火火炎則痛自兩角血虛則痛連魚尾以其自內達外故必行少陽部分是以頭痛見兩角者則有少陽風熱與虛火之別若見額前者亦有陽明與食積之殊其見腦後者必太陽外感無疑也頭重濁陰寒濕之邪上干清陽之位故使頭重頭重惡寒項強不能舉者屬太陽汗之則愈若陰陽易頭重眼中生花者逍遙湯下燒裩散若眩暈而頭重不能舉者此雖夾痰亦屬氣虛導痰六君選用頭脹頭脹者氣虛火炎也冬溫風溫溫病熱病時行中暍中暑多有頭重脹痛皆是濕熱火氣內燔慎不可用發散藥如冬溫陽旦湯風溫萎蕤湯溫病黃芩湯熱病時行中暍白虎湯中暑清暑益氣湯此皆傷寒家切務其他濕痰飲食積疰夏等俱有頭瘇脹痛乃屬雜證此不復贅項強太陽之脈從頭下項連風府故項強為太陽表證然項強八八如凍烏縮頸欲伸而不能自如者此胃氣不得上升乃邪將犯陽明之候若汗出惡風者桂枝加葛根湯無汗惡風者葛根湯項強連脅下滿身熱惡風手足溫而渴者為邪干少陽小柴胡湯乃知項強多兼陽明少陽不可執認太陽也又結胸證項強如柔痙狀此裏實證以背為胸之府背強項亦強也急下之天行時氣發熱至晚則腰脊痛頭項強身重輕則涼膈重則雙解並加蔥白香豉寒濕項強發痙汗過汗經虛生風發痙與陰毒項強治法詳總論中惡風傷風惡風見風則怯密室之中則不惡也蓋風為陽邪必傷衛氣衛虛則腠理疏而自汗汗去則脈浮緩也是以桂枝湯專主自汗發熱惡風之證然寒傷營亦有惡風無汗而喘者蓋惡寒則有陰陽之異惡風悉屬於陽故惡風未罷者必當先解其外也若發汗太過衛虛亡陽遂漏不止惡風桂枝加附子湯風濕熱病寒疫內傷惡風詳總論中惡寒傷寒惡寒雖身居密室猶自憎寒拘急甚則寒栗鼓頷向火不能遏其寒非若寒熱之惡寒熱至則不惡也如已發熱則身熱不欲去衣由陰氣上入陽中或陽微或風虛相搏所致惡寒一切屬表雖裏證悉具而微惡寒者猶當解表俟惡寒已乃可攻裏故先惡寒而發熱者為外惡寒為陽病在陽宜發汗然尺中遲弱者慎不可汗當用黃芪建中湯若太陽證犯本惡寒發熱未除渴而小便不利者五苓散先服一半探吐之發汗後惡寒為虛芍藥甘草附子湯溫之若下利惡寒手足溫者陽邪內陷於太陰之經也小建中湯下證悉具而微惡寒及下利惡寒時時自煩者為陽邪內伏並宜大柴胡湯結胸證微惡寒者必先用桂枝湯解表然後用陷胸湯下之若表不解而便攻之表邪復結其證必危故結胸有一毫惡寒不可下也若初起惡寒踡臥脈沉者為內惡寒為陰病在陰則宜溫雖夏月亦須薑附輕則理中重則四逆若當盛暑須參大順冷香漿水等治之少陰病惡寒身踡而利手足厥冷煩躁脈不至及四逆惡寒不煩而躁皆死證也經曰發熱惡寒發於陽無熱惡寒發於陰尚何疑哉溫熱時行惡寒詳總論本例中石煩治玉峰陸去非繼室嘉平患惡寒周身骨節皆疼飲食不入者已三日而惡寒未止全不發熱診其六脈悉緊而細詢之平日起居飲食絶少雖暑月不離復衣知其素稟虛寒而不能發熱洵為太陽寒傷營證無疑但從來極虛感寒無正發汗之理乃以黃耆建中製生附汁於耆內以助衛氣一服肢體即溫但背猶惡寒不止更與補中益氣十全大補並加熟附而安背惡寒人身背為陽背惡寒者陽虛之驗也然陽氣內陷亦有此證是以背惡寒有陰陽之異若風寒在表則一身盡寒矣但背惡寒者陰寒氣盛可知以陰氣不能消耗津液少陰病二三日口中和背惡寒者宜附子湯及炙氣海熱病初起口燥心煩而背微惡寒者此陽氣內伏於陰中肌表之陽不勝邪及陽明中暍俱有是證以陽邪內消津液故煩渴引飲並宜白虎加人參湯若誤認陽虛而用溫藥必致斑爛不救也故曰口中渴知其內有熱口中和知其內有寒此理皎然矣勞役內傷背惡寒者必寒一陳止一陳為陽虛內熱東垣升陽散火湯又濕痰證亦背惡寒必肢體重痛導痰湯加減若寒熱屢作而背惡寒脈來弦數身有痛處者為發癰疽之候熱寒傷寒寒熱往來者邪正分爭也表邪欲入而正氣拒格陰陽相勝而作也然寒熱往來與寒熱如瘧不同如瘧則作止有時往來則作止無時有日二三發者傷寒寒熱往來雖專屬少陽經亦有兼太陽陽明者邪居表多則多寒邪居裏多則多熱然治法專用小柴胡湯隨證加減寒多增桂枝熱多倍柴胡加芍藥寒多而脈虛去芩加熟附熱多而脈實去參用大黃凡少陽證必先與小柴胡湯和之服後不解若其脈反浮者當與柴胡桂枝湯使其邪從表而散若脈加數者當與大柴胡湯使其邪裏而去也有元氣寡弱之人素挾痰鬱略有動作勞傷則憎寒發熱有似傷寒其脈弦數無力腋下及臂或腿縫中有核腫痛者謂之勞發切勿汗下宜補中益氣加降火清痰藥輕者周時微汗自解如瘧如瘧者作止有時非若寒熱往來之無定也病二三日寒熱往來有時而作脈浮洪者此太陽似瘧也若熱多寒少尺脈遲為血少也若日晡時作汗出而煩脈實者此陽明似瘧也陽明少陽合病日晡寒熱如瘧者大柴胡湯若六七日發熱惡寒舌不短囊不縮脈浮緩者此陰厥似瘧也為欲愈小柴胡湯加桂枝大率往來寒熱不離少陽不拘日數多少邪氣淺深及婦人熱入血室並宜小柴胡湯加減太陽病八九日如瘧狀一日二三度發為欲愈潮熱陽明旺於未申故日晡潮熱一日一發如潮信然傷寒邪入陽明胃府為邪熱內結故可用承氣攻裏凡欲攻裏須病人脈實有力再當審臍下有鞭滿結痛處問平昔有無動氣量輕重施治發於寅卯者屬少陽發於巳午者屬太陽皆不可下俟表證已方可攻之潮熱而嘔胸脅滿盜汗出者不可下柴胡桂枝湯潮熱而脅下汗出為膽實大柴胡湯手足心汗出者為胃實大承氣湯二處無汗為結未實尚宜小柴胡和解俟結定攻之無汗風暑濕三者干人皆衛氣受病惟寒則營血受傷腠理緻密津液內滲陽邪有餘故身熱無汗而喘也蓋邪氣在表熏蒸腠理則汗出今邪不外蒸必傳入裏急用麻黃湯汗之若惡風項強者葛根湯緣邪漸次入陽明經也陽明病無汗小便不利懊憹者必發黃若渴欲飲水小便不利無汗者為犯本俱宜五芩散有飲水內畜而無汗桂枝去桂加茯芩白木湯有脈遲無陽不能作汗者桂枝麻黃各半湯若溫熱病無汗黃芩白虎三黃石膏選用熱病發狂有汗者生無汗者死成無已言三陰為病不得有汗朱奉議亦云三陰與陰陽易皆無汗而仲景厥陰例中大汗出熱不去內拘急四肢疼下利厥逆而惡寒者四逆湯主之又陰毒則額上及手背冷汗不止為亡陽將脫之兆素問云陰氣有餘為多汗身寒由是言之則三陰不宜有汗非三陰皆無汗也自汗太陽中風不由發表而汗泄謂之自汗以風傷衛則表虛不能自固而汗故用桂枝湯散邪以實衛也然濕氣傷於脾暑氣傷於心皆令自汗惟冬月寒傷營則發熱無汗若始本無汗四五日後忽然自汗出此寒邪傳裡而變熱知邪已入府矣凡傷風則惡風自汗頭痛發熱若裏證自汗必煩躁惡熱不惡風寒乎不侔也又太陽經邪犯本則汗出而渴小便難陽明經證則頭目痛眉稜骨疼而自汗陽明府證則腹滿自汗當詳審治之有汗後惡寒汗不止為表虛黃耆建中湯并用溫粉撲之有汗多亡陽不止者桂枝附子湯小便少者加茯苓若陰證自汗必身冷厥逆經云陰氣有餘則多汗身寒四逆湯甚則加人參溫病誤服表藥大汗出煩渴不解脈洪大者白虎湯若傷濕則身重自汗中暑則脈虛自汗中暍則煩渴自汗濕溫則妄言足冷自汗風溫則鼻鼾自汗霍亂則吐利自汗內傷勞倦則氣口虛火身熱自汗柔痙則搐搦自汗治法各詳總論中若發熱而利大汗出熱反盛狂言不食及汗出如油喘而不休汗出如珠著身不流柔汗發黃環口黧黑者皆不可治石頑治郭君升子素孱弱有失血證五月間患時行疫癘壯熱昏憒煩渴引飲自汗如蒸其脈時洪大時減少或用發散和解之劑躁熱轉劇不得已懇治於余用人參白虎調胃承氣隨其脈之浮沉邪之出入相間而施凡兩汗三下所下皆黃水至第四次用黃龍湯始得結糞五六枚周身大汗熱除而痊若礙其體虛而怯於攻擊則邪熱彌熾元氣日爍烏能保有今日乎盜汗盜汗者睡即濈濈然汗出覺則止而不復出矣蓋邪居於衛而欲入睡即衛氣行於乘表中陽氣不緻津汗得泄故但睡而汗出覺在氣散於表而汗止矣故雜病盜汗責於陰虛血熱傷寒盜汗責在半表半裏為膽有熱故專用小柴胡湯若脈浮緊潮熱盜汗柴胡桂枝湯經云微盜汗出反惡寒者表未解也又陽明病當作裡實而脈微弦者必盜汗出又三陽合病目合則汗熱病白虎湯傷寒小柴胡湯溫病熱病得汗後大熱除而盜汗出及時疫下後盜汗不止身有微熱俱宜小柴胡去參半加橘皮頭汗三陰之症皆至頸胸中獨三陽經上循於頭故頭汗出身無汗劑頸而還乃陰陽不和邪居表裏之間故有是證當以小柴胡湯和之然瘀血發黃水氣三證亦有頭汗當以證辨之蓋瘀血頭汗則小便自利大便色黑發黃頭汗則小便不利發熱而渴水氣頭汗則胸滿喘咳若半表半裏則往來寒熱亦有微惡寒手足冷脈沉者大抵頭汗雖主少陽然屬陽明濕熱不得發越者最多至若額上汗出而腦後無汗者定屬陽明無疑頭汗多有裡實證故頭汗而脅下滿大便堅者大柴胡湯頭汗譫語者調胃承氣湯若頭汗而心下懊憹者為虛煩梔子豉湯下血而讝語頭上汗出為熱入血室小柴胡去參加當歸桃仁丹皮凡頭汗出不得小便者不治經云關格不通不得尿頭無汗者可治有汗者死濕家誤汗額上汗出而喘小便難大便利者為陽脫經云濕家汗之額上汗出小便利者死下利不止者亦死以陰陽上下俱脫也孫兆治一人頭汗手足冷心下痞悶大便祕脈沉緊或者見其四肢冷又汗出煩悶以為陰結孫曰大便結非虛結也安得為陰按少陰多有自利者今脈雖沉緊不得為少陰證此在半表半裏投以小柴胡湯而愈此一假正是仲景議論處意謂四肢逆冷脈沉緊腹滿全似少陰然大便鞭頭汗出不得為少陰蓋頭者三陽同聚若三陰輕則至胸而還今有頭汗出是似陽虛故曰汗出為陽微若少陰額上冷汗則為陰毒矣手足腋股汗手足汗出者為熱聚於胃胃為津液之府以熱蘊於內故津液旁達也凡傷寒日晡潮熱手足濈濈汗出者為胃實若手足心腋下濈濈然汗出者為兼少陽實熱也大柴胡三承氣選用然亦有屬胃中寒者經云陽明病不能食小便不利手足濈濈然汗出者此欲作固瘕大便必初鞭後溏此胃中虛冷欲溏泄也當知此汗必冷宜用理中溫之不可概以為胃熱也東垣治一人腳膝痿弱下尻臀皆冷陰汗臊臭精滑不固脈沉數有力為火鬱於內逼陰於外也精氣不固者髓中混以濕熱也以小柴胡去參加茯苓膽草黃檗苦寒瀉之而愈煩熱煩熱為鬱悶不安火熱不得發越之象不經汗吐下而煩熱者為太陽表證經曰病人煩熱汗出則解如未作膈實當和解而已若心下滿而煩則有吐下之殊煩熱自汗而渴屬陽明煩熱脈弦喜嘔或煩而不嘔屬少陽不可不辨汗下後六七日不大便小腹滿而煩或胸中痛而煩熱喘逆者為有燥屎大承氣湯急下之若四五日鼻乾目瞑脈數而煩者為欲衄黃芩湯加柴葛枳桔生地山梔清解之凡傷寒六七日手足三部脈皆至大煩而口噤不能言其人躁擾者為欲作汗解差後虛煩不得眠竹葉石膏湯差後得食而煩損穀則愈有內傷勞陰火動而時煩時靜不可誤認外感而施汗下也凡服藥後煩悶不安頭面髮際遍身發癢者謂之藥煩此胃虛不能勝藥力也與熱薑湯徐徐呷之藥中宜加用生薑以行胃氣自安煩躁煩熱悉屬三陽煩躁則有陰陽之異蓋心熱則煩腎熱則躁煩者心胸慍怒如有所觸外不形現為熱尚輕躁乃手足動掉若無所措內外不寧為熱最劇有太陽表證發熱頭痛惡寒不汗出而煩躁者大青龍湯有太陽裏證渴欲飲水而煩躁及無熱但狂言煩躁者並宜五苓散有表證罷而不大便煩躁者此陽明府實三承氣選用有汗下不解而煩躁惡寒者此為虛寒茯苓四逆湯有脈數心煩而躁至夜不寧者為血虛芍藥甘草湯有晝日煩躁至夜安靜者為陽虛乾薑附子湯有誤用薑附而煩躁虛則升陽散火實則黃連解毒若躁極脈亂者勿治也有少陰病吐利手足厥冷煩躁欲死者吳茱萸湯有陰盛格陽脈沉細而疾渴欲飲水躁極悶亂者此水極似火也用霹靂散并以火尉之進熱藥而燥反甚此藥力未到不可遽用寒涼使陽氣益消則死宜再與熱藥協濟之有溫病熱病時疫溫疫表裏俱邪三焦大熱煩躁大渴者白虎解毒涼膈雙解承氣三黃石膏選用有少陰病六七日無大熱或厥逆自利不得汗脈沉數而煩躁者黃連阿膠湯凡不經汗下而煩躁者為實汗下後煩躁為虛結胸證悉具而煩躁發熱下利厥逆而燥不得眠少陰吐利躁煩四肢惡寒身踡脈不至不煩而躁者皆死證也節菴治一壯年夏間勞役後食冷物夜臥遺精遂發熱痞悶至晚頭額時痛兩足不溫醫不知頭痛為火熱上乘足冷為脾氣不下誤認外感夾陰而與五積汗之則煩躁口乾目赤便祕明日便與氣下之但有黃水身強如痙煩躁轉劇腹脹喘急舌胎黃黑已六七日矣診其脈六七至而弦徑急以黃龍湯下黑物甚多下後腹脹頓寬躁熱頓減但夜間仍熱舌胎未盡更與解毒湯合生脈散加地黃二劑熱除平調月餘而安戈存橘治一人大熱八九日已經汗下而熱不退煩躁目赤拘急沉重六脈洪盛曰此熱在三焦閉塞經絡津液營衛不通也以三黃石膏加辰砂末連進三服而愈喻嘉言治一人傷寒六七日身熱目赤索水至前而不能飲異常大躁門牖洞啓身臥地上展轉不安更欲入井醫欲以承氣與之診其脈洪大無倫重按無力此陽欲外脫外顯假熱內有真寒敢以純陰之藥重劫其陽乎觀其得水不欲咽情已大露而反可咽大黃芒硝乎天地燠蒸必有大雨此證頃刻一身大汗不可數矣於是以大劑人參薑附甘草煎成冷服服後寒戰齒有聲陽微之狀始著以重綿和頭覆之更與一劑微汗熱退而安懊憹傷寒表證誤下正氣內虛陽邪內陷結於心胸之間鬱悶不舒輕則虛煩懊憹重則痞滿結胸矣邪在膈上則宜吐熱結胃府即宜下不可拘也發汗吐下後虛煩不得眠劇者必反覆顛倒心中懊憹與陽明病下之其外有熱手足溫而不結胸心中懊憹及舌上胎滑飢不能食頭汗出而懊憹三者皆邪熱鬱於胸中並宜梔子豉湯吐之下之後心中懊憹而煩為有燥屎下後短氣煩躁膈中拒痛心中懊憹者為結胸陽明病身熱無汗口燥渴大小便不利心中懊憹此為濕熱必發黃溫熱病懊憹為熱毒蘊於膈上涼膈解毒選用口燥伸吟錯語不得眠五芩散合黃連解毒湯江應宿治傷寒十餘日身熱無汗怫鬱不得臥非躁非煩非寒非痛時發一聲如歎息之狀乃懊憹怫鬱證也投以梔子豉湯吐之治其懊憹再以大柴胡下之治其怫鬱而安身體痛傷寒身疼脈浮則為太陽表證以寒氣襲於經絡之間故惡寒無汗而骨節煩疼也必用麻黃湯卒熱發表令氣血流通而愈若自汗脈浮緩者則腠理開泄雖發熱而身體骨節不疼矣若傷寒身疼而見尺脈遲弱者此為氣血本虛不可驟表當先用黃耆建中溫之然後發表可也有汗後身疼脈遲者此陽氣虛也新加湯有發吐下後身疼不休表證不解者仲景必與桂枝湯以汗吐下後津液內耗雖有表邪止宜桂枝調和營衛不可復用麻黃也有太陽表證具而身疼頭痛脈不浮而沉遲無力者此真陽內虛不能勝任麻黃當與四逆湯溫之有裏證身疼者乃直中裏證非傳經裏證也若傳經裏證則屬熱熱主血行又何有身痛哉然直中身疼者寒氣直入於裏陽已內衰不能外通而氣血凝滯故令體痛宜急溫之凡有頭痛發熱而身疼如縛者表證也無頭痛發熱而身疼如杖者直中也有少陰病脈沉手足寒身體痛骨節疼口中和背惡寒者附子湯有少陰下利清穀而身疼痛急當救裏然後治表有陰毒身痛如被杖者有瘀血一身盡痛而發熱面黃者有中濕聲重鼻塞一身盡重而痛者有風濕一身盡痛惡風不欲去衣汗出小便難者有內傷勞倦脈虛倦怠而肢體煩疼者各詳總論本例中石頑治梁溪吳公益患傷寒發熱頭痛先曾服過發散之劑而致面赤戴陽四肢逆冷周身骨節大痛臍腰與小腹相引急痛莖縮入腹囊冷如冰飲食不入時時煩躁而渴勢已瀕危諸醫令具後事矣余診之脈雖洪大鼓指而按之漸小無力曰此真元內虧陰火不歸而遊散在上在外也遂與四逆加參耆下黑錫丹二劑上熱頓除下體漸溫惟周身痛楚不減繼與大建中人參養榮調理而痊拘急四肢為諸陽之本寒邪客於經絡之中故使拘急不和也有因發汗亡陽津血內竭不能榮養筋脈而屈伸不便者有陽氣內衰不能行於四末而拘急疼痛者大抵有發熱頭痛骨節疼而四肢拘急為表證無身熱頭疼而踡臥不伸四肢拘急者為陰證若汗下後筋惕肉瞤而見拘急不仁者則為氣血虛弱也脈浮自汗出小便數心煩微惡寒腳攣急不可與桂枝湯當與黃耆建中湯發汗後惡風小便難四肢拘急者桂枝加附子湯吐利後汗出發熱惡風拘急厥逆及直中陰經厥逆拘急並宜四逆湯心下滿心下滿者謂正當心下鞭滿乃病在氣分邪將入裏而未入也若下早表邪入裏而滿者則為痞也凡心下滿以手按之散而濡者此虛氣也若按之汨汨有聲而軟者有停飲也若按之鞭痛者有宿食也若按之痛而其人善忘者有畜血也治法各具本條陽明證心下鞭滿者不可下以邪在氣分也下之利不止者死利止者愈又曰脈浮而大心下反鞭有熱屬藏者攻之此燥屎逆上攻脾也調胃承氣湯胸脅滿痛胸脅滿者為胸脅下氣塞滿悶非心下滿也邪氣自表傳裏必先胸膈次傳脅下而入胃府是以胸滿多帶表證脅滿當半裏也太陽陽明合病喘而胸滿者麻黃湯則知胸滿屬表而須發汗也又太陽病下後脈促胸滿者桂枝去芍藥湯以病在衛氣芍藥入營故去之太陽病不解傳入少陽脅下鞭滿嘔不能食往來寒熱脈須沉緊只宜小柴胡和解之若舌上有白胎雖不大便不可下本方去參加橘皮傷寒七八日下之胸滿驚煩此邪氣乘虛而入少陽之本也柴胡加龍骨牡蠣湯大抵胸脅滿為邪初入裏氣鬱不行之候只宜柴胡枳桔和之若邪氣留於胸中為實則宜吐也經曰病在胸中當吐之若發熱咳嗽胸滿而兩脅痛如挫者此邪熱挾濕痰攻注也小柴胡去參半加枳殼桔梗括蔞杏仁白芥子竹瀝薑汁若心下滿其人曾閃挫大便黑而脅下刺痛者此有瘀血也桃核承氣加枳桔柴胡不應加生附子脅下偏痛發熱其脈緊弦此寒也以溫藥下之大黃附子湯痞痞者痞窒不通之謂以下之太早虛邪內入而為痞故胸中但滿而按之不痛也有表證未解者又當柴胡桂枝等解散然後用瀉心等劑有汗解後心下痞鞭腹中雷鳴下利者此胃中不和也生薑瀉心湯有太陽誤病下而痞者此胃虛客邪上逆也甘草瀉心湯有少陽誤下心下但滿而不痛者此痰濕上逆也半夏瀉心湯有心下痞按之濡關上脈浮者此熱邪上盛也大黃黃連瀉心湯有心下痞而復惡者此上有濕熱下有陳寒冷熱偏勝也附子瀉心湯大下後復發汗心下痞惡寒者表未解也先用桂枝湯解表後用大黃黃連瀉心湯攻痞本以下之故心下痞與瀉心湯痞不解其人渴而躁煩小便不利者五芩散有心下痞滿引脅下痛乾嘔短氣汗出不惡寒者此脅下有水氣也十棗湯有外證未除而數下之利不止心下痞鞭表裏不解者此協熱利痞也桂枝人參湯傷寒吐下不解心下痞鞭噫氣不除者旋覆代赭石湯傷寒發熱汗出不解心下痞悶嘔吐而下利者大柴胡湯大抵胸脅痞結未經攻下而成者此或痰或食或氣凝滯而然只須小柴胡加枳桔以開豁之曾經下後此為外邪陷入而為痞結方可用陷胸瀉心等劑以疏導之今醫不分曾下未下見有心下脹滿便呼結胸輒與攻下之藥乃成真痞結也結胸傷寒表證誤下實邪內陷則為結胸故當胸鞭滿而痛也凡結胸證心下鞭滿短氣煩躁喘滿心中懊憹或項強如柔痙狀或胸中高起或腹內拒痛或舌上燥渴或日晡小有潮熱或心下至小腹鞭滿脈寸浮關沉為大結胸大陷胸證也凡用陷胸湯宜加陳倉米一撮以曾經誤下胃先受傷用以護持中氣最妙若氣弱脈沉遲不可攻者理中圓頻與之甚則少加附子心下滿而按之方痛脈浮滑者為小結胸小陷胸湯若心下結痛而無熱證不渴不煩此寒實結胸也甘草乾薑湯未效枳實理中湯實人三物白散心下怔忡頭汗出無大熱者為水結胸則輕半夏茯苓湯重則大陷胸加乾薑心下滿而微鞭不可按其人善忘小便反利而不渴此血結也桃核承氣湯心下石鞭胸前大熱而脹滿結痛飽悶氣結者此食結也或已下或未下並宜調中飲虛者可用枳實理中胸中滿結脈浮大者不可下下之則死此邪猶在表也先與桂枝湯解表俟表證已然後攻之若未經下者非結胸也雖有胸脅痞滿只宜小柴胡加枳桔或加桂枝和解之誤下之初覺結胸證見急宜理中湯服此湯便可解散如未解候日足再下之凡結胸有兼發黃發班發狂發厄發噦者最劇結胸證具而煩躁者死結胸二三下之不退者死喘急直視昏憒厥逆手足冷或下出稀水糞者皆不可治大抵結胸之脈沉緊滑實者乃可攻之若沉微細小者決難救矣藏結病如結胸狀飲食如故時時下利寸脈浮關上小細沉緊而無陽證不往來寒熱其人反靜舌白胎滑者藏結也盧子繇言藏結舌上胎白滑滑者純陰之極不可攻也復云此名藏結死遂至置而不講殊不知仲景所謂舌白胎滑者以其仍有熱邪內結所以生胎若無邪結蓋舌乃心之苗紅赤是正色胎白而滑如物入水中色剝而白也按藏結一證昔人以仲景言舌上白胎滑者難治又謂不可攻則胎不生矣只因裏氣素虛不能蒸熱故無陽證發見舌胎亦不得乾燥以其本虛邪結故為難治非真不治也謂不可攻者以其飲食如故知邪不在胃也時時自利其腸中亦無留結也邪既不結於腸胃攻之無益徒伐元氣耳至於素有痞積又加邪結新舊兩邪相搏不解故死雖然未可概為死證而委之不救也喻嘉言曾舉黃連湯余嘗用連理湯治之亦有能食自利腹脹急者用備急丸有腹痛引脅下不可按者用附子瀉心湯有素有痞積痛引陰筋者用四逆湯加萸桂等往往獲效貴在臨證活法耳腹滿陽邪傳入太陰則腹滿凡人胃氣調和則營氣中焦上蒸於肺脾氣不運則營氣不能上蒸或從鬱火而滯於左脅或協痰濕而凝於右脅或隨糟粕而滯於小腹故脾氣衰憊之人腹脅常鞭滿也凡腹脹滿而漫腫虛大者屬氣滯腫鞭光亮者為水結少腹濡腫而痛有青紫筋膜絆於腹皮者為瘀積也腹滿不減按之痛者為實承氣湯下之腹滿時減按之不痛為虛理中湯溫之病人自言腹滿他人按之不滿此屬陰證切不可攻攻之必死四逆湯溫之氣口脈微弦法當腹滿不滿必便難兩胠疼痛此為虛寒從下上也當溫之金匱大建中湯陽明病發熱腹滿微喘口燥不大便或讝語者大柴胡湯少陰病咽乾腹滿六七日不大便或下利純清水陽陽熱亢極急下之大承氣湯病腹滿發熱下餘日脈浮數飲食如故此風熱內陷也厚朴七物湯腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯汗後腹滿當溫之厚朴生薑半夏甘草人參湯吐後腹滿宜下之調胃承氣湯下後腹滿宜吐之梔子厚朴湯腹滿身重面垢遺尿白虎湯大抵陽熱為邪則腹滿而咽乾陰寒為邪則腹滿而吐利食不下若曾經汗吐下後腹滿者治各不同也腹痛胸痛屬表邪內陷脅痛屬半表半裏證若腹痛則純屬於裏但有傳經直中之殊蓋陽邪傳裏與正氣相搏而痛其痛不常而滿腹攻攪此猶帶表邪當以小建中和之因誤下陽邪陷入太陰而痛虛則桂枝加芍藥實則桂枝加大黃陰寒在內而痛者則痛臍下注少腹綿綿無休止時欲作利也當以四逆輩溫之有燥屎宿食而痛者則煩躁不大便腹滿鞭痛是也當以三承氣攻之下之太過而痛者則時劇時輕卻喜溫按當用理中金匱大建中溫補之少陰病腹痛四逆或咳或悸或小便不利或泄利下重四逆散清解之胃中寒熱不和腹中痛欲嘔吐者黃連湯和之中脘痛者屬太陰當臍痛者屬少陰少腹痛者屬厥陰經曰諸痛為實下之則痛隨利減此言陽邪傳裏而痛也又腹為陰寒邪入內必先腹痛下利此言陰寒內結而痛也凡腹痛喜得溫按而痛無休息者為直中陰寒若時痛時止而喜按揉者為傳經壞證皆宜溫之痛不可近而鞭滿者為實結痛不可近而濡軟者為畜血皆當下之此陰陽虛實血氣之大端也小腹滿痛小腹滿痛皆為裏證與胸脅滿之屬氣不同太陽風傷衛不解渴而小便不利邪熱犯本五芩散太陽寒傷營失汗熱結膀胱如狂小便自利小腹急滿結痛桃核承氣湯尺中遲弦少腹濡滿痛不可按小便反利亦有艱澀者為畜血代抵當湯太陰身黃脈沉小腹滿小便不利茵承蒿湯陽明府實小便短赤大便祕結小腹鞭滿大承氣湯陰證初起自覺小腹滿腰腹痛手足厥冷者真武湯若冷結膀胱關元而陽氣不化小便不通者不可誤認溺閉而與利水藥宜先炙本穴然後溫補若炙後手足不溫者不治又有陰陽易病小腹痛引腰胯小便不利者逍遙湯下燒裩散病人素有痞氣連在臍旁痛引入陰筋者名藏結難治四逆湯加吳茱萸肉桂讝語經曰邪氣盛則實精氣奪則虛故實則讝語虛則鄭聲傷寒胃中熱甚上乘於心心為熱冒則神識昏迷妄有所見而言輕者睡中呢喃重者不睡亦語有讝語者合目自言日用常行之事是熱未至於甚也獨語者如見鬼狀若劇者發則不識人語言不休者又其甚也言亂者謂妄言罵詈不避親疏神明已亂也狂言者大開目與人言所未嘗見之事此邪熱之最劇者凡此見其熱之輕重也脈來沉實或數盛有力二便祕澀燥渴讝語狂妄腹脹滿潮熱自汗或下利純清水或心腹鞭痛或過經不解皆當下若下後熱不止或喘滿氣逆而上奔或泄利氣脫而下奪皆逆也大抵熱入於胃水涸燥結必發讝語皆為實有被火劫取汗而讝語者有亡陽讝語者此為虛也發汗多亡陽讝語身自和不可下柴胡桂枝湯和之火迫讝語者津液內竭火熱侵耗所致也桂枝甘草龍骨牡蠣湯得病無熱但狂言煩躁不安精采不與人相當此熱結在膀胱五苓散水調探吐之或加知母甘草名桂苓飲得病無頭痛不惡寒但身熱發渴小便利大便黑口出無倫語此熱在心脾當歸活血湯當汗失汗讝語善忘善飢漱水身黃腹滿如狂者屬瘀血也桃核承氣湯婦人熱入血室夜則讝語如見鬼狀小柴胡加當歸丹皮三陽合病譫語面垢遺尿白虎湯大熱乾嘔呻吟錯語不得眠黃連解毒湯溫熱病及時疫誤用表藥熱傳三焦讝語悶亂者用黃石膏加大黃下之凡讝語無實熱燥結可攻者皆不可治下後讝妄雖稍緩仍不止若未見溏糞者為下未盡更下之諸如此者脈短則死脈自和則愈又身微熱脈浮大者生逆冷直視脈沉細者死石頑治陳仲吾勞力感寒其人年齒雖高而形體豐盛飲噉兼人濕熱素盛初冬患發熱胸腹脹滿甫四日而舌胎焦黑芒刺痰喘聲嘶讝語喃喃不休手足動擲不寧時發厄一二聲二便悶澀脈洪滑搏指右倍於左此濕熱挾邪鬱發下證之最急者遂疏大承氣入鐵漿竹瀝薑汁與之諸醫咸謂日數未久不可便下殊不知濕熱上逆熱若洪水泛濫稍遲則脹透膈膜神丹莫濟矣彼至戚中有善醫者深以余言為然急令煎服連下粘垢二次熱與讝語稍止更服小陷胸至四五劑神識始清糜粥倍進半月後頻索醇酒恣噉新橘致痰濕復聚仍痞悶讝妄發熱或欲再進前方取決於余診之則人迎小弱而氣噓大按之即無安有復下之理況仲景讝語例中亡陽火逆皆為虛證此屬少陽生氣衰微痰涎沃膽之候遂與柴胡龍骨牡蠣一劑而安繼詢善後之策惟香砂六君理脾運痰為第一義惜乎龐見雜出終虧一簣之功耳鄭聲鄭聲者謂虛而聲轉無力不相接續造字出於喉中若鄭聲之輕怯也又重語疊出説過又説亦謂鄭聲益因汗下後失其正音精氣衰奪之候其脈弦細而微身有微熱或寒熱或嘔逆大小便自利而鄭聲者小柴胡湯脈雖微弱而和手足溫者生脈散人參三白湯氣息短促而脈沉細欲絶附子湯倍參若上氣短促或厄逆不止神昏不省人事者死發狂內經云邪入於陽則狂邪入於陰則瘖傷寒熱毒在胃併於心使神不寧遂發狂也發狂雖主胃府實熱亦有屬經證者如病人不欲食小便自利大便自調脈來緊盛骨節煩疼翕然如有熱狀奄然發狂濈然汗出而解此陽明經熱欲作汗而狂也不必用藥宜頻與薑湯助其作汗自解病人熱甚脈來數實欲登高棄衣狂妄罵詈不避親親疏蓋陽盛四肢實實則能登高也大承氣湯頭痛不解熱結膀胱其人如狂而血自下者愈外已解但少腹急結脈沉身黃脣焦漱水小便自利者此為畜血如狂桃核承氣湯凡溫病熱病時疫熱毒內盛脈大腹滿便祕發狂者並宜承氣合黃連解毒湯若脈浮兼表證者涼膈雙解三黃石膏或大承氣加薑棗皆能發汗解表也凡溫熱時行發狂得汗者生不得汗者死脈小厥逆者不治有陽厥暴怒發狂者蓋陽氣暴折鬱而多怒則發狂也大承氣加鐵落陰證煩躁如狂渴欲飲水而不能咽或身熱戴陽手足逆冷脈沉細或虛大無根附子湯火焰散霹靂散選用若陽狂直視便溺自遺與汗後大熱脈躁狂言不食皆不治發斑夫熱則傷血血熱不散裏實表虛熱氣乘虛出於皮膚而為斑輕則如蚊迹甚則如錦紋或病本屬陽誤投熱藥或當汗不汗當下不下或汗下未解或冬溫誤用麻黃助熱或溫病誤用辛溫發表皆能至此慎不可發汗重令開泄更增斑爛亦不可輕下以其熱毒散漫外也惟大便祕躁渴色紫者可微下之凡汗下不解足冷耳聾胸中煩悶咳嗽嘔逆躁熱起臥不安便是發斑之候凡斑欲出未出之際慎不可用寒涼攻熱恐傷胃氣必作嘔噦也發斑皆失於汗下熱毒內攻不得外散蘊於胃府而發出肌表宜先與升麻黑參甘草煎服甚則升麻湯加犀角黑參若斑已出不宜再行升發始發又不宜便下恐毒內陷也若熱毒勢甚咽痛心煩狂言悶亂者犀角黑參湯咽痛可加牛蒡子薄荷之類若斑發已盡外勢已退內實不大便譫語小劑涼膈散或大柴胡微下之溫熱病胃熱發斑錯語神昏熱甚而下證未全者黃連解毒湯加犀角黑參大便祕者涼膈合五苓去桂加滑石未經下而胃熱發斑者白虎加人參湯熱勢甚者合解毒湯時疫發斑憎寒壯熱頭疼骨節痛拘急滿悶初出尚有表證者白虎湯溫毒發斑如錦紋者犀角大青湯脈虛熱甚去芩檗升麻加人參生地柴胡即消斑青黛飲陽毒發斑狂言下利咽痛面赤斑如錦紋陽毒升麻湯脈虛熱甚白虎加人參湯脈洪大不知人者三黃石膏湯內傷寒發斑者此因暑月受涼并傷冷物內外皆寒逼其暑火浮遊於外而發斑也其候寒熱間作或鼻中微衄脈來沉澀皮膚殊無大熱斑亦無多宜頻與調中飲若虛極自利身熱為必死證用補中益氣湯多有得生者陰證發斑者狀如蚊迹蚤痕手足多而胸脅少頭面背上陽部殊無其色淡紅久則為微黃身雖有熱而安靜脈來沉細以其人元氣素虛或先因欲事傷腎或誤服涼藥太過寒伏於下逼其無根之火聚於胸中薰灼肺胃傳於皮膚而發當用理中去木加附子藿香升麻橘皮甚則通脈四逆湯然多不救凡斑紅赤者為胃熱紫者為胃傷黑者為胃爛也大抵鮮紅起發者吉雖大不妨稠密成片紫色者五死五生雜色青黑者十死不一生矣凡斑既出須得脈洪數有力身溫足暖者易治若脈沉小足冷元氣弱者多難治凡狂言發斑大便自利或短氣燥結不通而黑斑如果實黶者皆不可治許叔微治一人內寒外熱而發斑六脈沉細肩背胸脅斑出數點隨出隨隱旋更發出語言狂亂乃陽為陰逼上入於肺轉之皮毛故錯亂如狂非讝語也肌表雖熱以手按之須臾冷透如冰與薑附等藥數服後得大汗而愈滑伯仁治一人身大熱脈沉實而滑四末微清以燈燭之遍體皆赤斑舌上胎黑而燥裂芒刺神昏讝妄以小柴胡加知母石膏一夕連進三服次用大承氣下之而安呂滄洲治一人脈虛自汗誤與真武湯遂至神昏時時熟睡脈伏不至而肌熱灼指此營業致斑之候非陽病陰脈之比先與白虎加人參湯化其斑後以桃核承氣攻之而愈發黃發黃者陽明裏熱極盛熱鬱留飲不散濕熱相搏而成大抵濕熱蒸太陰脾土色見於外必發黃也經曰濕熱交併民多病疸濕氣勝則如熏黃而晦熱氣勝則如橘黃而明傷寒發黃熱勢已極且與畜血相類但小便不利大便實而渴者為發黃小便自利而不渴者為畜血也凡白晴微黃而頭汗及環口汗出便是發黃之候凡小便利大便黑其人如狂頭汗發渴身黃如橘為瘀熱但胸脅痛者犀角地黃加大黃茵陳小腹痛者桃核承氣加茵陳一身盡痛發熱頭汗口渴小便不利身如薰黃為濕熱五苓散加茵陳腹微滿者茵陳蒿湯太陽病失汗一身盡痛頭汗發熱而黃麻黃連軺赤小豆湯發熱小便不利而渴者梔子檗皮湯若肢體逆冷嘔悶自利胸中氣促舌上胎滑脈沉細而緊此陰黃也四逆加茵陳有食更加枳朮橘半草豆蔻下後發黃為脾土受傷熱去而濕在也理中湯加茵陳若外有微熱者五苓散暑月汗閉發黃五苓散用桂枝加茵陳香薷溫毒時行發黃茵陳蒿湯發黃兼發斑者茵陳蒿草龍膽犀角升麻等分煎服名茵陳犀角湯濕家一身盡痛不能轉側身黃脈沉細而遲四肢厥冷怠惰少氣為寒濕白朮附子湯陰黃寸口近掌無脈口鼻氣冷者死形如煙熏搖頭直視環口黧黑柔汗發黃皆真藏氣絶也許叔微治一舟子傷寒發黃鼻內酸痛身目如金小便澀而大便如常或欲用茵陳蒿湯許曰大便如常則知病不在藏府眼疼鼻酸痛此病在清道若用大黃必腹脹為逆以瓜蒂散含水搐鼻中黃水盡乃愈不大便大便不通者陽明內實也因發汗利小便過多致津液耗損腸胃乾燥而轉屬少陽陽明者多矣其人發渴讝語脈實狂妄潮熱自汗小便赤或小腹繞臍硬痛舌胎黃黑乾裂並宜三承氣選用凡欲攻之當先與小承氣服後轉失氣者與大承氣湯傷寒不大便六七日頭痛有熱多汗小便黃赤者此裏熱蒸陽明調胃承氣湯小便清者知邪熱不在裏不可下陽明證具而脈浮或發熱者為表未盡小柴胡和之嘔多雖有陽明證不可下脈浮而惡寒者雖不大便猶帶表邪未可便下大便難小便少不轉失氣攻之必初鞭後溏俟結定乃可攻之陽明脈浮多汗小便利而大便難為津液內竭下之必清穀脹滿宜密煎導脾約大便難麻仁丸陽結不大便大柴胡下麻仁丸陰結不大便四逆湯加薑汁白蜜下金液丹婦人血風崩漏男子失血過多內有燥熱撮空閉目錯語神昏而不大便者生地黃黃連湯加荊芥脈實稍加酒大黃大病後津枯氣逆攻痛大便不行當歸三錢生枳殼廣皮人參各一錢入薑汁白蜜熱服若血虛至夜有熱加一地餘熱不盡并溺赤澀加二冬切不可用潤腸麻仁等丸凡不大便而脈虛澀循衣摸床直視喘急為真陰內竭舌黑脣焦齒根灰腐者為燥屎上衝皆死候也石頑治國學助教顧九玉女小産後感冒客邪或用散表之藥熱不止大便數日不行六脈結代氣口尤甚舌心灰黑而無積胎心中動悸不寧正合仲景炙甘草湯證例遂作本湯服之二劑而更衣熱除脈復矣自利傷寒邪氣傳裏裏虛挾熱則自下利當別其陰陽三陽下利皆身熱太陰下利手足溫少陰厥陰則身寒無熱此大概也夫自利清穀不渴或渴不能飲或喜熱飲小便色白厥冷惡寒脈來沉遲無力或身反發熱手足逆冷皆直中陰寒自利也若渴欲飲冷溺色黃赤自利黃水及泄利下重臭穢日晡發熱脈來數實而滑雖或厥逆而發熱皆傳經挾熱下利也蓋因風邪入胃木來侮土故今暴下或溫或攻或固下焦或利小便但不可發汗汗之使邪內攻必成脹滿耳惟合病發熱自利則為表邪不可例以為裏證也自利者不因攻下而自泄利也然有夾食夾水表邪傳裏合病伏氣傍流陰寒之不同又須辨其協寒協熱協寒而利者必為溏協熱而利者定為腸垢也如夾食證過用消導裏藥引邪內犯而泄利者胃苓湯有表證發熱飲水水停心下而喘咳自利者小青龍加減輕者五苓散加葶藶有水停脅下鞭痛咳而自利者十棗湯脅下一片獨冷加炮薑虛寒者少加桂附行之有表邪傳裏腸鳴腹痛下利脈沉遲者小建中和之有合病發熱脈浮自利者葛根湯有冬溫發熱咽痛自利心煩陽旦湯加桔梗茯苓有溫病發熱而渴小便赤澀大便自利脈浮者五苓散去桂加黃苓脈沉豬苓湯溫熱內甚而自不止者黃連解毒湯少陰四逆泄利下重四逆散下利讝語有燥屎小承氣湯傷寒十餘日口燥舌乾心中疼自利清黃臭水大承氣湯急下之凡食下即化腐臭而出是有火也今火邪內爍陰津耗竭燥結如石故傍流清黃臭水與完穀不化之屬陰寒者不同慎勿誤認陰寒而與溫藥必死凡始病不發熱便腹痛嘔吐為陰寒自利如太陰自利不渴而脈沉理中湯寒甚加附子小便不利合五苓散少陰自利而渴小便色白者附子湯小便不利真武湯自利厥逆而反面赤戴陽或下利清穀裏寒外熱白通通脈選用吐利厥逆煩躁欲死者吳茱萸湯厥陰自利止而煩躁發熱陰盡復陽也當自愈下利下利者不當下而便攻之內虛協熱而泄也有協熱壞證之不同如太陽病未解而數下之遂協熱而利心下痞者桂枝人參湯太陽病下之早遂利不止脈促者表未解也葛根黃芩黃連湯傷寒發熱汗出不解心下痞鞕嘔吐不利者大柴胡湯下利傍流清黃臭水者大承氣湯下利煩渴飲水臍下熱甚下重及誤用熱藥協熱利者白頭翁湯下利脈大腸鳴者虛也以其強下之故也當歸四逆湯汗下太過而畏寒厥逆嘔吐不能食泄利不止脈來虛微乏力當從陰證例治溫熱毒邪內盛而利不止黃連解毒湯躁悶狂亂者漢石膏湯下利差後至其年月復發者此痼寒留結也備急丸凡厥而下利先厥後發熱者利必自止再厥必後利下利脈大者為逆脈緊者為未解脈大者為未止脈弱者為自愈雖發熱不死下利脈沉遲面少赤身有微熱下利清穀必鬱胃汗出而解凡下利脈數而渴者令自愈設不差者必便清血以有熱故也傷寒厥逆下利當不能食者為除今反驟能食中也脈不出者死言胃氣竭絶而求助於食也下利讝語而目直視下利厥逆煩躁不得眠下利發熱而自汗不止下利止而頭眩下利厥逆無脈炙之不溫而脈不出下利厥冷無脈服通服四逆湯脈暴出而躁與下利日數十行脈反實者皆為不治之證也便膿血便血有陰陽冷熱之不同若便膿血則皆濕熱無疑昔人有言見血無寒又言血熱妄行則知下血屬熱者十常八九間有一二屬寒者陽證內熱則下鮮血陰證內寒則下衃血若紫黑成塊或如豚肝及下血水多者皆難治也陽證則脈數有力為實熱可用苦寒藥治之少陰病八九日一身盡熱以熱在膀胱必便血也冬月當歸四逆湯餘時黃芩湯換赤芍加當歸厥逆發熱屢作不止下膿血而脈數飲水者白頭翁湯若臍下熱而痛者芍藥甘草湯少陰溫熱病下利膿血煩渴不得臥黃連阿膠湯少陰傳經壞病三四日至四五日腹痛小便不利下利不止便膿血者桃花湯陰證下血色瘀晦或發厄者附子理中湯厄加丁香柿蒂然多不救凡下利膿血脈宜虛小若脈陰陽俱虛熱不止及脈弦大而實緊直如按弓弦弦細如循刀刃者皆不治小便不利邪氣聚於下焦結而不散則少腹鞕滿而痛小便不通若引飲過多水飲停蓄或下焦多熱或中濕發黃皆以利小便為先惟汗後亡津液胃中乾與陽明汗多者則以利小便為戒若誤利之重耗其陰反致泉竭多有涓滴不通而死者可不慎歟不但湯藥當禁外尉亦當戒之太陽表邪未盡雖小便不利發表藥中不可便加利水藥誤用必致犯本若脈浮煩渴飲水小便不利者為入裏也或身黃脈沈結小腹鞕者為無血也並宜五苓散心煩懊憹發黃者加茵陳身黃腹滿小便不利者茵陳蒿湯若表證盡除而引飲小便不利者此熱在下焦也豬苓湯若汗出多不可與豬苓湯宜竹葉石膏湯胸中鬱鬱微煩懊憹不安而小便不通者此熱傷太陰肺氣不行膀胱不化也梔子豉湯涌吐之熱病脈洪大自汗出舌燥飲水小便不利者白虎加人參湯若大便乍難乍易或下清黃臭水小便黃赤不利者此有燥屎也調胃承氣湯太陰腹痛自利小便不利腹滿脈實者桂枝大黃湯無熱脈沉者理中湯不效用五苓散少陰虛寒腹痛自利四肢疼重小便或利或不利或咳或喘或嘔此為有水氣真武湯熱傳少陰四逆或咳或悸或小便不利或腹中痛或泄利下重者此陽邪陷入陰經也四逆散加茯苓厥陰手足厥寒脈細欲絶小便不利當歸四逆湯凡小便不通而見頭汗者為陽脫此關格之疾也不治小便難小便難者雖通而淋瀝赤澀為陰虛陽湊膀胱受熱也凡小便不利而不至於不通者勿妄利之恐引邪入膀胱而變畜血也汗下後腹滿小便難者理中湯加厚朴茯苓不應加附子汗後舌乾微黃黑而無積胎心煩動悸不寧小便難炙甘草湯汗下太過而小便難至夜煩躁者當歸補血湯合生脈散脈沉自利四逆畏寒而小便難者為津液竭而氣化不行也雖難必無黃赤澀痛四逆湯合生脈散凡小便不利及澀數而難者服清利膀胱藥不應即當清理肺氣滋其化源蓋肺氣窒塞則小便不行肺中虛熱則小便難若肺氣虛寒則小便清利倍常試觀有肺者有尿無肺者無尿此理皎然矣許叔微治一人太陽證因發汗不止惡風小便澀足攣急屈而不伸脈浮而大此證在仲景方中有兩條大同小異一則太陽病發汗遂漏不止惡風小便難四肢微急難以屈伸一則傷寒脈浮自汗出心煩微惡寒腳攣急一屬漏風小便難一屬有汗小便數病各不同用藥少差便有千里之失與桂枝加附子湯三啜而汗止佐以芍藥甘草湯足便得伸而愈小便自利小便自利者為津液偏滲有陰陽之不同大法有四一為太陽表邪未入於裏一為大便鞭而水液旁達一為膀胱為畜血所傷不能約制水液一為下焦虛寒津液下脫太陽病發熱無汗頭疼骨節痛而二便如常者麻黃湯陽明府證微熱手足汗小便雖利而必黃赤承氣湯凡小腹鞭滿應小便不利今反自利其人如狂者此有畜血以血為陰邪不能耗水故也抵當湯代抵當亦可少陰病四逆小便自利而色白虛寒四逆湯或真武湯去茯倍附子既吐且利小便復利大汗出下利清穀裏寒外熱脈欲絶者通脈四逆湯大抵小便利而色黃大便不行者為裏實若小便利而小腹痛或善忘如狂者為瘀血若小便利而身寒自利脈沉微其色清白或反多者皆屬陰寒也小便數小便數者腎虛而膀胱協熱故水道頻數而黃赤不長也雖有自汗表證不可服桂枝湯得之便厥為其走津液也傷寒脈浮自汗出小便數心煩微惡寒腳攣急尺脈弱者黃耆建中湯不應加生附子汁製黃耆尺中緊細而數者勿用附子本加人參赤茯苓素常失血者更加牡丹皮此味雞涼不礙發散也脈浮澀小便數而大便祕者為脾約麻仁丸小便數大便鞭不更衣十日無所苦渴者五苓散嘔吐嘔吐與乾嘔卻異嘔者聲物俱出火擊痰動也吐者無聲而但出物濕痰無火也蓋胃中有火則有聲若但吐無聲胃中陽虛可知能無從事辛溫乎然嘔甚於吐其類有五一為邪傳少陽一為寒邪傷胃一為熱邪傳裏一為壞病胃虛一為陰寒內拒故凡嘔吐清水即為直中寒證若胃中有熱必見涎液酸水也病機云諸嘔吐酸及水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒可此見矣始病便嘔吐飲食者感寒食不化宜於芎蘇香蘇正氣選用嘔多雖有陽明證不可下為其氣逆而未收斂為實也嘔吐雖出於胃以表邪將欲傳裏裏氣上衝邪正分爭而然屬少陽半表裏證如心煩喜嘔胸脅滿而嘔往來寒熱而嘔日晡發熱而嘔或已發汗而煩滿脈洪數者總屬少陽並宜小柴胡加減若微熱不止腹痛不大便鬱鬱微煩而嘔者大柴胡下之若初病熱熱頭痛便見嘔逆自利為合病以邪氣衝斥循經熱入而傷動胃氣也食穀欲嘔者屬陽明胃中虛也吳茱萸湯得湯反劇者屬上焦也桂枝加厚朴杏仁湯汗下後關上脈遲緩而吐為胃寒理中湯屢經汗下食入即吐乾薑黃芩黃連人參湯陰證嘔吐膈上有寒飲拒格也太陰腹滿嘔逆食不下或腹痛嘔吐脈沉者理中加橘半寒甚加附子少陰脈沉遲飲食入口即吐心下溫溫欲吐復不能吐自覺腹滿而按之不鞭手足寒自利小便色白者四逆湯加吳茱萸生薑大汗下後惡寒厥逆水藥不得入口身痛自利真武湯加半夏下黑錫丹與太陽病發汗後水逆之五苓散證不同凡溫病熱病嘔吐者火性上炎也無問表裏通宜涼膈散嘔吐煩渴者白虎湯濕溫嘔吐者白虎合解毒胃寒而嘔吐者橘半藿香厚朴為主胃熱而嘔吐者芩連葛根竹茹蘆根為主胃虛而嘔者參朮苓半生薑糯米為主陰寒而嘔吐者吳茱萸乾薑附子丁香為主凡嘔吐切不可用甘草大棗皆當去之惟胃虛者不在禁例凡嘔家必用半夏生薑利水下痰水去嘔自止矣故生薑為嘔家聖藥嘔家有癰膿者不可治嘔膿盡自愈此言胃脘癰也夾食夾痰嘔吐見總論本例中乾嘔乾嘔者寒鬱中脘令陽氣蘊而不舒欲吐而不能吐也若有熱在內而嘔則或出酸水苦水痰食矣安有乾嘔之理哉故凡見乾嘔即為寒證無疑其太陽與少陽及水氣皆有乾嘔如太陽乾嘔則有頭痛發熱少陽乾嘔則有胸滿脅痛水氣乾嘔則有脅下引痛若直中陰寒乾嘔則外無一毫表證必見下利清穀及諸寒證也然太陽少陽水氣三者之乾嘔皆不離乎寒也傷寒表不解乾嘔身熱微喘或自利而咳小青龍湯汗出痞悶脅下引痛乾嘔短氣者十棗湯手足厥冷乾嘔及噦而煩滿者橘皮竹茹湯太陰腹滿乾嘔理中湯加橘皮半夏少陰病下利脈沉細乾嘔乾薑附子湯乾嘔而煩厥逆無脈白通加豬膽汁湯裏寒外熱脈微欲絶乾嘔通脈四逆湯膈上有寒飲乾嘔四逆湯加吳茱萸生薑厥陰乾嘔吐涎沫頭痛吳茱萸湯溫病熱病時疫乾嘔煩悶者黃連解毒湯凡乾嘔表證及水寒留飲與陰寒內拒治各不同也腸嗚邪氣內搏其飲則為腸嗚雖有寒熱之不同無不因積飲所致下後身熱不除心下痞鞭腹中雷嗚下利者瀉心湯選用若腹痛便祕熱劇當下者小承氣加苓半木香薑汁虛加人參腹中寒氣雷嗚切痛胸脅逆滿嘔吐者附子粳米湯噦噦者其聲濁惡而長有胃虛氣逆停飲虛實寒熱死生之辨凡傷寒邪未入府或其人本虛故攻其熱必噦言胃虛不能食之人誤用寒藥或飲冷水所致理中湯加丁附渴而小便不利者加桂苓傷寒噦而腹滿視其前後知何部不利利之則愈此熱氣壅鬱上下不通而噦也有潮熱時時噦先與小柴胡湯加茯苓後與大柴胡湯嘔噦手足逆冷橘皮半夏湯若胸滿虛煩橘皮竹茹湯胃氣寒者理中湯加吳茱萸湯噦不止橘皮半夏湯或橘皮竹茹湯去竹茹加乾薑桂心通草溫病熱未除或重感暴寒或內傷冷物而噦者黃芩加半夏生薑湯加廣藿香葉橘皮溫病有熱飲水暴冷作噦橘皮半夏湯或半夏茯苓湯并加蘆根茅根熱病汗不出大顴發亦噦者死凡腹滿不尿脈散頭汗目瞪而噦者不治凡噦而二便不通者屬實熱厥逆自利為虛寒兼嘔逆者為停飲設非此三種則為胃氣垂絶之候多難治若有疝瘕動氣又當別論不可忽也噫氣噫氣者胸中氣不交通也靈樞曰寒氣客於胃厥逆從下上復出於胃則噫氣也傷寒汗下後心中痞悶噫氣不除者旋復代赭石湯石頑治郭孝望女年十七夏月因鄰家失火受驚遂發熱自利嘔逆不食或以傷寒治之熱嘔愈甚更以滾痰丸下溏糞三次而變目瞪不語噫氣不絶四肢逆冷不能動移諸醫咸謂壞證議與承氣下之而猶豫未決邀余診之六脈如絲問之知厥冷昏沉不語已三日矣此陽氣欲脫之兆本驚氣入心而自汗發熱驚則痰聚膈上而嘔逆不食夏月本無大寒何得誤與發表攻裏元氣大傷致變此候真似傷寒壞病耳仲景云傷寒發汗若吐若下解後心中痞悶噫氣不除者旋覆代赭石湯主之遂與此湯連夜速煎不時頻灌至侵晨視之喘息噫氣皆除肢體溫和周身沾沾有微似之汗目能移動但口不能言目不能開而睛已微轉其脈三倍於昨矣改用六君子調理而安厄逆厄逆者氣上逆而為厄忒也或以為咳逆者誤也按咳逆上氣為咳嗽氣逆非厄逆也或以厄逆為噦者亦非也噦者其聲濁惡而長厄逆者才發咽喉則遽止厄厄然續連數聲而短促不長有因胃熱失下濁氣不得下降逆上而作脈必應指有力證必內實便閉口渴此非真厄也當下之大承氣湯便軟者生薑瀉心湯胃虛有熱者橘皮竹茹湯胃中有痰飲而作氣口脈必弦滑大於人迎橘皮半夏湯有因誤服寒涼或飲冷水水停心下胃中虛冷而作脈必結代橘皮竹茹湯去竹茹加乾薑桂心通草名橘皮乾薑湯不應加丁香五六粒平素胃虛少食者加薑汁炒焦白朮二三錢或附子理中湯此為夾水勿疑代脈為死證也若往來寒熱而厄者是邪將入裏裏不納邪逆上衝激而然也此屬少陽以小柴胡和之不應加黃連乾薑桂枝若氣自臍下直衝於胸嗌間厄逆者此為肝腎虛寒之極而挾陰火上衝其脈必沉細知不在胃也病既下虛內已伏陰或誤用寒涼遂至冷極於下迫其相火上衝而為厄逆真氣欲盡也輕則附子理中加柿蒂薑汁重則四逆湯加丁沉面赤者急投羌活附子散亦有得生者病人煩躁自覺甚熱他人以手捫其肌膚則冷此無根失守之火散亂而為熱非實熱也乃水極似火陰極似陽之假熱誤用涼藥下咽則斃急宜附子湯加薑桂丁沉下黑錫丹或羌活附子散溫之厄逆漸止者可愈服藥不效者難已畜血腹大青筋發厄者不必治厄代抵當湯每服加人參一錢熟附子五分乾漆灰二分或桃核承氣加參附乾漆灰更捷此九死一生之候非此不能奪也凡久病而見厄逆者此真氣已衰不治厄逆脈散舌短灰黑及頭汗不得尿與大便自利而腹滿者皆死咳嗽諸咳悉屬於肺故傷寒中風暴嗽皆為表證非虛勞久嗽裏證之有藏府傳次不同也傷寒咳嗽傷寒停飲及邪傳半表半裏亦有陰寒內結者如水與表邪相合而咳則乾嘔發熱而悸小青龍湯裏澼合水動肺而咳則身涼脅下引痛十棗湯水與裏寒相合而咳則腹痛自利四肢疼重真武湯邪傳半表將入於裏而咳則寒熱胸脅胠滿小柴胡去參加枳桔陽邪傳裏而咳則四逆泄利下重四逆散加枳桔橘紅有少陰發熱而咳則脈沉無頭痛麻黃附子細辛湯有陰寒內結而咳則自利腹痛四逆湯加五味細辛太陽陽明合病而咳則身熱腹滿自利葛根湯陽明少陽合病而咳則嘔而腹滿小柴胡加葛根凡外感風寒咳嗽發熱頭痛鼻流清涕者必先發散為主若寒鬱熱邪咳嗽則痰唾如膠金沸草散加減熱邪傷肺而咳必咽腭腫痛萎蕤湯加減溫病熱病咳嗽黃芩白虎並加蘆根竹葉若煩悶則涼膈雙解選用大抵外感咳嗽當以汗解然又有不可汗者經曰咳而小便利及數不可發汗發汗四肢厥逆又咳而發汗踡而苦滿者並宜小建中為主若脈散者為心火淫於肺金鬼賊相刑必死也凡咳嗽與傷寒無預者詳見醫通本門石頑治包山金孟珍正月間忽咳吐清痰咽痛五六日後大便下瘀晦血甚多延至十餘日請治於余其脈六部皆沉弦而細此水冷金寒之候也遂與麻黃附子細辛湯其血頓止又與麻黃附子甘草湯咽痛亦可而覺心下動悸不寧詢其受病之由乃醉臥渴引冷飲所致改用小青龍去麻黃加附子一劑悸即止咳亦大減但時吐清痰一二口乃以桂酒製白芍入真武湯中與之咳吐俱止尚覺背微惡寒倦怠更與附子湯二劑而安又治禮科薑如農長媳患風熱喘咳無痰灼熱自汗而懷妊七月先曾服和解清肺藥二十餘劑其咳轉劇而胎漸不安余診之六脈皆濡大無力右手寸關獨盛而澀曰此熱傷肺氣也反與和解藥逼令汗出致肺氣益燥而咳逆愈甚不得已復用苦寒折之則火轉鬱伏而不散也遂用大劑萎蕤及川芎杏仁白薇甘草取萎蕤湯之半更以當歸桔梗五味黃耆益氣生津固肌斂肺二劑汗止咳減胎亦向安更加生訶子皮四劑而痊又治郁金巖勞役後傷風自汗胸滿痰結咳出青黃涕大如彈丸此即內經所謂勞風治在肺下也與茯苓桂枝白朮甘草湯加薑汁竹瀝二劑而安又治宋襄日女素常多鬱乾咳春間感冒風邪而咳逆愈甚以小建中湯用蜜煎生薑加蜜煎橘皮外邪即解而咳不止次以逍遙散仍用蜜煎薑橘更與異功散用蜜製白朮薑橘而安又蜜煎橘皮外邪即解而咳不止次以逍遙散風潤肺止嗽之藥不應轉加嘔渴咽痛求治於余診之大脈浮滑應指作半夏散與之三啜而病如失或問咳嗽咽痛而渴舉世咸禁燥劑而用半夏輒效何也曰用藥之權衡非一言而喻也凡治病必求其本此風邪挾飲上攻之暴嗽故用半夏桂枝以開通經絡迅掃痰涎兼甘草之和脾胃而致津液風痰散而營衛通則咽痛燥渴自己設泥其燥渴而用清潤滋其痰濕經絡愈壅津液愈結燥渴咽痛愈無寧宇矣不獨此也近世治風寒咳嗽雖用表藥必兼桑皮黃芩花粉甚則知柏之類少年得之必種吐血虛損之根中年已後得之多成痰火喘嗽之患然此輩之妙用在於預為地步診時泛謂陰虛防變不足之證初時元氣未衰服之邪熱暫伏似覺稍可久之真氣漸傷轉服轉甚安慮其不成虛損耶及見吐血則不問何經府藏屬火屬傷血之散結色之晦鮮瘀之有無概以犀角地黃寒涼止截之劑投之致血畜成根向後或兩月一月一發雖日服前藥不應矣凡此之類未遑枚舉然必如是則病家任之不疑傍人目之為神斯所以聲名日著也嘗見一人患頂腫發熱延傷寒家視之則曰大頭傷寒以表藥發之并頭亦脹確然大頭無疑矣病家以其治之益甚另延雜證家視之則曰濕熱痰火以裏藥攻之則頭與項前左半皆消但項後右側偏腫則又確乎非大頭而為雜證矣病家又以腫在偏旁疑為癰毒更延癰疽家治之則曰對口偏疽以托裏敷外藥治之則氣血益滯熱不得泄鬱遏竟成潰瘍矣本一病也治之迥異證亦屢遷可見其病隨藥變之不誣耳第未習所趨非此不足以入時何怪乎聖人性命之學淪胥不返遂至若是耶喘形寒飲冷則傷肺故氣上衝而喘也有邪氣在表而喘則心腹濡而不堅外證發熱脈緊身疼痛冬月麻黃湯餘時越婢湯邪氣外盛壅遏清道使氣不利而喘雖經汗下亦可發之若惡風自汗發熱而喘桂枝湯加厚朴杏仁汗下後汗出無大熱而喘麻黃杏仁甘草石膏湯誤下脈促汗出而喘葛根黃芩黃連湯發汗後飲水多者必喘五苓散咳而上氣喉中水雞聲者此水飲支塞肺道也射干麻黃湯有邪氣在裏而喘必心腹脹滿內實不大便外證自汗短氣潮熱脈實大承氣加厚朴杏仁有水氣上衝而喘必咳悸乾嘔小青龍湯小腹痛小便不利去麻黃加茯苓有水氣內伏而喘則咳引脅痛十棗湯凡陰證厥逆脈沉細而喘促無汗者可治四逆湯加五味細辛若發熱脈沉而喘麻黃附子細辛湯凡喘慎不可用升麻用之則愈喘即內傷勞役氣虛發喘當用補中益氣者苟非清陽下陷亦須煨葛根代之諸喘為惡故非輕也華元化曰盛則為喘言肺中邪盛而腎虛也所以陰證發喘尤為惡候斫喪之人腎氣上乘而喘急用腎氣丸雜以黑錫丹導火歸元然多不救加以動息搖肩戴眼直視汗出厥逆者立斃大抵邪壅上盛正氣欲脫必至喘滿經曰直視讝語喘滿者死又身汗如油喘而不休者為命絶也短氣短氣者似喘非喘呼吸短促而不相續為實少氣不足以息為虛當隨證治之表證不解其人面色緣緣正赤煩躁不安不知痛處而短氣脈澀者桂枝二越婢一湯汗吐下後元氣虛弱脈微氣不相續者大建中湯陰證脈沉遲細弱手足厥逆口鼻難以布息者四逆加人參湯陽明病內實潮熱不大便腹滿短氣者三承氣選用渴欲飲水水停心下短氣妨悶者茯苓甘草湯小便難者五苓散乾嘔短氣痛引脅下者十棗湯虛煩短氣心中懊憹者梔子豉湯短氣而胸腹脹滿脈沉者是氣滯沉香降氣散大抵心腹脹滿按之鞭痛而短氣者為裏實若心腹濡而不滿為表邪若少氣不足以息脈微弱者為氣虛此大法也溫熱病及時疫多有短氣但溫熱表證則舌赤甚時疫表證則白胎如屑黃芩白虎達原飲為主若至胎黃及焦黑色急用涼膈雙解解毒承氣之類無論溫熱時疫皆可選用也氣逆氣逆者氣自腹中時逆上衝也太陽病下之後其氣上衝者此引邪內犯而裏不服邪也可與桂枝湯方用前法不上衝者此裏已受邪不可與之病如桂枝證頭不痛項不強寸脈微浮胸中痞鞭氣上衝咽喉不得息此為胸中實瓜蒂散吐之脈微者不可吐吐之則心中逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為挳振搖茯苓桂枝白朮甘草湯厥陰氣上撞心此寒熱錯雜之邪烏梅丸黃連湯選用病如虛羸少氣氣逆上衝欲吐者竹葉石膏湯有動氣誤發汗氣上衝而熱者柴胡桂枝湯二者皆正氣虛而邪氣逆也渴傷寒邪氣在表則無渴邪氣傳裏則熱耗津液是以能消水也法曰身熱為熱在表引飲為熱在裏故傷寒熱病本未身涼不渴及小便不黃脈不數者未之有也夫渴者熱傷津液於內故欲引飲以助陰祛熱也熱甚則能多飲而旋飲旋渴胃虛則但欲熱湯而畏寒飲若陰盛虛陽上迫而為假渴則渴不能飲或飲不能咽若強飲一二口頃即吐也溫病熱病則一發即煩渴引飲以伏氣自內變熱而發也中暑則熱傷心包而薰肺亦主煩渴傷寒營衛俱傷汗不得出則煩躁而渴邪犯膀胱及胃府與夫三陰熱證俱有煩渴朱氏曰脈浮而渴屬太陽有汗而渴屬陽明自利而渴屬少陰至於厥陰消渴飲水不止則又熱之甚矣太陽表邪傷肺水飲不散乾嘔發熱喘嗽而渴小青龍去半夏加栝蔞根熱邪傳裏則煩渴引飲而脈數小便不利為犯本五苓散陽明經病壯熱自汗鼻乾目疼煩渴自利葛根湯若府病內實蒸蒸潮熱燥渴飲水大便閟者三承氣選用少陽脈弦口苦咽乾發熱而渴心煩喜嘔而渴胸滿脅痛而渴心下痞滿而渴往來寒熱而渴並宜小柴胡去半夏加栝蔞根舌上胎白而渴去芩半加葛根乾燥更加栝蔞根表未解腹滿便閟用大柴胡湯凡先不渴服發汗藥而渴及先嘔後渴者皆為欲解先渴後嘔為水停心下此屬飲家小半夏茯苓湯兼眩悸嘔噦赤茯苓湯凡發汗吐下後口燥咽乾而渴此津液衰少腎水不升虛火上炎也竹葉石膏湯下利脈數而渴飲不能多者防圊血白頭翁湯凡傳次陰經熱證口燥咽乾心下鞭痛急下之若直中陰經寒證口不燥咽不乾而喉自中渴不能飲脈沉者急溫之故少陰病心煩自利而渴脈沉小便色白者此下焦虛寒故飲水自救也真武湯若面赤煩躁身反熱而口渴者此陰盛格陽也白通加豬膽汁湯凡冬月發熱頭疼二三日即咽痛而渴名曰冬溫陽旦湯加萎蕤桔梗溫病發熱而渴黃芩湯加栝蔞根蘆根汁若有暴感客邪加蔥白香豉熱病渴欲飲水口乾舌燥者白虎湯背微惡寒者加人參咳而嘔渴心煩小便不利豬苓湯少陰溫熱病二三日便口燥咽乾大承氣湯或裏熱燥甚怫鬱躁煩留飲不散大渴不止則腹滿高起痛不可忍但嘔冷涎大渴不能飲飲亦不能止其渴喘急悶亂欲死大承氣湯乘熱下咽其渴立止似無病人須臾大汗而解往往有不利而汗出者邪隨汗之宣通故不利而愈也時疫舌上白胎而渴白虎湯舌根漸黃至中心者涼膈雙解甚則合解毒承氣下之舌上胎黑而潤渴不能飲者必嘔血犀角地黃湯加大黃熱病汗下後煩渴欲飲水者少少與之是謂以法救之渴不止頻頻與之切勿按摩中脘恐成水結胸也溫病熱病煩渴不解往往得水或服黃芩石膏等寒藥浹然汗出而解者正為腸胃燥熱不能袪散邪氣忽然得涼水寒藥助其胃氣袪邪因得汗出而解非傷寒發表不遠熱之謂也東垣治一人煩躁目赤而渴脈七八至按之不鼓此陰盛格陽於外非熱也以薑附治之而安羅謙甫治一人傷寒脈沉細而微厥逆自利腹痛目不欲開兩手常抱腋下昏臥口燥舌乾四逆加人參蔥白而愈漱水漱水不欲咽者胸中無實熱也如陽明身熱目疼此熱在經欲作衄也犀角地黃湯去生地加甘草桂枝若見表證鼻衄者為熱傷經絡迫血妄行慎勿輕用犀角地黃湯當詳衄血例治若無表證腹滿按之雖痛而濡其人善忘如狂小便自利大便色黑口燥但欲漱水不欲咽者為有瘀血結於下焦輕則桃核承氣當換肉桂重則抵當湯如無虻蛭以乾漆灰代之下盡黑物乃愈少陰病手足冷時時煩但欲漱水而不能飲或勉強飲下少頃復吐或飲水而嘔或噦逆者皆屬內寒四逆湯證也厥陰下利無脈乾嘔煩渴漱水者白通加豬膽汁湯厥陰煩躁吐蛔口燥舌乾時欲涼水浸舌理中丸加烏梅不時噙之蓋無限失守之火遊於咽嗌之間假作燥渴終不能飲也或有能飲不吐者此則熱耳衄血衄血者經絡熱盛迫血妄行於清道也經曰以桂枝麻黃治衄非治衄也乃欲解散經中邪氣耳太陽衄血及服桂枝湯致衄者為欲解若衄而成流者少刻自解若點滴不成流者此邪氣在經也若脈浮緊身疼痛發熱無汗者麻黃湯汗之三時感冒衄者香蘇散加蔥豉或參蘇飲汗之蓋邪熱在表不得汗迫血妄行奪其汗則血自止若衄出不止又當止血為急不可拘執也若脈不浮緊身無熱者切不可發汗陽明口乾鼻燥漱水不能咽頭痛目睛暈黃寸脈數盛者必衄衄血而渴欲飲水水入即吐者先服五苓散次用竹葉石膏湯誤發少陰汗下厥上竭口鼻耳目出血者難治與當歸四逆湯衄不止者死止而頭眩者亦死衄家不可發汗言陰血本虛也黃耆建中誤汗動血加犀角傷寒衄血吐血不止誤用犀角地黃等涼劑致血留心胸之分而滿痛者一味木香酒磨不時呷之冬溫溫病衄血皆用黃芩湯加茅花如無茅花茅根汁代之熱病時疫通宜白虎湯加藕汁茅根汁童便陽毒溫毒衄血犀角地黃合三黃石膏湯去麻黃加百草霜大抵衄血吐血脈滑小者生脈實大者死吐衄血後脈微弱者易治若熱反甚脈反數急者不治熱病咳而衄汗不出出不至足者死凡衄不止而頭汗出身無汗及發汗不至足者難治內傷勞役大衄陰火乘虛驟衄及久衄不止等雜證不在此例石頑治歙客黃姓者正月間患傷寒衄血甚多必發於卯刻數日不止面上怫鬱頭痛身微熱脈浮大而數按之則芤意謂衄血既多則熱邪當解此獨不解者先必邪氣在經點滴之衄誤服涼血止截藥所致遂與越婢湯一劑即大青龍湯去桂枝杏仁熱服得汗而解但至夜則身有微熱更與當歸補血湯四劑而安又治墅關張九弘之媳頭痛如破屢服發表之藥轉劇邀余診之六脈數疾無倫寸口大三倍於尺中時大煩渴飲不能多白睛微黃而視歧曰此伏氣之發誤用表藥熱邪載火於上而欲衄也以黃芩湯一劑投之明晨果衄血如流與芍藥甘草湯加茅花童便不時溫服至晚微顫而止吐血衄血多有在經表邪吐血皆屬傳經裏證以當汗不汗熱毒入內迫血妄行從胃脘而出也凡見眼閉唇紅神昏語短眩冒迷妄煩躁漱水驚狂讝語背寒足冷四肢厥逆胸腹急滿便黑溺頻皆瘀血證也不必悉具但見一二證便宜犀角地黃湯然其性大寒能凝滯瘀血須涼證虛實寒熱加減虛者去地黃加阿膠血餘炙甘草童便實者加酒大黃茜根穿山甲寒加炮薑炙甘草熱者加芩連木香陰虛火炎之血則凝結如珠漆獨參湯下六味丸血虛而熱雖赤不結黃連阿膠湯胃虛者則不甚赤而散四君子加廣皮木香太陽病脈浮數反炙之必驚狂起臥不安咽燥吐血救逆湯咽喉閉塞不可發汗發汗則吐血黃耆建中湯誤發少陰汗動血者當歸四逆湯本虛損吐血人復感寒嗽血黃耆建中湯輕者則用枳桔湯加蔥豉凡嘔吐血水多者為肝藏久傷或胃敗所致多不可治虛損內傷吐血本證詳具醫通石頑治薑學在夏月感冒咳嗽時居母夫人喪哀痛骨立寢苫茹蔬醫者不察虛實妄投枳桔芩梔不但鬱閉表邪兼之傷犯中氣遂致嘔血泄瀉觀其外證唇燥咽乾頗似有熱而脈弦小知為脾胃虛寒客邪不散虛火乘機僭發之候遂與桂枝人參湯三濟而血瀉皆除調理脾肺而康又治沈懋甫仲子年十七每傷風即吐血夢泄此肝藏有伏火火動則招風也蓋肝為藏血藏魂之地肝不藏則血隨火炎魂不寧則精隨夢泄遂與桂枝湯加龍骨牡蠣四劑而表解血止桂枝湯主和營散邪加龍骨牡蠣以鎮肝安魂封藏固則風不易入魂夢安則火不妄動而血亦不上湧精亦不下泄矣若以其火盛而用知柏之屬鮮有不虛損者唾膿血吐血雖主於火然有虛實之殊至唾膿血無不因邪熱鬱發所致經曰服桂枝湯吐者其後必唾膿血也此非特酒客輩素多濕熱蘊積而然每見春溫誤行汗下不解多有此變並宜葶藶苦酒湯下奪之冬溫誤用卒甘發汗不解復大下之致胃氣虛寒邪伏陰中而見寸脈沉遲尺脈不至咽喉不利唾膿血者麻黃升麻湯萎蕤湯選用或增損而用石頑治陸中行室年二十餘臘月中旬患咳嗽捱過半月病勢稍減新正五日復咳倍前自汗體倦咽喉乾痛至元夕忽微惡寒發熱明日轉為腹痛自利手足逆冷咽痛異常又三日則咳唾膿血始延余治其脈輕取微數尋之則仍不數寸口似動而軟尺部略重則無審其脈證寒熱難分頗似仲景厥陰例中麻黃升麻湯證蓋始本冬溫所傷原不為重故咳至半月漸減乃勉力支持歲事過於勞役傷其脾肺之氣故咳復甚於前至望夜忽憎寒發熱來日遂自利厥逆者當是病中體疏復感寒邪之故熱邪既傷於內寒邪復加於外寒閉熱邪不得外散勢必內奔而為自利致邪傳少陰厥陰而為咽喉不利唾膿血也雖傷寒大下後與傷熱後自利不同而寒熱錯雜則一遂與麻黃升麻湯一劑肢體微汗手足溫暖自利即止明日診之脈亦向和嗣後與異功生脈合服數劑而安熱入血室衝為血海即為血室衝脈得熱則逼血下行男子亦有是證不獨婦人也凡血滯不行則脈乍澀乍數或沉或伏若血熱交併則洪盛血虛則芤虛中有瘀則芤中帶弦此一定法也如陽明證下血讝語此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出則愈即欲用藥小柴胡合犀角地黃熱甚神昏者生地黃黃連湯稍加酒大黃微利之以有瘀血故頭汗也婦人中風發熱經水適來七八日胸脅下滿如結胸狀讝語者刺期門此言適來即斷血結在裏為實證故刺期門以瀉之不善刺者以小柴胡去參加桃仁丹皮歸尾穿山甲以消之婦人中風寒熱經水適斷血結如瘧狀者此言經行未盡而適斷雖有結血未為全實小柴胡加當歸丹皮生地以涼之婦人傷寒發熱經水適來晝日明了暮則讝語如見鬼狀者此言經行不斷則熱不留結勿謂讝語而誤用硝磺犯其胃氣刺動營血犯其中焦柴胡和解犯其上焦但不妄犯熱隨血散自愈也血弱既盡邪正相搏結於脅下默默不欲食邪高痛下而嘔者小柴胡湯主之畜血傷寒太陽病當汗不汗則熱瘀在裏必血結也大抵胸脅小腹鞭滿以手按之痛小便不利乃氣滯不行而為弱閟若乾咳引脅下痛者為水飲五苓十棗證也若小便自利大便黑亮其人如狂者為畜血桃核承氣代抵當湯選用已下脈數不解消穀善飢六七日不大便者此有瘀血抵當湯若産後感冒或停食瘀血不行腹脹喘逆此血化為水也下瘀血湯不應急加人參乾漆灰陽明病其人善忘大便黑胸中痛不可近者畜血也犀角地黃湯加大黃然溏膩如漆者為畜血若黑燥如煤者為燥結非畜血也畜血證舌胎有邊白中黑而極薄潤必無乾燥焦黃者以血屬陰無大實熱故也內傷雜證畜血不在此例戴同父治一人元氣素虛胃口有畜血每食椒薑熱湯則厄一二聲以人參生白朮各一兩切用庶䖵蟲醉死絞漿製為末入乾漆灰七分以米飲丸彈子大早暮陳酒細嚼一丸終劑而愈喻嘉言治一人傷寒後兩脅僂廢痛如刀刺用桃核承氣加熟附子桂肉而愈李士材治一人畜血如狂少腹結痛六脈芤而左關尺獨弦且其人素有羸證以桃核承氣加人參三錢而安動氣動氣者築築然跳動見於臍之上下左右也以其人脾氣素虛水結不散即發動氣狀如奔豚但動氣時聚時散奔豚則固結不散也又病人素有痞積亦為動氣皆不可汗下誤下則腹滿拘急身雖熱反欲踡臥無論左右上下通宜甘草乾薑湯加茯苓桂心或理中去朮加桂苓痛甚加吳茱萸附子以朮閉氣桂泄奔豚也誤汗動氣則氣逆上衝或心中大煩目暈欲嘔引飲則吐或骨節痛通宜五苓散去朮倍桂枝茯苓或柴胡桂枝湯減參棗加苓橘緣參棗益氣苓橘散氣也凡傷寒動氣必須審問非脈可知也振振者森然若寒聳然振動皆責為虛寒也振近於戰而其勢稍輕戰則鼓栗而戰振則虛而不爭但聳動耳蓋由發汗吐下太過致損血氣虛極而作也傷寒吐下後逆氣衝胸起則頭眩身振振動搖者茯苓桂枝白朮甘草湯太陽病發汗不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯戰栗戰栗者陰陽爭勝故身為之搖也邪氣外與正氣爭則為戰邪氣內與正氣爭則為栗戰者身戰寒聳正氣勝故得汗而解也栗者心栗鼓頷而身不戰陰氣盛正虛不能勝邪遂成寒逆也有傳經戰栗脈實便祕者大柴胡湯溫病發戰涼膈承氣加薑棗下之必大汗而解熱病發戰白虎合解毒有裏證者涼膈雙解下之傷寒夾冷食而內栗寒逆不得解者甘草乾薑湯表邪勢盛而戰五積散陽虛不能作汗而栗再造散始病無熱而栗手足逆冷者理中湯背惡寒者附子湯誤發其汗而栗四逆湯加人參壞證寒栗正氣虛極也十全大補人參養營大建中湯選用傷寒六七日或十餘日戰汗不當用藥大法血隧熱壅須用硝黃氣隧寒滯必用桂附陰陽之用不同有形無形故也肉瞤筋惕肉瞤筋惕非常常有之經曰陽氣者精則養神柔則養筋發汗過多津液固少陽氣偏枯筋肉失其所養如魚失水故惕惕然動瞤瞤然跳也發汗過多厥逆筋惕肉瞤者真武湯若惡寒去芍藥增附子惡熱減附子倍芍藥素有動氣誤行發汗筋肉振跳者理中湯加桂附茯苓素常失血之人經脈失養時時筋惕者大劑溫補自愈若不因汗下始病便見此證者必元氣久虛或失血房勞後及新産感冒致有是證若誤用表藥必無生理瘛瘲瘛者筋脈急而縮也瘲者筋脈緩而伸也此證多屬虛風蓋風主動搖故耳傷寒汗下後傳變此證病勢已劇能用去風滌熱之劑治之間有生者大率與過汗經虛發痙不殊古人悉從小續命加減殊不知壞病變見此候皆是脾虛生風之象雖有六經形證斷不可復用表藥惟大建中加減為當有熱去桂附蓯蓉加芩連蠍稍之類風溫被火微黃煩驚時發瘛瘲者萎蕤湯加減若瘛瘲戴眼反折汗出如珠為太陽絶又四肢漐習動而不止似瘛瘲而無力抽搐者為肝絶也怫鬱怫鬱者乃陽氣蒸越於頭面聚而不散故緣緣而赤也所謂緣緣者有時不赤有時忽赤若有所因而愧赧之狀也傷寒發汗不徹或覆蓋不周或早揭衣被致陽氣怫鬱在表面色緣緣正赤躁煩不知痛處桂枝二越婢一湯若腹滿潮熱脈洪大而數者因大便不通火氣炎上而作赤色大柴胡湯汗吐下後胃中虛冷外氣怫鬱而畏寒厥逆脈微者理中湯外有微熱加桂枝內寒甚者加附子溫病面赤煩躁飲水小柴胡去半夏加括蔞根熱病煩渴引水面赤白虎加人參湯內實潮熱不大便涼膈雙解選用下後熱不解或解半日許復熱面赤者黃連解毒人參白虎選用若下元虛人誤下傷陰陽氣發越而身熱目陷手足逆冷面合赤色者不治戴陽戴陽者面赤如微酣之狀陰證冷極發躁面赤脈沉細為浮火上衝水極似火也凡下元虛憊之人陽浮於上與在表之邪相合則為戴陽陽已戴於頭面而不知者更行表散則孤陽飛越危殆立至矣節庵立法甚妙以人參附子等藥收拾陽氣歸於下元而加蔥白透表以散外邪也至於傷風誤用麻黃重劑發汗亦有戴陽煩躁者與傷寒無異總由平素下虛是以真陽易於上越耳下利清穀脈沉遲面少赤白通加豬膽汁湯下利清穀裏寒外熱脈微欲絶面赤咽痛者通脈四逆湯加蔥白夏秋伏暑面戴陽上熱下寒腹痛瀉利者冷香飲子若喘汗或瀉者非漿水散下來復丹不效大抵陽邪在表之怫鬱必面合赤色而手足自溫若陰證虛陽上泛而戴陽面雖赤足脛必冷不可但見面赤便以為熱也四逆四逆者手足逆冷四肢溫也厥逆者四肢有時自溫有時冰冷也然自熱而至逆逆而至厥皆傳經之邪也少陰病四逆或咳或悸或小便不利或腹中滿痛或泄利下重者四逆散若手足厥冷大便祕小便赤脈沉而滑小承氣湯若初病便厥冷四逆而脈沉者當從陰寒例治又始本陽證發熱因誤服寒涼過多或汗下太過致變四逆者當從壞證例治石頑治金魯公觸熱勞形醉飽不僅後受涼遂患發熱頭痛脹滿喘逆大汗如蒸面赤戴陽足冷陽縮脈弦數無力曰此傷暑夾食而復夾陰也與大順散一服不應轉覺脹急不安因與枳實理中加厚朴大黃是夜便更衣二次身涼足暖而痊足冷足冷手不冷者下焦衛氣不溫也外感而夾寒食傷於太陰身熱足冷或頭痛或腹痛此胃中陽氣不得下通也甘草乾薑理中五積選用甚至有臍下結痛不可按及下白膿者此燥屎內結大腸腋傷而下也改用消導利氣藥一劑後與調理有下元素虛之人病傷寒中風惡寒發熱但陽縮足冷者當從夾陰例治盛暑中身熱足冷多汗者作濕溫治之厥厥者逆冷之極周身氣逆手足厥冷是也蓋諸陽起於四肢厥為陽氣鬱伏可知厥逆雖有寒熱不同無論傳經直中俱屬陰經皆不可發汗少陰證但厥無汗而強發之必動血傷寒陰陽二厥最宜審辨夫陽厥者先是三陽經感寒起於頭痛發熱惡寒已後傳進三陰血分變出四肢厥冷乍溫大便燥實讝語發渴揚手擲足不惡寒但惡熱脈來沉滑而數重按有力此皆傳經熱厥外證雖厥冷內則熱極耳蓋因大便失下血氣不通故手足乍冷乍溫唇與爪甲青紫此熱極反兼水化之義大柴小承四逆散選用若溫病熱病時疫熱極而厥者涼膈合解毒或合承氣下之熱不退者再下之雖云三下熱不退者死然亦有下三五次利一二十行熱方退而得生者熱病厥逆手足冷脈滑者裏有熱也白虎湯肢體厥冷惟心胸有熱大便祕者解毒涼膈最當熱病厥逆不大便而腹滿背微惡寒脈浮滑者白虎湯沉滑者承氣湯此溫熱厥逆治法不可拘於傷寒陽厥而禁大下也陰厥者三陰經受寒初起無身熱頭疼便惡寒四肢厥冷直過肘膝不溫唇與爪甲青黑欲引衣踡臥二便清利不渴或腹痛泄利清穀或懍栗面如刀刮或口吐涎沫或乾嘔厄逆脈來沉細無力此直中陰經寒厥理中四逆子湯選用若陰極似陽格其虛陽於外厥逆煩躁面赤戴陽虛陽上膈則渴欲飲水而不能咽脈來數疾無倫按之全無此為虛陽發露通宜白通通脈四逆溫之又傷寒壞病多有厥逆煩躁者不獨陰極也當分陰傷陽傷用藥最為切要陰傷則宜滋補先天真陰兼清血中之熱陽傷則宜溫養後天胃氣兼助下焦真陽貴在臨證活法不得如陰厥陽厥例治也痰厥手足逆冷脈乍緊心下滿而煩飢不能食瓜蒂散吐之食厥手足逆冷上部有脈下部無脈急作法探吐之傷寒厥而心下悸者當先治水茯苓甘草湯後治厥小柴胡湯吐利厥逆煩躁欲死者吳茱萸湯少陰脈不至厥冷昏沉如死人狀者名曰尸厥宜從陰毒治之厥逆下利反驟能食而脈不至或散疾無倫者為除中不治凡厥逆惡寒踡臥煩躁下利不知人者皆惡候也藏厥蛔厥治例另具本條踡臥踡臥者身踡而手足不伸也凡人冬月獨寢則踡曲不伸天氣稍暖則手足舒暢安有踡臥之理故一見踡臥即屬陰寒可知然太陽經表邪未化為熱及發熱之初惡寒未罷亦有踡臥者故凡見頭痛發熱諸陽證即為太陽無疑脣甲青色之青者為寒赤者為熱以寒中於裏則血脈凝滯不能榮行於外所以脣爪青黑也若熱毒流入於裏而為熱厥則唇甲亦青但青中必帶深紫與陰寒之青黑不同試觀産婦以舌青驗子死脣青驗母死則知青黑為陽氣竭絶不得與青紫渾稱也咽喉乾痛咽痛非有大熱則為大寒治之一誤死生立判即太病誤下誤汗亡陽漏風及熱傳陽明熱傳少陽熱傳少陰寒中少陰種種不同不可概以為熱盛也夫咽者胃之門熱邪傳入陽明則咽但乾而不痛若熱毒勢甚亦有燥渴引飲而痛者但須以表熱裏實分經府而汗下之陽明病頭眩能食而咳必咽痛茯苓桂枝白朮甘草湯若六七日不大便熱蒸頭疼面熱咽痛者調胃承氣湯若脈弦脅痛而見口燥咽乾則屬少陽矣有汗下後虛煩口燥咽乾竹葉石膏湯冬月小柴胡去半夏加栝蔞根有太陽病下之若脈浮緊者必咽痛此熱邪在膈上也小建中加桔梗有大汗不止亡陽漏風而咽痛脈反沉緊者此陽虛而陰氣上乘也桂子加附子湯白朮附子湯選用有表邪傳少陰經而咽痛者以其經上循喉嚨故也其脈必數而有力其證必躁渴引飲便溺閟澀短赤急當下奪以泄其熱也少陰病咽痛四逆泄利下重者四逆散若口燥咽乾而渴腹脹不大便或下利純清臭水者急下之大承氣湯風熱挾飲上攻少陰咳而咽痛半夏散及湯陰邪上結咽瘡聲不出者苦酒湯若直中陰經而咽喉驟痛不腫不渴始病無發熱頭痛脈來沉緊而細其證嘔吐清水瀉利清穀便溺清利或燥極悶亂渴不能飲脈來急數無倫者此寒氣客於少陰之經虛陽上逆之候陰故暴陽即不暴耳四逆湯附子湯急溫之少陰病下利清穀裏寒外熱脈微欲絶喉痛面赤者通脈四逆湯加蔥白桔梗暴病暴死發及咽痛腹滿者此疫毒發於少陰也一味金汁灌之若腎水本虛而龍火勢盛必挾涎飲於上所以一發即腫痛閉塞也急當砭破出血湧泄痰涎後以六味丸斤許濃煎牛膝麥冬五味湯調化頻服凡陽邪上逆而咽痛宜甘寒以解其熱并噙蜜煎黃檗以佐之陰寒閉塞而咽痛當卒溫以散其結并噙蜜煎附子以佐之其冬溫風溫溫病熱病陰毒陽毒溫毒皆有咽喉乾痛各隨本例治法但加甘桔為引可也失音不語失音者語而聲音不揚也雖有寒熱之殊皆屬少陰經證亦有因肺氣受傷者以肺腎本為子母子傷而母氣亦傷故雖主於肺而實不外乎腎也至於不語則神識昏瞶又當歸之於心亦有因邪鬱陽明者以陽明為心之子陽明邪實則經絡不能流通致火熱薰灼心腩所以神昏即中風喉瘖舌瘖亦不外乎此也有寒客少陰咽痛失音脈沉背惡寒者附子湯若發熱脈沉麻黃附子細辛湯有風熱挾飲上攻而咽痛聲不出者有風溫誤汗灼熱語言難出者二證皆不出乎熱傷少陰之經也傷寒誤用辛熱發散太過而肺燥失音者六味丸加麥冬五味誤用苦寒斂肺聲瘖貪水欲衄者文蛤散即麻黃杏仁甘草石膏湯加文蛤薑棗傷寒暴瘖與虛勞久病聲啞不同蓋虛勞吐血失音不久必死若肺絡受傷而啞者雖數年不愈亦不死也傷寒口噤不語有五有身熱自汗神昏不語叉手冒心者發汗多傷營心神失養也當溫養藥中兼調營氣使發汗表裏和自愈有陽明府實胃氣不能上通而不語者謂胃承氣湯下之有熱病瘖啞不能言者此熱毒鬱發表裏上下不通也當與白虎涼膈等熱服汗之得汗即蘇無汗則死經言熱病暗啞不能言三四日不得汗者死是也至於痙病口噤不能言暴怒氣厥不能言各具本條喉痺喉痺者熱毒陷於厥陰也傷寒而至喉痺邪氣深矣蓋厥陰為陰中之陽最易發熱龍火每挾毒邪涎飲痺著於少陰之經以陰從陰故陰中火發必發於喉火性上炎故也凡厥逆發去熱熱多寒少或發癰膿或吐膿血或咽痛喉痺者皆熱邪有餘之候雖傷傷與溫病熱病天行大頭及雜證濕痰鬱火等驟發之喉痺種種不同而為陰火亢害則一其治法皆可默悟矣頭眩頭眩者頭旋眼黑也或言眩眊眩運眩冒者似是而非眩為眼黑眊為眼花運為轉運冒為昏冒皆少陽證也靈樞云上虛則眩下虛則厥眩雖為虛而多屬風者蓋風主運動故耳傷寒口苦目眩者此少陽表邪傳裏表中陽虛故也小柴胡湯吐下後虛煩痞滿氣上衝胸起則頭眩此陽虛也陽明病頭眩不惡寒能食而咳此水飲也並宜茯苓桂枝白朮甘草湯諸逆發汗轉劇言亂目眩者不治夫頭眩種種皆真氣衰奪痰因火運所致未有因實而致眩者故仲景治頭眩皆用溫經補陽之藥至如少陰下利止而頭眩時時自冒者不治此虛極而脫也鬱冒鬱為鬱結冒為昏冒如物蒙罩其首若霧靄中恍忽不清較之眩運尤重世謂昏迷是也經言諸虛乘寒則為厥鬱冒不仁此寒氣乘虛中於人也故鬱冒不仁者當以附子加乾薑溫之太陽病先下之不愈仍復發汗表裏俱虛其人因致冒冒家汗出自愈者汗出表和故也若不得汗桂枝人參湯下虛脈微者少加附子太陽病重復發汗陽虛耳聾而叉手自冒者慎勿誤用小柴胡宜大建中又病人叉手冒胸循衣摸床讝語昏冒不知人事此心火上炎逼肺肺氣不能自持所以神昏不可誤認風證節庵升陽散火湯新産惡露不行鬱冒詳醫通婦人本門不仁不仁為不柔和內經謂之肉苛是也以其血氣虛少不能周流於身為邪氣所伏是以肌體頑麻不知痛癢厥如死尸而且鬱冒也脈浮桂枝麻黃各半湯脈數甘草乾薑湯桂枝人參湯脈虛十全大補大建中湯若脈浮而洪身汗如油喘而不休水漿不下形體不仁為命絶也厥暈厥者厥逆暈者昏暈溫病熱病溫毒陽毒邪熱內結胸滿痰盛或當下失下以致陽熱亢極忽然手足厥冷口噤咬牙昏暈須臾復蘇若牙關緊急藥不可下先用絹帕裹指蘸新汲水於口中牙根兩邊頻頻搭之候牙寬卻用承氣合解毒或涼膈雙解下之心悸心悸者築築然動怔忡不能自安其證有三一者氣虛而悸一者汗下後悸一者停飲而悸氣虛者陽氣內弱心中空虛而為悸也汗下後正氣內虛邪氣交擊而悸較之氣虛尤甚停飲者由飲水過多水停心下心為火惡水不能自安而為悸也傷寒二三日心中悸而煩者小建中湯寒熱往來小便不利心煩喜嘔而悸小柴胡湯傷寒脈結代心動悸炙甘草湯少陰病四肢逆冷而心中悸者四逆散加桂苓太陽病發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯發汗後其人臍下悸欲作奔豚茯苓桂枝甘草大棗湯太陽病發汗不解仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯太陽病小便利者以飲水多故心下悸茯苓桂枝白朮甘草湯小便少者必苦裏急豬苓湯飲水多水停心下悸而惕惕不安者茯苓甘草湯五苓散選用凡停水而悸心下怔忡或厥者雖有餘邪必先利水免致內漬而成自利外漬而為腫脹也驚惕驚惕者心中惕然動悸皆火迫吐下所致如太陽病加溫針必驚也又太陽脈浮宜以汗解妄以火迫之必驚狂起臥不安救逆湯火逆下之因燒針煩躁而驚狂者桂枝甘草龍骨牡蠣湯少陽有三禁妄加吐下邪犯少陽之本而驚煩胸滿小便不利讝語身重不可轉側者柴胡加龍骨牡蠣湯不得眠陽盛陰虛則晝夜不得眠陰盛陽虛則嗜臥不欲起亦有至夜安靜而晝日煩躁不得眠者此汗下後暴傷其陽氣所致也傷寒邪熱傳裏陰為陽擾所以眠臥不寧蓋陽主動動則使人煩心不得眠若邪氣在表必無熱邪內擾之理故少陰雖有煩心不眠皆為傳經熱證而非直中陰寒陰主靜靜則多眠安有反不得眠之理不得眠有數證皆為陽盛切禁溫劑惟汗吐下後虛煩脈浮弱者因津液內竭則當從權用真武湯溫之此太陽壞病治例而非少陰陰寒之謂也如下之後復發汗晝日煩躁不得眠夜而安靜者用乾薑附子湯亦是暴傷津液之故非陰證也又太陽病二三日不得臥但欲起心下結脈微弱者用理中湯亦是因寒飲在胸中所以宜溫而不宜下下之利不止耳外此皆不可用溫也汗下後虛煩不得眠梔子豉湯胃中有燥屎大熱錯語喘滿神昏不得眠大承氣湯急下之汗下後亂夢心煩乏氣狂言不得眠酸棗湯表邪失汗傷陰身大熱善忘時驚悸乾嘔錯語呻吟不得眠犀角地黃湯五六日大便不行腹脹不鞭之不痛舌乾微胎而渴者炙甘草湯少陰病得之二三日已上心煩不得眠黃連阿膠湯咳而嘔心煩不得臥豬苓湯中氣虛而寒痰沃膽胸中時覺怔忡晝夜不得眠溫膽湯傷寒壞病久不愈常不得眠或心脾氣血素虧而悸不寧不得眠諸藥不效者大劑獨參湯或歸脾湯並用送下養正丹差後虛煩不得眠竹葉石膏湯多眠夫衛氣者晝則行陽夜則行陰行陽則寤行陰則寐蓋陽虛陰盛則目瞑多眠若始病無表證而見畏寒嘔泄知病不在陽分而為直中陰寒無疑惟風邪深入而見頭痛發熱神昏多眠者方為表證則宜解表為先若得汗後脈沉細身涼嗜臥者此陽邪去而陰氣自復可不藥而愈也設胸滿脅痛風熱內攻而喜睡者小柴胡加枳桔少陰病始得之但欲寐脈尺寸俱沉細遲弱者四逆湯少陰病欲吐不吐欲嘔不嘔心煩多寐自利而渴小便色白者真武湯若復煩熱不得臥者難治凡脈微細欲絶或臥惡寒向壁或身重逆冷皆屬少陰宜附子湯熱病三陽合病目合則汗讝語有熱者白虎湯凡胃中有熱者亦欲多眠但神昏氣粗而大熱原不似少陰之踡臥足冷也風溫狐惑多眠詳本例蛔厥昔人云雜病吐蛔責於熱傷寒吐蛔責於寒殊不知皆是胃虛邪盛寒熱錯亂所致所以仲景烏梅丸辛熱苦寒補瀉並用而獨不用甘草者蓋蛔聞甘即起聞酸即止聞苦即定見辣則頭伏而下設不知此而純用辛熱之藥則吐逆轉劇誤用純苦寒之藥則微陽頓絶危殆立至也然金匱又有甘草粉蜜湯純用甘味者此又治久病胃虛不得食而蛔病之藥不可因此礙彼也有初見表證即吐蛔者此必夾食所致但與二陳湯中倍生薑烏梅加細辛川椒紫蘇廣藿香葉之類自安少陽寒熱往來嘔而吐蛔者小柴胡去參棗甘草加烏梅黃連若胸中痞者三瀉心湯黃連湯選用若腹滿不大便熱甚昏憒而吐蛔者當用大柴胡去大棗加黃連烏梅微利之厥陰病消渴氣上撞心飢不欲食食即吐蛔蓋中焦寒極而無根失守之火浮於上焦故能消水宜連理湯用烏梅肉糊丸川椒湯服若大便難者加酒製大黃蜂蜜微利之用丸不用湯者取滓入蟲口也蛔上膈煩躁昏亂欲死兩手脈沉遲足冷便祕者多難治若蛔色赤而活或多者屬胃熱猶可治之蛔死色白而扁者屬胃敗必不治也凡人胃脘忽痛忽止身上乍熱乍涼面上乍赤乍白脈倏亂倏靜口中吐沫不食者便是蛔厥之候藏厥藏厥者胃中陽虛不能生化脾土則脾藏氣衰不運不運則水穀不化胃氣不行經脈不通故周身皆冷而厥也傷寒脈微而厥至七八日膚冷其人躁無暫安時此為藏厥非蛔厥也附子理中湯狐惑狐惑及𧈟皆蟲證也傷寒失汗不解多日傳變三蟲求食則為狐惑蓋腹中有熱入食無多腸胃空虛故三蟲求食而蝕人府藏也金匱云狐惑之病狀如傷寒默默欲眠目不得閉臥起不安蟲蝕於喉為惑上脣有瘡蝕於陰為狐下脣有瘡不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲嗄甘草瀉心湯又云病脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤小豆當歸散蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃導之近世通用黃連犀角散加槐子桃仁煎服東垣治一膏梁人先曾發汗不解而變狐惑發斑厥逆聲嗄默默欲眠目不能閉反側不安大便祕結六脈沉數乃厥深熱深之候急以承氣下之更用黃連解毒湯黃連犀角散而安百合百合病即痿證之暴者以肺熱葉焦氣化不行致小便不利又肺為百脈之總司故通身經脈廢弛所以百脈一宗舉身皆病無復經絡傳次皆由大病虛勞之後藏府不調所致其證似寒無寒似熱無熱欲食不食欲臥不臥口苦小便赤藥入即吐利脈微數尿則頭痛者六十日愈頭不覺痛但淅然惡寒四十日愈尿則快然但頭眩者二十日愈百合地黃湯隨證加減蓋取百合之清肅肺氣以利水道則周身之熱自化耳舌卷囊縮傷寒傳至厥陰邪熱內伏陽氣不得外通所以經脈縮急反有似乎陰寒之狀以肝主諸筋故也故凡舌卷囊縮從三陽熱證傳至厥陰而見此證者乃肝氣燔灼木受火困而不得舒縱為熱極危殆之候男子則囊縮婦人則乳頭縮也指掌以囊縮用小承氣然必脈實便祕口渴煩滿之極方可下之若脈浮下利者宜當歸四逆湯脈縮厥寒者加吳茱萸若始病無熱便厥冷無脈而見此證乃厥陰虛寒內則經脈失養而引急不舒外則肢體踡曲而下部不溫乃肝氣垂絶之候急宜四逆湯加吳茱萸肉桂溫之并炙關元氣海及蔥尉法傷寒食鬱中宮不化久而變熱痰聚胸中則聲音不清舌短強鞭而囊不縮宜調中飲又寒疝往往有囊縮睪丸引急而舌不卷者四逆湯加吳茱萸回香陽縮夾陰傷寒身熱頭疼足冷陽縮及三陰中寒陰盛格陽煩躁面赤陽縮入腹者皆真陽內餒不可與厥陰經熱極囊縮比例而推也治法詳總論夾陰三陰例中陰陽易女勞復陽縮入腹舌吐出者不治直視搖頭直視者目上瞪而不能動也經曰直視搖頭者心絶狂言目反直視者腎絶直視喘滿者死若戴眼反折汗出如貫珠不流者為膀胱絶反折言目珠左右不定也戴眼謂黑睛反視不下也皆不治痙病直視搖頭口噤背反張者難治然非心絶風主動搖故也又搖頭言者裏痛也審其因而治之若目中不了了猶能視物但半昏不見此非直視也讝語不大便者宜大承氣湯下之又亡血家發汗直視不能眴蓋目得血而能視誤汗復傷其血故眥急不能卒視當大補氣血為主不可便以為死證也遺尿遺尿者小便自出而不知也熱病三陽合病則身重讝語遺尿此熱盛神昏而不知也若陰證下體逆冷遺尿者即死若病久脈和身輕肌膚柔澤者此膀胱虛寒之極也附子湯加益智沉香補骨脂汗下後不解陰虛火動而遺尿者以發汗虛表肺金氣傷加之膀胱津少不能約制也生脈散加黃耆肉桂卒中風倒仆遺尿腎絶狂言直視讝語遺尿者腎與膀胱俱絶不治循衣撮空循衣撮空皆為死候而仲景又云循衣摸床直視讝語大承氣湯下之脈弦者生澀者死小便利者可治詳此證非大實即大虛當審其因察其脈參其證而分治之實而便祕大承氣瀉之虛而便滑獨參湯補之厥逆加附子若亡血者又當與生地黃黃連湯也許叔微治一人傷寒大便不利日晡潮熱手循衣縫兩手撮空直視喘息更數醫矣見之皆走此誠惡候得此十中九死仲景雖有證而無治法但云脈弦者生澀者死已經吐下難於用藥姑且救之若大便得通而脈弦者庶可治也與小承氣湯一服大便利諸疾漸退脈且微弦半月愈又嘗治循衣撮空得愈者數人皆用大補氣血之劑惟一人兼瞤振脈代遂於大補劑中加桂二分振止脈和而愈又一人夏月傷暑兼內傷冷物厥逆嘔吐或誤認陰證而與熱藥及覆蓋出汗後加以口熱咽乾眼白微紅項強溺祕循衣摸床如發狂狀言語錯亂舌赤欲裂朝輕暮重脈六七至而有力以黃連解毒及大承氣下之而安絶汗冷汗者胃中陽衰不能溫養分肉營衛失職而然也傷寒環口黧黑柔汗發黃者脾絶陰毒面青黑額上手背冷汗不止者營衛絶皆死大抵氣絶則汗出如珠著身不流氣散則汗出如油喘而不休皆是絶證若虛極冷汗淡汗不止皆非吉兆也勞復大病新差後氣血尚虛餘熱未盡宜安臥靜養設或早起勞動則血氣沸騰而發熱為勞復矣非但強力遠行也梳頭沐浴則動氣憂愁思慮傷神況過用力乎諺云諸勞皆復御女者死諸食皆復犯酒最劇酒色之害甚矣哉傷寒邪氣之傳自表玉裏有次第焉勞復則不然見其邪氣之復來也必迎而奪之不待其傳也經這大病差後勞復者枳實梔子豉湯傷寒差後更發熱者小柴胡湯脈浮以汗解之脈沉實者以下解之起居不時虛熱躁渴喘嗽氣乏者竹葉石膏湯去半夏石膏加京棗名千金勞復麥門冬湯身熱食少無力補中益氣湯大抵勞復食復二證醫識得祕妙則不致張皇若先病七日汗出今復發亦七日汗出先十四日汗出今亦十四日方解若疫證三四次復發亦三四次戰汗不為慮也食復食復者土虛不能勝穀氣也經云熱病少愈食肉則復多食則遺此其禁也病已差尚微煩設不了了者以虛不勝穀氣故今微煩損穀則愈若有停滯宜枳實梔子豉湯加大黃若關脈洪大煩渴讝語腹痛不大便或發熱大柴胡下之虛弱微熱理中湯溫之大病新差飲酒必復以酒味辛熱助其餘邪熱毒故也脈弦大者小柴胡加葛根黃連烏梅若脈洪大者竹葉石膏或小劑黃連解毒酌用女勞復大病後犯房勞而復者為女勞復犯者多死其候頭重不舉目中生花腰背疼痛少腹裏急絞痛或憎寒發熱陰火上衝頭面鬨熱心胸煩悶者必用燒裩散以韭根一大把鼠糞百餘粒煎湯調下虛極熱甚者節庵逍遙湯調服若腹急痛脈沉逆冷者當歸四逆加吳茱萸調服以吳茱萸升許酒拌炒尉小腹若手足攣拳陽縮入腹脈離根者不可救也陰陽易男子病新差與婦人交而婦人反病者為陽易婦人病新差與男子交而男子反得病為陰易此近世所分古人總謂之陰陽易也男子則陰腫少腹絞痛婦人則裏急腰胯內痛頭重不舉目中生花有時陰火上衝頭面鬨熱胸中煩悶甚者手足攣拳百節解散男子陽縮入腹婦人痛引陰中皆不可治必舌吐出而死如無死證可治者用燒裩散以五苓散加韭根鼠糞煎服熱甚者以逍遙湯調服總欲使邪火從小便中泄去也石頑治馮茂之夏月陰陽易而腰痛少腹急煩躁讝妄舌色青紫而中有黃胎腫裂雖渴欲冷飲而舌卻不甚乾心下按之鞭痛噯而失氣此挾宿食也所可慮者六脈虛大而兩尺則弦按之皆無根耳遂以逍遙湯加大黃一劑下黑穢甚多下後諸證悉除但少腹微冷作痛又與燒裩散一服煎五苓散送下而安遺熱傷寒差後半月十日以來終不惺惺錯語少神或寒熱似瘧或煩熱頰赤脈來浮數而軟上先前發汗未徹餘熱留在心包也奉議節庵俱主知母麻黃湯即麻黃湯中去杏仁而加知母黃芩芍藥也余嘗用竹葉石膏湯加麻黃治之更捷若寒熱如瘧小柴胡倍人參為當發頤傷寒汗出不徹熱遺少陽結於耳後或耳下其形鞭腫者名曰發頤見之速宜消散緩則成膿為害也連翹敗毒散若脈浮數能食者易治若沉緊或牢革反大熱不能食者難治腫連面上者必加白芷蔥白以通陽明之經若大便燥實加酒大黃外用赤小豆末雞子清調敷慎不可用寒涼敷藥若發即隱下不能起發者真氣內乏毒邪內陷最危之兆或連發數處如流痓者多不救也喜唾病新差後口中喜唾不止者此少火氣衰中土不溫不能約制津液也理中圓加益智仁以收攝之差後浮腫大病後腰以下至足腫而重者有水氣也牡蠣澤瀉散急攻之輕者只用五苓散加大腹皮牡蠣但不可延緩緩則上支胸脅難救矣若但面腫而足不腫者為胃虛養胃湯去草果加防風但足潤而重者為脾弱當節其飲食用補中益氣湯溫補之勿拘下腫為水不辨虛實而混治也雜方一百十三道論中引用正方已具纘論此不復録陽旦湯治冬溫發熱咽痛或自利而咳桂枝三錢芍藥酒焙甘草炙各二錢黃芩三錢酒炒生薑三斤大棗三枚擘右水煎去滓溫服無時日二三服本方加乾薑名陰旦湯治內挾寒食者黃耆建中湯治衛虛不能作汗虛勞裏急諸不足黃耆一錢酒炒桂枝二錢芍藥三錢酒洗甘草二錢炙生薑三片大棗三枚擘膠飴半兩右水煎去滓內膠飴更上火消解日三服再造散治陽虛不能作汗名無陽證黃耆酒洗人參桂枝甘草炙各一錢熟附子細辛各五分羌活防風川芎各八分煨薑五片右水煎將成加酒芍藥一撮更煮三沸去滓溫服節庵以此湯治尺中遲弱陽虛不能作汗之證名曰再造固為高出前輩但稍嫌風孳藥冗雜然無害於溫補助衛之大旨也香蘇散治感冒非時邪氣難分六經者香附薑汁浸勿炒紫蘇各二兩陳皮去白一兩甘草半兩炙右為散每服半兩水煎去滓日三服以汗出熱除為度芎蘇散治非時感冒紫蘇柴胡各二錢川芎葛根枳殼桔梗陳皮半夏茯苓各一錢甘草七分生薑三片大棗一枚擘右水煎去滓熱服溫覆取微汗本方去川芎柴胡加人參前胡木香名參蘇飲按此為治非時感冒之首劑非正傷寒藥也方中芎蘇柴葛四味為通治三陽經外感藥而獨推芎蘇二味名方者其重在於邪傷血分也更合之以二陳治內傷飲食加枳桔寬膈利痰誠為總司外內之良方而無引賊破家之虞宜乎世所共推也其參蘇飲方即此湯去川芎柴胡而易人參前胡木香之製其主在於氣分也昔人有用芎蘇散不解用參蘇飲即解之説意在人參有兼補之功殊不知其為氣血兩途也神朮湯治內傷冷食外感寒邪羌活蒼朮泔浸炒各三錢藁本川芎白芷各一錢五分細辛五分甘草一錢炙蔥白二莖連鬚生薑三斤右水煎熱服覆取微汗十神湯治時疫感冒頭痛如破紫蘇葛根各一錢五分麻黃去根節泡升麻川芎白芷各八分陳皮甘草白芍世本作赤芍誤香附薑汁拌碎各六分生薑五片蔥白三莖連鬚右水煎熱服無時溫覆取微汗此方出香蘇散專主解利陽明非時不正之氣其太陽經傷寒發熱禁用以中有升麻葛根恐引邪入犯陽明也今世用治寒疫但六經證不顯者總以此湯疏表利氣而元氣虛人蒙害亦不鮮矣升麻湯即升麻葛根湯解利陽明經發熱斑疹升麻葛根生白芍酒洗甘草炙各一錢五分右水煎溫服無時發斑加犀角熱甚更加黃連黑參虛加人參葛根蔥白湯治溫熱頭痛如破川芎二錢葛根芍藥知母各一錢五分蔥白四根連鬚生薑二片右水煎溫服痛未止再服本方去知母加甘草大棗名增損葛根蔥白湯治感冒頭痛連須蔥白香豉湯治感冒頭痛如破連鬚蔥白七莖香豉一合勿炒生薑一兩切右水煎溫日三服覆取微似汗不汗加蘇葉選奇湯治風火相煽眉稜骨痛羌活一錢五分防風一錢甘草一錢五分夏生冬炙黃芩酒炒一錢熱甚加用右水煎食後稍熱服藿香正氣散治四時不正之氣挾食及瘴濕霍亂廣藿香葉一錢五分白朮霍亂轉筋換木瓜厚朴薑製白芷痰食氣滯換木香陳皮各八分半夏一錢五分口渴去之茯苓桔梗各一錢大腹皮薑湯泡腹脹湯用之蘇葉各一錢自發汗去之甘草炙五分嘔吐去之右用生料作一劑加生薑三片大棗二枚水煎去滓熱服無時熱多加黃連寒多加乾薑寒甚加附子少許此本不換金正氣散而立方中腹皮乃傳寫之誤當遵古方用蒼朮為是專治一切不正之氣非正傷寒藥也太陽病惡寒發熱頭疼骨節痛用之先虛正氣雖汗出亦不解故元氣虛人并夾陰傷寒發熱脈沉足冷者禁服人參敗毒散治時疫初起壯熱寒疫汗後熱不止人參羌活獨活柴胡前胡川芎枳殼桔梗茯苓各一錢甘草半錢人中黃更佳右用生料作一劑加生薑二片水煎去滓日二服本方加陳倉米名陳廩湯治疫痢此乃時疫初起煩熱痞悶之證然服之多有毒邪驟發其勢轉甚者蓋驟發則毒易傳化但不知者以為反增其困耳又寒疫屢發不解亦咸用之以正虛不補則邪終不化所以昔人有云敗毒散主治在時疫之先又可用於寒疫之後誠格言也荊防敗毒散治捻頸瘟咽喉腫痛腹脹暴證羌活獨活前胡柴胡人參甘草人中黃更佳枳殼生桔梗茯苓川芎牛蒡子炒研薄荷荊芥各一錢防風一錢五分右水煎去滓緩服臨服加真金汁一杯尤效本方去人參茯苓枳殼桔梗薄荷獨活加連翹紅花升麻歸尾穿山甲名連翹敗毒散治發頸普濟消毒飲治天行大頭濕蒸多汗柴胡一錢二分黃連黃芩酒炒黑參連翹鼠粘子炒研升麻白芷甘草生桔梗馬勃各一錢殭蠶炒七分板藍根如無青黛代之右為末半用水煎去滓食後徐服半用蜜丸噙化就臥以令藥性上行也氣虛脈弱加人參大便祕少加酒大黃六神通解散治時疫初起熱甚躁不得汗麻黃去節酒洗石膏滑石黃芩各二兩蒼朮去皮泔炒四兩甘草炙一兩五錢右為散每服半兩加薑三片水煎去滓熱服取汗節庵加羌活川芎蔥白香豉獨活散治瘟疫瘴氣腳膝疼軟發熱頭疼體痛獨活羌活細辛麻黃去節泡防風枳殼生蔓荊子甘菊花黃芩酒洗人參茯苓甘草炙各一兩石膏二兩右為散每服半兩加薄荷五葉生薑三片水煎去滓熱服無時達原飲治時疫邪氣初犯募原者黃芩酒洗白芍酒洗知母酒洗厚朴薑汁炒各一錢檳榔二錢草果七分甘草五分炙生薑一片大棗二枚擘右水煎日三夜二服生犀飲治疫癘初起眩暈嘔血犀角二錢蒼朮麻油炒一錢川連一錢黃土半兩岕茶葉一大撮金汁半盞右水煎去滓入金汁攪服日三夜二大便結加大黃渴加栝蔞根虛加鹽水炒人參表熱去蒼朮黃土加桂枝黃芩便膿血去蒼朮倍黃土加黃檗便滑以人中黃代金汁清熱解毒湯治瘟疫大熱黃連酒洗黃芩酒洗白芍酒洗生地人參各三錢石膏雞子大碎羌活知母各二錢甘草一錢五分升麻葛根各一錢生薑二兩切右水一斗煮取五升每服一升日三夜二服人中黃丸治瘟疫諸熱毒大黃三兩尿浸人中黃如無坑代之蒼朮去皮麻油炒桔梗滑石各二兩人參黃連酒洗黃芩酒洗生各一兩防風五錢香附薑汁拌勿炒一兩五錢右為末神麴糊丸清熱解毒湯送下二三錢人中黃散治大頭疫癘及疙瘩瘟辰砂雄黃各一錢五分人中黃一兩作人中黃法以竹筒留結去皮傍開一孔入滿甘草末杉木塞孔臘月浸大糞池底月餘曬乾候用右為末每服二錢薄荷桔梗煎湯下日三夜二服涼膈散治膈熱便祕胃實發斑表裏俱熱連翹梔子仁黃芩薄荷大黃酒洗芒硝各二錢甘草五分炙大棗一枚擘蔥白一莖右水煎去滓溫服無時雙解散治溫熱病表裏大熱防風麻黃薄荷川芎連翹當歸芍藥生大黃酒洗芒硝各半兩石膏黃芩酒洗桔梗各一兩甘草二兩炙白朮薑汁拌勿炒荊芥山梔各二兩五錢滑石三兩右為散每服三錢加生薑三片水煎去滓溫服此本涼膈合通解而易白朮加芎歸芍藥荊防桔梗即通聖散合益元之製也按通聖為中風門中專方而中風多是邪乘虛入萬無表裏俱實之證即大便燥結亦屬血枯風祕用此甚難惟溫病熱病內外邪甚者乃為合宜蓋防風麻黃解表藥也風熱之在皮膚者得之由汗而泄荊芥薄荷清上藥也風熱之在巔頂者得之由鼻而泄大黃芒硝通利藥也濕熱之在腸胃者得之由後而泄滑石梔子水道藥也濕熱之在決瀆者得之由溺而泄熱淫於膈肺胃受邪石膏桔梗清肺胃也而連翹黃芩又所以祛諸經之遊火風熱為患肝木主之川芎歸芍和肝血以息風熱而甘草白朮又所以和胃氣以健運脾土能勝濕熱禦風火故也方中倍用益元者以伏氣所蒸之濕熱使半從肌表而泄半從滲道而利也故大便通者硝黃自可勿用有微汗者麻黃即可勿施而濕熱鬱發未有小便不黃赤者雙解之義實在發汗利小便耳昔人但知守真長於治火不知實開溫熱病之法門也黃連解毒湯治內外熱劇黃連黃芩黃檗三味俱酒洗山梔各二錢五分右水煎溫服無時三黃石膏湯治汗下後不解熱鬱三焦便滑溺澀黃連黃芩黃檗三味俱酒洗各二錢山梔二十枚碎石膏五錢碎麻黃一錢泡香豉一合生薑三片蔥白三莖右用澄清地漿水煎服半日許不得汗解再服脈數便祕上氣喘急舌卷囊縮者去麻黃香豉加大黃芒硝捶法加細荼一撮寒能制熱故用石膏若能下熱故用芩連梔檗佐以麻黃淡豉之發散者以溫熱至深表裏俱實降之則鬱揚之則越鬱則溫熱猶存故兼之以發揚則炎炎之勢皆燼矣此內外分解其勢乃兵之分擊者也導赤瀉心湯治熱傳手少陰神昏黃連酒洗黃芩酒洗山梔薑汁拌炒黑滑石碎知母鹽酒拌犀角甘草生人參麥冬去心茯神各一錢生薑三片大棗三枚擘右加燈心為引水煎熱服射干麻黃湯治水飲傷肺咳而上氣喉中水雞聲射干三錢麻黃四錢細辛一錢五分紫菀欵冬花各三錢五味子捶半夏薑製各二錢生薑三片大棗二枚擘右以水先煮麻黃去沫內諸藥煎成去滓分三服金沸草散治肺感風寒鼻塞聲重咳嗽旋覆花去梗葉麻黃去節泡前胡各七分荊芥穗一錢半夏薑製甘草炙芍藥各五分生薑三片大棗一枚擘右水煎去滓晨昏各一服萎蕤湯治風溫咳嗽及冬溫發熱頭眩咽乾舌強萎蕤一錢五分石膏二錢碎白微麻黃去節泡川芎葛根羌活甘草炙杏仁去皮尖碎青木香各一錢右水煎日三服栝蔞根湯治風溫無大熱而渴栝蔞根一錢石膏二錢碎葛根一錢五分防風人參甘草炙各五分右水煎熱服無時防已黃耆湯一名漢防已湯治風濕關節煩疼脈浮汗出防已酒洗黃耆酒拌各一兩白朮七錢甘草五錢炙右每服抄五錢匙加生薑四片大棗一枚水煎熱服後當如蟲行皮中腰以下如冰後坐被上又以被繞腰下溫冷微汗差喘加麻黃胃氣不和加芍藥氣上衝加桂枝下有陳氣加細辛此治衛中之陽太虛而在裏之真陽無患者附子既不可用但用耆朮甘溫從陽以緩圖之蓋自汗而腰以下屬陰之分無汗服此雖動其濕而衛中之陽尚不足以勝之故皮中如蟲行所以用暖被圍腰下接令微汗以漸取差亦從下受者從下出之之法也麻黃杏仁薏苡甘草湯治風溫身疼日晡發熱麻黃去根節泡一錢五分杏仁十枚去皮尖研薏苡一兩薑湯泡勿炒甘草八分炙右水煎溫服有微汗避風方中用麻黃杏仁甘草以開發腠理而泄風邪即以薏苡之通利水道而去濕大意與麻黃加朮湯不殊但其力稍遜耳羌活勝濕湯治風濕上甚項強頭痛羌活獨活酒洗防風川芎酒洗藁本酒洗蔓荊子醉甘草炙各一錢生薑一片右水煎溫服緩取微似汗速則風去濕不去也寒濕腰以下重附子防已身重腰沉沉然加黃檗蒼朮本方去獨活川芎蔓荊甘草加升麻柴胡蒼朮名除風濕羌活湯濕上甚為熱汗之則易下之則難故當變常法而為表散此方得之若周身關節盡痛即當去巔頂之藥專除肉腠間風濕為務也補中益氣湯治內傷勞倦耗氣及勞力感寒黃耆一片酒炒一錢熱甚倍用人參三分有嗽去之氣虛者可加至一錢甘草炙五分可加至一錢白朮三分可加至五分若脅下痛者有瘀血也須生用當歸土炒橘皮升麻柴胡各二分可加至三分右水煎食遠稍熱服周慎齋曰脾氣者上升則為元氣下行則為邪氣內傷中虛表熱或潮熱自汗補中正方表熱加羌防腹中滿加附子凡用補中病熱已退升柴不用可也若渾身拘急作脹係風寒宜加羌防但作脹不拘急為內寒加附子又用補中下體痿軟或虛弱者不可用當以八味丸治之凡內傷作瀉藏附子於白朮中令其守中以止瀉也表熱藏附子於黃耆中欲其走表以助陽也凡內傷調理脾胃必用羌活散其肝邪此為正治陸麗京曰東垣之定此方也其言曰脾胃既虛則下流於腎肝陰火得以乘其土位夫脾胃之氣不上行而下流則并於肝腎是脾腎原是無病而承脾胃之下流即其氣愈盛矣盛滿者瀉之此升柴之所以必用也然此為下實而清陽下陷者言之非為下虛而清陽不升者言之也倘人之兩尺虛微者或是癸水銷竭或是命門火衰若再一升提則如大木將搖而先撥其本實枯條垂落而更拔其根荄壽命難期危亡立至也生脈散治暑傷元氣喘促煩渴人參五錢麥冬去心三錢五味子二錢碎右用長流水煎溫服無時孫真人云人參用井水煎服之無效孫真人令人夏月常服生脈散則百病不生東垣云夏月服生脈散加黃耆甘草令人氣力湧出劉宗厚云若腳膝痿弱者更加酒黃柏則筋力倍常清暑益氣湯治長夏濕熱蒸人煩熱喘滿小便赤黃耆一錢酒炒白朮薑製蒼朮泔浸去皮麻油炒升麻醋洗神麴炒陳皮各五分甘草炙當歸麥冬去心黃檗鹽酒炒各三分五味子九粒碎葛根酒煨澤瀉青皮各二分右水煎徐徐服本方去青皮葛根加黃連茯苓柴胡名清燥湯暑令行於夏至長夏則兼濕令矣故此方兼而治之暑熱蒸炎表氣易泄而中氣者又為諸氣之原黃耆所以實表而固易泄之氣即兼當歸以統養脾之血白朮神麴甘草所以調中而培諸氣之原酷暑橫流肺金受病人參五味麥冬一以補肺一以清肺一以收肺此三物名為生脈也以氣虛則脈虛傷暑之證未有脈不虛者故用補氣之藥以復脈經所謂扶其所不勝也火盛則水傷故又以黃檗澤瀉清其化源液亡則口渴故又以葛根升其胃液清氣不升升麻可升濁氣不降二皮可理蒼朮之用為兼長夏之濕也十味香薷飲治傷暑體倦神昏頭重吐利香薷二錢人參黃耆酒洗白朮茯苓甘草炙扁豆陳皮醋炒厚朴薑製木瓜各一錢右水煎欲令作汗熱服欲利小水冷服伏暑去黃耆人參加黃連藿香澤瀉本方去黃耆白朮陳皮加杏仁半夏藿香砂仁薑棗名六和湯消暑十全散治夾暑感冒發熱頭痛香薷二錢扁豆炒捶厚朴薑汁炒木瓜陳皮一作半夏甘草炙白朮薑汁拌茯苓廣藿香葉蘇葉各一錢右水煎熱服無時取微汗黃連香薷飲治伏暑大熱水瀉脈數香薷二錢厚朴一錢薑製黃連五分酒蒸右水煎冷服本方去黃連加扁豆甘草名局方香薷飲消暑丸治傷暑發熱頭痛瀉利煩渴半夏一斤米醋五升煮乾甘草生茯苓各半斤右為細末薑汁和丸無雜生水每服二錢不拘時沸湯送下消暑在消其濕故於二陳湯內除去橘皮而倍用半夏為君也又以半夏性燥故用醋煮以斂其性而使之下行且不耗津液矣其用生甘草茯苓者不忘滌痰消濕之本意也去橘皮者惡其上升耗氣也夏月之氣易於耗散皆當禁用不獨此方之橘皮耳益元散即天水散俗名六一散治暑濕熱蒸小便不利滑石六錢甘草一錢右為極細末用清水調服發汗加蔥豉安神加辰砂止泄加炮薑消斑加青黛大順散治暑熱引飲過多霍亂嘔吐甘草乾薑各五錢杏仁去皮尖桂各三錢右先將甘草白砂炒次入薑卻下杏仁炒過篩去砂合桂為末每服三錢沸湯調下冷香飲子治中暑夾陰腹痛瀉利附子生用草果橘紅甘草炙各一錢生薑五斤右水煎冷服漿水散治暑中太陰少陰泄瀉身冷汗出脈弱附子乾薑炮甘草炙肉桂各五錢良薑半夏醋製各二錢五分右用漿水煎去滓冷服漿水即點酪淡醋也虛熱喘乏加人參汗多加黃耆五味泄瀉而兼身冷汗出脈弱具為胃虛陽氣欲脫之兆最急是不得不用桂附二薑甘草半夏辛溫以理其脾之冷滯也其妙用尤在漿水之酸以收欲脫之陽氣惜乎世咸忽之合大順冷香消暑生脈清暑益氣及此方觀之大順用白砂炒甘草乾薑杏仁冷香用水浸冷服消暑用醋煮半夏生脈清暑之用五味子此用酸漿水煎總是因夏月陽氣在外容易耗散之故其無故好啜香薷飲者可不鑒歟升麻鱉甲湯治陽毒斑如錦紋咽痛吐膿血升麻甘草各二錢蜀椒炒去汗當歸各一錢雄黃五分研鱉甲一錢五分炙右水煎溫服取汗本方加桂枝名陰毒甘草湯陽毒升麻湯治陽毒面赤狂言發斑咽痛下膿血升麻犀角各一錢五分射干黃芩人參甘草各一錢右水煎溫服溫覆手足汗出則解不解重作犀角黑參湯治發斑毒盛咽痛犀角黑參各二錢升麻射干黃芩人參各一錢甘草八分生右水煎溫服犀角大青湯治斑出大盛大熱心煩狂言悶亂犀角二錢大青一錢五分黑參升麻黃連黃芩黃檗山梔各一錢甘草八分生右水煎熱服無時本方去芩檗升麻加人參生地柴胡名消斑青黛飲黃連橘皮湯治陽毒發斑黃連一錢酒洗橘皮去白麻黃去節泡葛根酒洗杏仁去皮尖研枳實炒各五分厚朴薑汁製甘草炙各三分右水煎溫服橘皮竹茹湯即大橘皮湯治胃虛嘔逆橘皮去白三錢竹茹五分人參甘草炙各一錢生薑四片大棗一枚劈右水煎溫日三服厄逆加柿蒂三枚活人書加半夏赤茯苓湯治傷寒停水嘔噦赤茯苓人參陳皮去白各一錢白朮薑汁拌生用半夏薑汁炒川芎各五分生薑三片右水煎不拘時服小續命湯治中風外有六經形證及風痺腳氣麻黃去根節泡桂枝甘草炙杏仁去皮尖炒研芍藥酒洗川芎防風人參黃芩各一錢四分防已二錢酒洗大附子炮七分右作二劑每劑加生薑五片大棗一枚水煎溫服此本古今録驗續命湯去當歸石膏乾薑而加黃芩芍藥防已防風附子薑棗之製也以其無分經絡不辨虛實寒熱故易老有六經加減諸例按吳鶴臯曰此方治中風未詳其證麻黃杏仁麻黃湯也仲景治太陽證之傷寒桂枝芍藥桂枝湯也仲景治太陽證之中風如此言之則中風而有頭疼身熱脊強者皆在所必用也人參甘草四君子之二也局方用之以補氣芍藥川芎四物湯之二也局方用之以養血如此言之則中風而有氣虛血虛者在所必用也風淫末疾故佐以防已陰淫寒疾故佐以附子陽淫熱疾故佐以黃芩蓋病不單來雜揉而至故其用藥亦兼該也至於痙病腳氣等類傷寒證往往借用此方然必按證增損始為合宜設不辨表裏虛實而妄投之寧無耗血傷津抱薪救焚之患乎如聖散治剛柔二痙羌活防風各一錢五分川芎白芷柴胡甘草炙白芍當歸烏藥半夏薑汁炒黃芩各一錢生薑三片柔痙有汗加白朮桂枝剛痙無汗加麻黃蒼朮口噤咬牙大便實者加大黃利之右水煎去滓臨服加薑汁竹瀝溫服無時大羌活湯治兩感一日太陽與少陰俱病羌活一錢獨活防已酒洗防風黃連酒洗黃芩酒炒蒼朮泔浸炒白朮生川芎細辛甘草炙各六分生地三錢知母一錢五分生薑三片大棗二枚劈右水煎熱服無時節庵去防已二朮連知加柴胡白芷石膏黑豆兩感有表裏之殊無陰陽之異傳經者皆為陽邪一於升陽散熱滋養陰藏則感之淺者當或可平故易老於不治之中而求可治之策也羌活導滯湯治六淫之邪內滯發熱羌活一錢五分獨活一錢防已七分酒洗當歸一錢大黃二錢皂煎酒浸枳實五分麩炒右水煎食前溫服取微汗葶藶苦酒湯治屢下熱不解葶藶三錢研苦酒三合即米醋生艾汁一合如無以乾艾洗搗取汁右水煎作三服探吐取汗屢下熱不解陰津隨汗外亡而陽熱轉亢故取苦酒之酸收葶藶之下泄以承領陰氣內入更兼艾汁以發越陽邪使陰氣內藏陽熱外散一舉而兩得之惜乎世所不解也黃龍湯治失下循衣撮空虛極熱盛不下必死者大黃三四錢痰祕薑汁拌芒硝二錢腸鳴換半夏茯苓厚朴一錢五分枳實一錢當歸三錢氣祕換木香甘草一錢血祕換桃仁泥生地黃汁人參較大黃減半生薑五片大棗一枚劈風祕換羌活右水煎將成加桔梗一撮再煎三沸去滓熱服虛人積結於內攻之不行乃腸胃枯竭之故故節庵加人參當歸於承氣湯中助其氣血以建背城之功即如參蘇飲中用參輔佐表藥之義厚朴七物湯治腹滿發熱脈浮飲食如故厚朴一兩二錢薑汁炒大黃薑製甘草炙各五錢枳實炒桂枝各三錢生薑一兩切大棗六枚劈右水煎溫分三服嘔加半夏下利去大黃寒多倍生薑此即小承氣合桂枝去芍藥湯也七味中獨推厚朴為君者其主在於風邪內陷之腹滿原不在乎攻下也觀方後云下利去大黃其義自見代抵當湯丸治畜血大黃四兩酒洗芒硝一兩桃仁六十粒炒研生地黃歸尾酒洗穿山甲蛤粉炒各一兩桂三錢至五七錢右為極細末煉蜜丸如桐子大畜血在上焦丸如芥子大臨服去枕仰臥以津咽之令停喉下搜逐膈上之瘀中焦食遠下焦空心俱桐子大以百勞水煎湯下之如血老成積此藥攻之不動去歸地加醋製廣茂一兩倍肉桂或煮湯和滓服之尤效金匱下瘀血湯治瘀血大黃一兩桃仁二十枚研庶䖵蟲二十枚熬去足右為末煉蜜和作四丸以酒一升煮一丸取八合和滓頓服之衃血下如豚肝備急丸治心腹寒積卒暴諸病惟妊娠禁用大黃酒浸三分乾薑生用二分巴豆去皮心熬一分右先將大黃乾薑為末次入巴豆合研杵千下煉蜜丸菉豆大蜜器中貯之不拘時溫水下五七丸口噤者抉齒灌之大黃附子湯治脅下偏痛發熱脈弦緊此寒也大黃一兩酒浸附子一枚炮細辛二錢右水五升煮取二升去滓分三服服後如人行四五里頃更進一服三承氣湯為寒下之柔劑白散備急丸為熱下之剛劑附子瀉心湯大黃附子湯為寒熱互結剛柔並濟之和劑此鼎峙三法也獨怪近世但知寒下一途絶不知有溫下等法蓋暴感之熱結可以寒下若久積之寒結亦可寒下乎是以備急等法所由設也然此僅可以治寒實之結設其人稟質素虛雖有實邪固結敢用剛猛峻劑攻擊之乎故仲景又立附子瀉心湯用芩連佐大黃以祛膈上之熱痞即兼附子之溫以散之大黃附子湯用細辛佐附子以攻脅下寒結即兼大黃之寒導而下之此聖法昭然不可思議者也奈何去聖久遠一聞此法無論賢與不肖莫不交相詆毀遂至明哲束手沉疴待斃良可慨夫二陳湯治痰飲宿食固結陳皮去白脅下引痛醋炒乾咳用蜜製半夏薑汁製熱痰竹瀝製妊娠惡阻醋製茯苓停飲心悸桂枝煎酒製各二錢甘草痞脹砂仁汁製一錢生薑七片咳逆痰結用蜜煎烏梅肉一個瀉利炒焦右水煎熱服本方去陳皮甘草烏梅名小半夏茯苓湯本方去茯苓甘草烏梅名橘皮手夏湯或問二陳湯為治痰首劑為吐血消渴妊娠禁用然不可一律論也如血色正赤凝結為陰氣受傷故禁辛燥設瘀晦淡薄如水者為陽不統而陰不守安得不用薑半朮附輩以溫之乎右消渴陰火爍津故禁燥熱設肥人濕熱內壅津液固結而渴安得不用星半薑連輩以燥之乎如妊娠津液衰少不能養始而病故禁辛散設惡阻嘔逆亦謂半夏傷胎而禁之乎大抵瘦人多火多燥咸禁一切辛熱耗陰燥劑肥人多濕多痰咸禁一切滋陰膩膈潤劑各隨所稟為權衡耳導痰湯治傷食挾痰發熱陳皮半夏薑製茯苓各一錢五分甘草一錢炙枳實炒南星湯泡七次各一錢生薑五片右水煎溫服本方加人參白朮黃連黃芩栝蔞仁桔梗大棗竹瀝薑汁名加味導痰湯若痰熱而粘去參朮痰冷而清去芩連年力壯盛先用稀涎散後服此湯平胃散治食積腹痛壯熱發黃蒼朮泔浸麻油炒八兩厚朴薑汁炒陳皮去白各三兩四錢甘草三兩炙右為末每服五錢加生薑三片水煎空心服本方加木香薑製黃連名香連平胃散治食積發熱本方合五苓散名胃苓湯治食積泄瀉小便不利趙養葵言平胃者平胃中之墩阜設無墩阜而用之平地反為坎陷矣五積散治外感寒邪內傷生冷蒼朮泔浸炒八錢桔梗六錢麻黃去節泡枳殼炒陳皮去白各五錢厚朴薑製乾薑泡過各四錢半夏薑製茯苓甘草炙白芷歸身白芍酒洗川芎桂各三錢右為末每服四五錢加生薑三片蔥白三莖水煎去滓熱服溫覆取微汗表邪甚者去芩芍加香豉陰寒脈細去苓芍加熱附逆氣乾嘔加吳茱萸虛加人參按此方本平胃為主參以二陳專主內傷生冷又合桂枝麻黃但少杏仁故兼治外感寒邪加以四物去地而合甘草乾薑為治血中受寒之聖藥枳桔甘草並為清氣治嗽之首方白芷一味為都梁丸專走陽明而治風熱頭痛桂苓甘朮換蒼朮以滌飲散邪使飲半從表散內藏小半夏茯苓湯令未盡之飲乃從小便而驅之古人以消食必先滌飲發散必用辛溫此雖類集十餘方而不嫌冗雜者得辛溫散邪之大旨也但雜合復方原不拘全用如無血病無藉芎歸設不咳嗽何煩枳桔若非頭痛都梁奚取苟或有汗麻黃安施要在臨病諦審出入斯可與言復方之妙用也調中湯治食積挾外感發熱蒼朮泔浸炒陳皮炒半夏薑製白芍酒洗桔梗甘草炙枳殼炒羌活白芷藿香葉砂仁各一錢川芎七分酒洗麻黃去節泡桂枝各五分生薑三片右水煎溫服無時按調中湯與五積散大同小異乃表裏兼併之藥故用以治食積挾外感發熱證若調中飲則全用平胃而兼乾薑黃連輩專主食積發熱卻與表邪無預也即如中滿分消丸分消湯之寒熱攸關用者不可不審調中飲治食積類傷寒但身不痛者蒼朮泔浸麻油炒二錢白朮生厚朴薑汁炒陳皮炒甘草炙神麵炒枳實炒黃連薑汁炒各一錢山查肉薑汁炒黑二錢草果八分乾薑炮五分右水煎去滓磨木香調服腹痛加桃仁痛甚便祕加大黃口乾加蘭俗名頭草人參養胃湯治食滯痞悶蒼朮泔浸麻油炒厚朴薑汁炒半夏薑製藿香各一錢陳皮去白甘草炙各七分人參茯苓草果各五分生薑七片大棗三枚劈烏梅肉一個右水煎熱服養胃者藉人參之力以助諸消尅藥建平胃之功也近世名家專以此湯治胃虛不能進食之證服之胸膈暫寬意謂人參補養胃氣之功安知轉受其削乎沉香降氣散治氣逆喘脹沉香四錢另研香附二兩薑汁炒砂仁四錢捶甘草八錢同砂仁拌濕炒右為末滴水為丸淡鹽湯送下二錢虛人人參湯服香殼散治虛人畜血暴起胸脅或少腹作痛香附三錢薑汁炒枳殼二錢炒青皮炒陳皮烏藥赤芍蓬木醋炒各一錢歸尾三錢紅花五分甘草生三分炙二分右水酒各一盞煎成去滓加童便空心服不應加延胡索穿山甲有外感表邪去青皮加桂枝羌防當歸活血湯治挾血如見崇狀當歸三錢赤芍酒洗生地酒浸另搗爛桂心各一錢五分桃仁二十粒同乾漆灰拌炒去漆灰研茯苓枳殼柴胡各八分甘草五分乾薑炮四分紅花二分右除地黃水煎去滓入地黃煎數沸臨服加陳酒服之不應加穿山甲末五分又不應加附子三分有實熱難用附子者須與酒大黃錢許同用犀角地黃湯治畜血善忘如狂或驟吐血不止犀角鎊屑磨水更佳生地黃酒浸搗爛牡丹皮白芍各二錢右除地黃水煎去滓入地黃更煎數沸濾清加藕節汁扁柏汁并磨京墨攪令黑色服之腹中有瘀血未下加桃仁紅花酒大黃若腹不滿自言滿為無熱減地黃二汁加木香此湯本治內傷胃脘之瘀血以犀角善解飲食瘀積之毒故為陽明專藥胃中既有瘀積必蘊釀為熱故必兼芍地丹皮以涼解之胃為水穀之海過而不流故可暫用若在他經斷乎不可也醫貫以為衄血的方陰虛火動者宜之要非正論今人概以治虛勞吐血衄血服之雖得暫效然旋劫旋發致死不悟也夫吐衄之血統而言之則皆屬炎上之火柝而言之有在經在府之分其在吐血也或屬胃中有熱猶可稍奪其勢至於衄血則是經絡中遊火與此治胃熱之藥何預哉惟傷寒五六日忽然暴衄不止差可借用以其熱鬱經絡故以泄熱為務然必加入芩梔歸尾庶或近之蓋傷寒暴病不可與虛勞久病比例而推也生地黃黃連湯治婦人血風崩漏燥熱不除循衣撮空閉目不省人事生地黃酒浸當歸川芎各二錢白芍酒洗黃連酒蒸黃芩酒炒山梔薑汁炒黑各八分防風三錢酒潤右水煎徐徐呷之脈實者可加酒大黃七味涼血藥中獨用防風一味以升散風熱而治崩得力全在乎此以防風為風藥中潤劑也竹葉湯即竹葉防風湯治産後中風發熱竹葉五十葉葛根二錢桂枝防風桔梗甘草炙人參各一錢生薑五斤大棗五枚劈右水煎溫服覆取微汗頸項強加附子嘔者加半夏金匱衍義云産後中風發熱面赤正頭痛為太陽陽明合病以産後中風易於發痙故用桂枝加葛根湯以解二經之邪去芍藥之酸收而加人參之甘溫以益氣更加桔梗防風竹葉通陽明之風熱而主面赤喘滿也若頭項強者知邪襲太陽陽明將成痙也以産後新虛故加附子助人參溫散之若嘔者知痰濕上逆故加半夏以開滌之世本本方中即有附子乃後人所加觀方後所云自知四物湯治血虛熟地黃血熱換生地黃當歸各三錢大便不實用土炒白芍藥泄瀉腹痛用桂酒炒失血用醋炒川芎各二錢血逆童便浸右水煎臨臥熱服先服後食勿過飽本方去熟地芍藥名芎歸湯為末名佛手散本方加烏藥香附甘草名四烏湯本方合理中去地黃白朮加茯苓名增損四物湯本方換赤芍加三稜蓬朮肉乾漆灰名加減四物湯虛人血結多加人參少佐生附仍用白芍本方合小柴胡湯名柴胡四物湯傷寒熱傷陰西之證最多而用滋養陰血之劑絶少惟妊娠胎産感冒客邪之病則不能屏絶四物等湯耳按四物為陰血受病之專劑非調補真陰之的方而方書中咸謂四物補陰致後世則而行之用以治陰虛發熱火炎失血等證蒙害至今未息至於專事女科者則以此湯隨證漫加風食痰氣藥所以近代諸湯祖四物者紛然雜出欲求足法後世者究竟不可多得其最可恨者莫如坎離丸之迅掃虛陽四物二連之斬削真氣而舉世庸工利其有劫病之能咸取用之何異於操白刃而劫人財命耶姑以本湯四味言之雖云熟地滋養陰血為君芍藥護持營血為臣而不知其妙用實在芎歸調和諸血之功也試觀芎歸佛手可以探胎可以催生以二味為陰中之陽同氣相求故能引動胎氣若兼芍地即滯而不靈矣曷可更加苦寒之味乎嘗見先輩治上下失血過多一切血藥反置而不用獨推獨參湯童便以固其脫者以有形之血不能速生希微之氣所當急固也昔人有言見血毋治血必先調其氣又云四物湯不得補氣藥不能成陽生陰長之功誠哉至言也余嘗謂此湯雖非傷寒門中之藥然用以治大邪解後餘熱留於血分至夜微熱不除或合柴胡或加桂枝靡不應手輒效不可掩沒其功也當歸補血湯治血虛發熱黃耆去白蜜酒一兩當歸三錢酒洗右作一劑水煎溫服婦人經産行後感冒發熱頭痛加蔥豉薑棗氣虛則身寒血虛則身熱故用當歸調血為主然方中反以黃耆三倍當歸者以血之肇始本乎營衛也每見血虛發熱服發散之藥則熱轉劇得此則浹然自汗而熱除者以營衛和則熱解熱解則水穀之津液皆化為精血矣紫蘇飲治胎前感冒發熱胎氣不和紫蘇芍藥酒洗大便不實酒炒當歸各一錢甘草炙川芎酒洗陳皮各八分人參一錢虛者倍用大腹皮薑湯泡一錢虛者諒用生薑五片蔥白一莖右水煎空心溫服傷風去大腹皮加香豉胎動不安為熱加黃芩白朮胎不運動為寒加木香砂仁逍遙散治肝氣不調發熱乾咳有似外感者柴胡一錢五分白朮茯苓各一錢二分當歸白芍各二錢甘草八分炙陳皮六分薄荷七葉煨薑三片乾咳效用蜜煎右水煎臨臥或半飢時熱服本方加丹皮山梔名加味逍遙散歸脾湯治抑鬱傷心脾之陰及虛邪誤汗熱不止人參黃耆茯苓酸棗仁炒研白朮蒸熟透各二錢五分木香甘草炙各五分桂圓肉八枚生薑五片紅棗一枚劈遠志當歸各一錢右水煎溫服無時本方加丹皮黑山梔名加味歸脾湯補中益氣與歸脾同出保元並加歸朮而有升舉胃氣滋補脾陰之不同此方全以龍眼之甘平佐歸耆滋養心脾更以棗仁遠志鼓動少火而生胃土茯苓生薑轉運水穀木香調暢諸氣紅棗引入心脾也近世以木香性燥不用服之多致痞悶或泄瀉減食者以其純陰無陽不能輸化藥力故耳四君子湯治氣虛人參吐血用秋石或青鹽製瀉利不止土炒嘔逆薑汁製一錢五分虛甚倍用白朮脾胃虛飯上蒸數次用泄瀉土蒸炒焦濕痰薑汁拌生用燥咳或便難蜜水拌蒸透茯苓小便不利肉桂酒拌胃燥而噎膈人乳拌蒸吐痰嘔逆薑汁拌甘草補虛炙用痞滿砂仁汁製嘔吐薑汁製小水不利生用各一錢右水煎食前熱服本方加陳皮名異功散本加陳皮半夏生薑名六君子湯更加木香砂仁名香砂六君子湯婦人香附易木香氣虛多熱痰加薑製川連多寒痰加炮薑血不調加當歸氣虛者補之以甘參苓朮草甘溫益胃有健運之功具沖和之德故為君子若合之以二陳則補中微有消導之意宜乎功用之多也至於加減不可枚舉蓋人之一身以胃氣為本胃氣旺則五藏受蔭胃氣傷則百病叢生故凡病久不愈諸藥不效者惟有益胃補腎兩途故用四君子隨證加減無論寒熱補瀉先培中土使藥引津氣四迄則周身之機運流通水穀之精微敷布何患其藥之不效哉是知四君六君為司命之本也東垣升陽散火湯治陽氣抑遏惡寒發熱如火升麻葛根酒拌生用羌活獨活酒拌白芍酒拌生用人參各八分柴胡六分甘草生四分炙六分防風三分右水煎溫服無時忌寒冷難化之物本方去人參炙甘草羌活獨活加蔥白名火鬱湯夫火者生物之本揚之則光遏之則滅今為濁陰填塞不得上行故宜辛溫風藥以升散之清揚既出上竅濁陰自必下降矣東垣聖於脾胃者治之主以升陽俗醫知降而不知升是撲滅其生物之本也安望其衛生哉節庵升陽散火湯治叉手冒胸循衣撮空證人參酒拌二錢多至五錢白朮二錢生用茯神一錢甘草一錢炙當歸一錢五分芍藥一錢五分桂酒拌陳皮六分多至一錢麥冬去心二錢柴胡七分黃芩一錢酒炒生薑三片大棗三枚劈右水煎熱服無時取微汗痰加半夏便燥讝語加大黃泄瀉加升麻倍朮十全大補湯治脾胃氣血俱虛人參一錢五分白朮飯上蒸一錢茯苓甘草炙各八分熟地一錢五分當歸白芍酒洗各一錢川芎八分黃耆一錢五分蜜酒炙肉桂一錢生薑三片大棗三枚劈右水煎食前溫服本方加半夏麥冬熟附子肉蓯蓉名大建中湯本方去川芎加陳皮五味遠志名人參養榮湯參胡三白湯治汗下後虛微少氣發熱口渴人參二錢五分柴胡三錢白朮蒸勿炒白芍酒洗茯苓各一錢五分生薑三片大棗三枚劈右水煎溫服營衛不知去柴胡加桂枝口乾心煩加麥冬五味心下痞加黃連枳實不眠眠者加竹茹本方去柴胡名人參三白湯參胡芍藥湯治餘熱未除人參柴胡黃芩酒洗知母酒炒枳殼炒各一錢芍藥一錢酒洗麥冬去心生地各一錢五分甘草五分炙生薑三片右水煎溫服參胡溫膽湯治過經不解嘔而痞悶人參柴胡茯苓橘皮各一錢五分甘草六分炙半夏薑製枳實炒各一錢生薑三片右水煎溫服本方去柴胡加熟地棗仁遠志五味名十味溫膽湯脾胃虛寒則少陽不能行生發之令致涎飲沃膽而不得眠故用半夏之辛散以開發涎飲涎飲散而膽不寒矣然又有膽寒肝熱而煩悶不寧者又當入竹茹芍藥等味也酸棗湯治虛煩不得眠酸棗仁一兩炒研知母酒炒茯苓川芎甘草炙各一錢右水煎臨臥溫服腎水不上交於心心火無所制故煩而不得眠方用酸棗仁之滋肝燥為君兼知母泄腎熱為佐苓草調和其間川芎入血分而解心火之燥煩也金匱腎氣丸治腎虛邪乘水藏熟地黃八兩乾山藥微潤炒山茱萸肉各四兩牡丹皮茯苓白澤瀉微炒三兩桂枝附子炮各一兩右煉蜜丸桐子大酒下五十丸早暮二服本方去桂枝換肉桂名崔氏八味丸本方去桂附名六味地黃丸本方去肉桂枝換桂二兩茯苓用六兩餘各二兩加牛膝車前各二兩名濟生腎氣丸天一生水而水未生之先即有氤氳之氣是謂腎氣腎不藏非但真陰竭氤氳之氣皆化而為火矣嘗考金匱方有男子消渴小便多婦人轉胞不得溺並用腎氣丸主之詳二條病機迥異而主治則一者總由腎虛關門失守肝火擾亂不寧所以開闔皆失其宜仲景即於八味丸中除去肉桂之益肝壯火取用桂枝之分解陰邪令從外泄附子收攝腎氣使之內藏俾地黃輩得以留戀成既濟之功則腎氣復得主持關隘開闔自有常度此八味丸易桂枝之妙用也若夫虛勞腰痛少腹拘急陰寒精自出痠削不能行及腳氣上入小不腹仁等肝腎俱虛之證又當推原益火之意非腎氣丸桂枝所能勝任耳附子理中湯治脾胃虛寒內傷冷食不化人參白朮炒焦甘草炙乾薑炮黑等分附子炮熟減半右水煎溫服本方去附子加枳實茯苓名枳實理中湯本方去附子加青皮陳皮名治中湯本方去附子加黃連茯苓名連理湯金匱大建中湯治心胸中大寒痛嘔不能食蜀椒二錢炒去汗乾薑一兩生人參六錢膠飴二兩右水煎去滓內膠飴再煮沸分溫三服益元湯治下虛戴陽躁渴悶亂不能作汗者熟附子乾薑甘草炙人參麥冬去心各一錢五味十五粒捶黃連知母各五分蔥白四莖生薑五片大棗四枚劈右水煎入童便半盞頓冷日三服此用四逆回陽生脈益氣加黃連知母以為假熱之使使無拒格之患更兼蔥白童便以收外越之虛陽究不出白通豬膽通脈四逆之成則也附子散治陰毒傷寒腎青面黑附子炮去皮七錢五分桂心當歸白朮各半兩乾薑炮半夏薑製各二錢五分右為散每服三錢加生薑三片水煎去滓不計時候溫服暖覆取汗如人行十里許未汗再服附子粳米湯治腹中雷鳴切痛胸滿嘔逆附子炮半夏薑製各二錢甘草一錢炙大棗三枚劈粳米半合右水煎去滓溫服半日不止更進一服羌活附子散治腎虛肝火上逆厄逆陰躁羌活附子炮茴香微炒各半兩木香一作丁香乾薑炮各一錢右為末每服二錢入鹽一捻水煎微溫服霹靂散治陰盛格陽躁渴欲飲水而不能咽附子炮去皮臍為末用五錢真臘茶一錢五分右分二服水煎去滓入蜜少許放冷服之須臾躁止得睡汗出即差火焰散治傷寒陰躁惡候硫黃附子去皮生用臘茶各一兩右為細末每用一兩同艾葉五錢酒調攤新瓦上將瓦搬起無令著火候煙盡研細每服二錢酒一盞煎七分有火焰起勿訝如吐更服候心熱其病已差三服不應勿治之稀涎散治中風不語牙關緊急痰厥昏迷牙皂四策去弦皮子明礬半兩生半枯半右為末溫水調下半錢匙少頃鵝翎探吐之鹹能去垢辛能利竅故用礬石之鹹澀以消痰涎牙皂之辛苦以搜風祕比而成方蓋因其無形之風挾有之涎膠結不散用此二物俾涎散而風解真奪門之兵也皂策丸治肺癰初起皂策八兩刮去皮用酥炙右為末煮棗肉丸菜豆大桔梗湯下五七九日三夜一服胸中痰積膠結不解則或咳或喘或痞或癰非此不足以洗滌垢膩來蘇膏千緡湯等方之祖也葶藶大棗瀉肺湯治肺癰喘不得臥葶藶熬令黃色搗丸如彈子大大棗十二枚劈右水三升煮棗取二升去棗內葶藶煮取一升頓服桔梗湯治肺癰實熱吐穢痰桔梗薏苡仁薑湯泡去油氣貝母去心當歸桑白皮蜜酒拌蒸栝蔞仁壓去油百合枳殼各一錢五分葶藶八分酒炒研五味子碎地骨皮酒洗知母酒炒甘草節生防已酒洗黃耆酒拌生用杏仁去皮尖研各五分右水煎緩緩服葶藶薏苡瀉肺湯治肺癰初潰唾膿血薏苡仁五錢貝母一錢六分去心甘草節一錢五分陳皮一錢二分黃耆酒拌勿炒桔梗忍冬白芨各一錢葶藶酒炒研八分生薑一片右水煎食後緩緩服初起去黃耆白芨加防風潰後膿盡加人參久不斂去葶藶加合歡皮射干湯治胃脘癰唾膿血身干去毛酒洗梔子仁炒黑升麻各一錢赤茯苓赤芍藥各二錢白朮一錢五分薑製勿炒右水煎去滓入地黃汁少許再煎服大黃牡丹湯治大腸癰大黃一兩牡丹皮三錢桃仁五十粒研甜瓜子一兩研芒硝半兩右水六升煮取一升去滓內芒硝再煎頓服之赤小豆當歸散治狐惑蟲蝕大腸成癰及大便血赤小豆三升浸令芽出曝乾當歸十兩右為散漿水服方寸七日三服黃連犀角散治狐惑咽乾聲嗄黃連一錢五分酒蒸犀角生者鎊三錢木香三分烏梅肉三個右水煎去滓溫服百合地黃湯治百合病不經吐下發汗者百合七枚劈生地黃汁一升右先以水洗百合潰一宿當白沫出去其水更以泉水二升煎取一升去滓內地黃汁取一升五合分溫再服中病勿更服大便當如漆發汗後去地黃汁加知母下後去地黃汁加代赭滑石吐後去地黃汁加雞子黃病變發熱者用乾百合滑石為散飲方服寸匙日三服一月不解變成渴者以百合一升水一斗潰之一宿熱已洗身洗已食煮餅勿以鹽豉洗後渴不差者以枯蔞根牡蠣等分為末飲服方寸匙日三服逍遙湯治陰陽易人參二錢知母一錢五分黃連五分甘草一錢生滑石六錢生地一錢五分柴胡一錢犀角一錢竹茹五分陽縮入腹倍用韭根一把生薑三片大棗三枚劈右水煎去滓臨服入燒裩襠末一錢五分調服有粘汗出為效不汗再服小水利陰頭腫即愈按陰陽易雖少陰受病乃暴受邪熱所致故宜苦寒之劑以瀉之以非腎氣素虛合用溫補之謂金液丹治陰寒厥逆不省及陰結二便不通硫黃五兩右研細水飛和水入煬成罐內鐵盞蓋定鐵線纏口鐵釘旋緊赤石脂末封口再用鹽泥固濟陰乾入地坑又以盞一個盛水放罐上亦用固濟慢火燒養七日夜再加頂炭候冷取出為末蒸餅湯浸和丸桐子仁大每服三十丸溫白湯下陰極冷甚者可加至百丸黑錫丹治陽虛陰逆嘔吐痰喘一切陰盛格陽證沉香葫蘆巴酒浸炒陽起石煅研細水飛附子炮各一兩肉桂五錢補骨脂舶上茴香肉豆𦸅煨金鈴子酒蒸去皮核木香各一兩硫黃黑錫鎔淨各二兩右用黑錫入鐵銚內如常法結黑錫硫黃砂子地上出火毒研令極細餘藥並為細末和勻自朝至暮以研至黑光色為度酒麴糊丸如桐子大陰乾藏鉛罐內每服四五十丸空心淡鹽湯薑湯或棗湯女人艾棗湯下急證用百丸按此方用黑錫水之精硫黃火之精二味結成砂子為君諸香燥純陽之藥為臣以金鈴子苦寒一味為反佐用沉香引入至陰之分為使凡遇陰火逆衝真陽暴脫氣喘痰鳴之急證用以鎮固其陽使坎離交於頃刻真續命神丹也來復丹治上盛下虛裏寒外熱及伏暑泄瀉如水硝一兩硫黃一兩同硝為末磁器內慢火炒柳木捶攪之不可猛火以傷藥性研極細大陰元精石研水飛一兩如無真者以青鹽代之五靈脂酒飛去砂石澄定曬乾用二兩青皮去穰陳皮去膜各二兩右為末醋糊丸桐子大每服三十丸空心米湯下此方本二氣丹而立以硝黃二味大理中宮寒涎宿垢更以元精石清鎮肺金使氣化下行歸就膀胱兼二皮五靈以破食積痰血之滯雖大理腸胃而不礙乎陽虛故為治伏暑水瀉之聖藥但小便赤澀不利者禁用按倉公云中熱不溲者不可服五石石藥精悍不得數溲服之將發癰養正丹治上盛下虛心腎不交驚惕不眠傷寒陰盛自汗唇青婦人血海久冷水銀黑錫去滓稱與水銀結成砂子硫黃研硃砂水飛細各一兩右用黑錫入鐵銚內溶化下水銀將柳木捶攪次下硃砂攪令不見星子放下少時方入硫黃末急攪成汁和勻如有起以醋灑之候冷取出研細糯米糊丸菉豆大每服三十丸鹽湯棗湯或參湯下或丸如芡實大每服一丸服後得睡莫驚覺腎氣不歸遊散於上則上盛下虛故用水銀黑錫以鎮固之然二藥非藉硫黃之力則滯而不行倘砂結不透服之即頭中未免疼痛以其陰降太速虛陽猱動不安耳用硃砂者正以交通心氣也古人每以三丹和服名曰三和蓋黑錫專溫腎肝來復兼理脾肺養正收攝心腎總欲使三焦真火各歸其部耳刺灸穴法服桂枝湯不解刺風池風府風池二穴足少陽陽維之會在項後髮際陷中風府一穴督脈陽維之會在項後入髮際一寸大筋宛中禁不可灸熱入血室刺期門足太陰厥陰陰維之會肝之募也在第二肋端上直兩乳舉臂取之太陽病頭痛發熱若欲作再經者針足陽明衝陽穴也足陽明脈之過為原在足跗上五寸骨間動脈少陰病下利脈微澀嘔而汗出數更衣反少者灸百會督脈陽維之會在前頂後一寸五分頂中央旋毛中陷可容指少陰病踡臥四逆脈微欲絶陰毒唇面爪甲青灸關元氣海關元足三陰任脈之會小腸募也在臍下三寸氣海任脈氣所發在臍下一寸五分厥陰病六七日脈微手足厥冷煩躁灸厥陰曲骨穴也任脈足厥陰之會在橫骨上中極下二寸毛際陷中動脈應手
